# Rollback and Incident Response — IV Gaps (Added 4/28)

The offsite content (April 21) covers the deployment and rollout methodology: phased activation, war room at go-live, wait for downstream lifecycle completion before increasing throttle. These are operational readiness items and are documented in the PA Risk Mitigation section as supporting the phased rollout approach.

The following rollback and incident response items were not addressed at the offsite and remain open for IV:

- Who has authority to take the model offline during the pilot (named role or title, not "the team").
- What events trigger an immediate rollback to human-only processing: threshold-based (e.g., error rate exceeds X%), event-based (e.g., a single incorrect dispute filed), or both.
- Notification process to MRM if the model is taken offline or if a material error is identified during the pilot.
- Post-incident review process for model-related errors: who reviews, what is documented, and how findings are fed back into the model.

The war room forum is a triage and operational reaction mechanism, not a defined rollback procedure. IV should confirm whether the model owner has documented these items before full production approval.

