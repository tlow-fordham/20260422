### Feature Engineering Module

The platform supports numerical transformations (standardization, normalization) and categorical variable transformations (one-hot encoding, base encoding, label encoding, ordinal encoding).

**Workflow:** Select operation → select dataset → select transformation type → select variable(s) (multi-select supported) → set parameters (e.g., 0–1 standardization vs. variable standardization) → choose to override existing dataset or create new → Submit.

**Results display:** Before/after histograms, box plots, summary statistics tables, and percentile distributions for each transformation.

**Saving transformed data (important — not automatic):**

1. After a job completes, go to the job queue
2. Click the dataset tab within the job
3. Mark the output as "Save"
4. Then mark it as "Ready to Use"
5. Only then does it appear in the data management module and dataset selector for subsequent operations

This is intentional — not all intermediate outputs need to be saved, so the platform gives users control. However, all outputs remain accessible in the job queue regardless of save status.

