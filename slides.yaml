### Ticket 13 — Review DeepEval Test Outputs for Model Misses

**Estimate:** 3 hours
**Due Date:** 5/1/2026

**Focus:** The DeepEval test outputs contain the full simulated conversations and evaluation results. We need someone to read through them and flag any cases where the model did something wrong, whether or not the DeepEval metrics caught it.

**What to do:**

- Pull the DeepEval test output files (the completed conversation logs with evaluation results) from the model owner.
- Read through each conversation. For every scenario, check: Did the model collect the right information? Did it call the right tools? Did it reach the correct outcome (submission, transfer, or refusal)? Did it say anything incorrect, inappropriate, or off-script?
- Flag any model misses. A miss is anything where the model's behavior deviates from what a human reviewer would consider correct, even if the DeepEval metric scored it as passing. Examples: wrong field value captured, unnecessary escalation, failure to ask a required question, incorrect dispute classification, hallucinated policy language, or a guardrail scenario where the model partially complied with a malicious request before refusing.
- You do not need to document every turn. Only note the turns where something went wrong, and describe where in the conversation it happened (e.g., "during merchant contact collection," "at the point of case submission," "after the first refusal attempt").

**Deliverable:** A table with columns: Scenario Name, Where in Conversation, What Happened, What Should Have Happened, DeepEval Score (Pass/Fail). Follow the table with a short summary of any patterns across scenarios.
