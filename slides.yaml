# PE#DC Duplicate Transaction ID — Architectural Observation (Added 4/28)

During code review of the search tool (fdi_txn_search_tool.py), Validation identified the following behavior for duplicate charge (PE#DC) disputes:

1. The search tool's `remove_duplicate_trans` function deduplicates results by the composite key (Amount, Date, MerchantName). For a genuine duplicate charge scenario (two transactions with identical amount, date, and merchant), the deduplication collapses them into a single record before returning results to the LLM. The LLM only ever sees one transaction.

2. The submit tool sends a single Casper payload with one `refNumber` (the surviving `disputedTransactionId`). The `origTxRefNumber` field, which the Casper swagger describes as "required only for PBOM - duplicate charge dispute reason code," is populated from the same `disputedTransactionId`, not from the second duplicate's transaction ID. The submit tool has no mechanism to send two transaction IDs in a single submission.

3. The second duplicate's transaction ID is never captured, never submitted to Casper, and never marked as disputed anywhere in the system.

**IV question:** Does Casper's downstream processing independently identify and link the second duplicate from the same account based on matching amount/date/merchant, or does it only act on the single submitted reference number? If the latter, the second charge may remain undisputed and the customer may need to file a separate dispute for it.

This is a business process question, not a model defect. The deduplication is by design (prevents presenting indistinguishable records to the customer). But the downstream consequence for PE#DC claims should be documented and confirmed with the model owner during IV. Added as Action Item 105.

