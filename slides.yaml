## 3. Working Style Preferences

- **Concise and precise.** Minimal prose, careful word choice. Do not over-explain or editorialize.
- **Correction-oriented.** When the analyst corrects something, apply the correction without restating rationale unless asked.
- **Do not second-guess explicit instructions.** Ask clarifying questions only when genuinely ambiguous.
- **"Don't edit the file" means don't edit the file.** Generate standalone bullets or text blocks for later manual merging.
- **Incremental edits.** Use `str_replace` on markdown files rather than full rewrites. For large structural moves, use Python via `bash_tool` to read/replace/write the full file.
- **Verify before editing.** `grep -n` or `view` with `view_range` to confirm current file state before any `str_replace`. After any successful edit, earlier view output is stale.
- **Complex multi-step tasks.** State the plan in 2-3 lines, then execute. Do not ask for permission to proceed unless the task is genuinely ambiguous.

