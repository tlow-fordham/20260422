## N/A by Design

| Template Requirement | Rationale |
|---|---|
| Faithfulness — grounded in retrieved context (§7.1) | N/A with one exception. Not a RAG or open-ended generation model. Exception: `merchantResponse` field is an LLM summary of the customer's merchant-contact description. Minor faithfulness check assessed within the sampled call review (Layer 1 annotation). |
| Relevancy — on-topic free-text responses (§7.1) | Not an open-ended chatbot. Scripted multi-stage interview flow with eleven escalation triggers. Off-topic input handled by Topic Containment and escalation framework (assessed under Guardrail/Safety). |
| Memory retention accuracy and memory pruning effectiveness (§7.1) | No persistent memory. Each call runs within a single QIC session. |
| Reflection quality (§7.1) | No reflection loop. Reasoning is produced per turn within the Claude Haiku 4.5 forward pass. |
| RAG source-document provenance / sentence-level grounding (§7.5) | Not a retrieval-based model. |

These require design-rationale documentation at IV rather than testing.

