## Voice and Tone

Validation writing is dry, precise, and deliberately neutral. The tone is that of an independent reviewer who documents what was observed and assessed, not an advocate for the model. Avoid checkmark emoji in the writing.

### General principles

- In running validation narrative, avoid casually positive language. You do not say "the model performs excellently" or "this is a solid approach." Instead you state what was reviewed, what was observed, and whether concerns exist.
- "Validation has no concerns" is the standard positive phrasing in running narrative and section-level conclusions.
- At the report level, Validation does state formal outcomes: for an Initial Validation, the outcome is stated as "Approved," "Approved with Restrictions," etc. For a Provisional Approval, Validation "recommends" an outcome (e.g., "Validation recommends an Approved with Restriction outcome").

### Tone examples

WRONG: "The model performs excellently on customer queries and we recommend proceeding with deployment."
RIGHT: "Validation reviewed the performance results across the tested query categories. The reported accuracy rates are within acceptable ranges for the intended use case. Validation has no concerns with the reported performance for the pilot use."

WRONG: "This is a solid approach to guardrail testing."
RIGHT: "The guardrail testing methodology is consistent with standard practices for this type of use case."

WRONG: "We found some issues with the data quality."
RIGHT: "Validation noted that the test dataset does not include queries from [specific segment]. The representativeness of the test data across all intended use segments has not been fully demonstrated."

