# Executive Summary

Validation grants Provisional Approval (PA) with time-bound restrictions for the temporary pilot production use of Model 7409 - Conversational AI in IVRs, which automates debit card dispute claim intake in U.S. Bank's contact center, from May 19, 2026 until November 19, 2026 (6-month pilot window). The pilot is restricted to two of twelve dispute types, duplicate charges (PE#DC) and incorrect amounts (PE#IA), representing approximately 23% of total dispute volume and less than 1% of overall IVR call volume based on actual experience over approximately the past year (see Appendix B for the full dispute type routing). All other dispute types and transactions exceeding $300 are automatically escalated to a human agent. A maximum of 3 dispute claims per customer within a 30-day period is enforced via the Casper eligibility API check. The model serves only U.S.-based debit card customers.

The provisional approval is based on the Model Risk Management Validation team's preliminary assessment of the model's conceptual soundness, development, performance, and risk mitigation strategies. Validation reviewed the limited documentation provided by the model owner and the model developer (AWS Generative AI Innovation Center) and engaged in multiple meetings, live demonstrations, and a two-day offsite during which Validation observed live SME testing across multiple breakout rooms followed by a synthesis of audience feedback to understand the model purpose, usage, architecture, construction, and performance.

Performance testing conducted by a Business Line Subject Matter Expert (SME) across 42 customer dispute scenarios, 9 guardrail and adversarial scenarios, and 1 stability test indicates that, after bug fixes and retests, all 25 Casper submissions were completed with correct field values (Successful Casper Submission Rate of 100%, against a >=90% threshold) and 0 of 42 dispute type classification decisions were incorrect (Intake Error Rate of 0%, against a <=10% threshold). The SME made live calls to the User Acceptance Testing (UAT) IVR and compared Casper field values against what was said during the conversation. Testing was conducted in two phases: Phase 1 tested the full workflow via human voice on Version 9 (V9), and Phase 2 used DeepEval automated regression to confirm no degradation after bounded, business-driven changes in Version 10 (V10). Detailed results are documented in the Model Performance section.

Guardrail testing covered Personally Identifiable Information (PII) protection, model/system prompt disclosure, tool disclosure, jailbreak attempts, off-topic injection, toxic/abusive caller handling, hallucination prevention, and non-standard utterances across 9 dedicated test cases. All guardrail test cases passed after prompt tuning. Guardrails are implemented at multiple layers: prompt-based instructions (11 enumerated escalation triggers, dedicated PII handling protocol, mandatory tool invocation rules), real-time Bedrock Guardrails (content filtering across 6 categories at HIGH strength, PII/Payment Card Industry (PCI) protection with anonymize/block actions, prompt attack detection on input), and the inherent safety properties of the primary reasoning and generation Large Language Model (LLM), Claude Haiku 4.5 (Anthropic AI Safety Level 2 classification, 100% harmful code refusal). Systematic output toxicity testing, data exfiltration testing, and formal red teaming are deferred to Initial Validation (IV); SME testing did not surface issues in these areas, but systematic coverage was not the objective at the PA stage.

Validation notes that early SME testing surfaced bugs in tool code and prompt coverage that have since been remediated and retested, including a systematic pattern where the contact person name (the name of the person the customer spoke with at the merchant) captured in conversation was not written to the Casper Application Programming Interface (API) payload, and a $0 dispute amount for duplicate charges. Both were resolved during the Early Engagement period; Validation has no remaining concerns with these items. All pilot-stage and pre-full-production recommendations are documented in the Conclusion.

The acceptable performance under constrained pilot conditions, together with the four pilot restrictions (time-bound pilot window, scope limited to duplicate charges and incorrect amounts, a $300 transaction ceiling, and a 3-claim-per-30-day customer rate limit) and supporting risk mitigations (automatic escalation to human agents, store-and-forward data persistence on API failure, real-time monitoring via Nova Pro V1 with Severity 2 (SEV2) alerting, and Bedrock Guardrails for content/PII/PCI filtering), support the "Approved with Restriction" outcome.

