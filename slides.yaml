# Provenance and Traceability — Full Detail

The PA report covers the logging architecture in summary form (three log sources today plus the V10 eligibility tool log, ContactId-keyed across all sources, sufficient for pilot oversight). The full per-log content description and the end-to-end submission walkthrough used during PA review are preserved here for IV depth review.

## Three-Log Walkthrough — Single PE#IA Submission (case reference D-260320000682)

The model owner provided three log types for each test case, demonstrated via an end-to-end incorrect amount submission (case reference D-260320000682). Together, these logs form a complete traceability chain from customer speech through to Casper submission:

1. **Conversation transcript (Conversation Analytics JSON, streamed to S3):** Turn-by-turn record containing rawInputTranscript (the STT output from Nova Sonic, i.e. what the system heard the customer say) and messages.0.content (the LLM's response to the customer). Each turn is timestamped.

2. **FDI_SEARCH_TOOL Lambda CloudWatch log:** Records the search query parameters the LLM constructed (Merchant: "Sass Food", Date: 20251226, Amount: 8, TypeOfDispute: Incorrect Amount), the fuzzy matching execution (date range 12/23-12/29, amount +/-10%, merchant fuzzy match 0 hits due to blank MerchantName in test data), the DynamoDB results (3 eligible transactions returned), session state merge, and the final response sent back to the LLM. This log exposes the intermediate step between what the customer said and what the LLM had to work with for transaction selection.

3. **FDI_SUBMIT_TOOL Lambda CloudWatch log:** Records the complete Casper API payload submitted, including all field values as transformed by the tool code: natureOfDispute: PE#IA, amountDisputed: 2.0 ($8 charged minus $6 expected), hasAttemptedToResolve: Y, contactDate: 20260105, contactPerson: the model owner, contactMethod: Phone, merchantResponse: "Merchant agreed and said the bank should take care of it", noShowOrPartialPrePayment: Y. The log also records the API response (HTTP 200, case reference D-260320000682) and timing (6.43 seconds for the API call).

All three logs are keyed by ContactId, enabling end-to-end trace reconstruction for any given call. A reviewer can follow a single customer interaction from the STT transcription of their first utterance, through the LLM's classification and data collection decisions, into the tool call parameters and database results, and finally to the exact Casper API payload and response.

**Validation Commentary:**

The three-log architecture provides sufficient provenance and explainability for PA purposes. For any disputed or anomalous submission, it is possible to reconstruct which customer utterances produced which Casper field values and identify where in the pipeline an error occurred (STT, LLM reasoning, tool code, or API). With the addition of the eligibility tool in V10, a fourth Lambda CloudWatch log is now generated for the eligibility check step; the logging architecture is expected to extend to four log sources for V10 conversations, though MRM has not yet reviewed an eligibility tool log sample. CloudWatch logging is active with 6-month retention. A QIC trace log reviewed by Validation contains the full LLM invocation context (system prompt, expanded tool schemas for all five tools, complete conversation history, and tool call results), demonstrating that LLM reasoning-level traceability is available. Open items for IV: confirm this logging is retained in production with the same fidelity, and determine whether there is an automated mechanism to pull the full trace for a given ContactId or whether manual log retrieval across four sources (S3, CloudWatch search tool, CloudWatch eligibility tool, CloudWatch submit tool) is required.

### Provenance Verification

Validation performed a detailed end-to-end walkthrough of a multi-claim session (one PE#IA and one PE#DC submission on the same call), reconstructing the full trace across all three log sources. Key findings include correct PE#IA amountDisputed calculation ($10.19 - $5.19 = $5.00), correct PE#DC full-amount assignment ($11.87), successful recurring transaction eligibility check, and correct regulatory disclosure re-read for the second claim.

