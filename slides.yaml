# System Prompt Change History

The system prompt evolved through four iterations during the PA review period: March 11 (initial, with Search and Submit custom tools), March 17 (interim), March 28 (Version 9, the pilot-candidate version that incorporated all early-engagement remediations with Search and Submit custom tools), and April 15 (Version 10, adding the Eligibility custom tool and restructuring the stage flow). All early-revision observations were addressed before pilot; the PA report documents resolution inline. The April 15 Version 10 walkthrough below documents the structural changes (Disclaimer stage removed, Transaction Eligibility Check stage added) supporting the V10 assessment in the PA report. IV follow-ups arising from V10 are captured in Part 2.

### Early-Engagement Detail — March 11 Baseline to April 15 V10 Material Changes

The PA report summarizes the 12 material changes between the March 11 baseline and the April 15 V10 in compressed form. The following preserves the underlying SME testing evidence, JIRA story IDs, Item references, and prompt-section anchors that supported the validation assessment of each change. This detail is retained here for IV reference and audit traceability.

1. **Disclaimer stage removed.** The March 11 prompt included a Disclaimer stage requiring the LLM to read a disclaimer and obtain explicit acknowledgment. SME testing revealed barge-in vulnerabilities (DDIAI-131) and inconsistent handling of non-standard utterances at consent points (DDIAI-132). The model owner removed the disclaimer from the AI agent entirely and moved it to a traditional IVR yes/no prompt upstream, eliminating the LLM-dependent consent interpretation risk. (Validation-driven, Items 78, 79.)
2. **Transaction eligibility check added.** A new stage and tool (`usb_fdi_eligibility_tool`) verify the transaction is eligible for dispute immediately after the customer confirms the transaction, before the interview continues. Previously, eligibility was checked only at submission. (BL and Casper API team driven.)
3. **Issue identification substantially rewritten.** The March 11 prompt had a brief list of responsibilities for dispute type classification. The April 15 version includes a structured three-step decision tree (Is it incorrect amount? Duplicate? Neither → escalate), an explicit list of non-qualifying dispute types with instructions to escalate without follow-up questions, trigger phrases for immediate escalation (e.g., "service wasn't provided," "merchant backed out"), and clarifications for legitimate incorrect amount scenarios (receipt vs. charge discrepancy, discount not applied, quantity errors). Credit processing escalation triggers are narrowed to true credit card processing issues at the processor level. (Partially validation-driven per Item 80; partially BL-initiated.)
4. **Escalation triggers expanded and restructured.** The March 11 prompt relied on a single implicit trigger (out-of-context counter reaching 4). The April 15 version defines 11 explicit escalation triggers, including two new triggers for account information changes and account security concerns. The disclaimer refusal and communication difficulties triggers were removed (disclaimer is upstream; communication handling revised). All triggers now reference a unified escalation pattern defined once in `<core_behavior>` and invoked consistently throughout the prompt. (Validation-driven, Items 77-81.)
5. **Mandatory escalation tool invocation.** SME testing revealed cases where the AI sent a transfer message but did not invoke the Escalate tool, effectively terminating the call (DDIAI-140). The April 15 version includes a unified escalation pattern requiring: inform customer → invoke Escalate tool immediately → stop all processing. (Validation-driven, Item 81.)
6. **PII handling protocol added.** The March 11 prompt had no structured PII protocol. SME testing showed the AI asked up to 7 times before escalating on PII requests (DDIAI-57) and made 15 attempts with no escalation on model disclosure requests (DDIAI-59). The April 15 version includes a dedicated `<pii_handling>` section with a 2-attempt escalation threshold. (Validation-driven, DDIAI-57 and DDIAI-59.)
7. **Merchant contact and Casper field accuracy.** The March 11 prompt did not specify Casper field names for merchant contact fields. SME testing revealed `nameOfContacted` was blank in completed cases (DDIAI-66) and $0.00 dispute amounts were accepted (DDIAI-41). The April 15 version explicitly names the `noSuccessContactReason` field, clarifies the N/U path routing, and adds $0 expected amount escalation logic. (Validation-driven, Items 25, 26.)
8. **Merchandise/Service collection and incorrect amount coverage.** The March 11 prompt omitted the Merchandise vs. Service question and had minimal guidance for the incorrect amount dispute path. Root cause investigation (DDIAI-87/DDIAI-127) traced a submission error to the missing collection step. The April 15 version adds an explicit M/S question, the expected amount question, the no-show/pre-payment question for PE#IA disputes, and the $0 escalation rule. (Validation-driven, Items 9, 34.)
9. **Disclosure text rewritten.** The verbatim regulatory disclosure read to customers was rewritten from a formal legal tone to a softer, empathetic tone. A new instruction for receipt upload via online or mobile banking was added. (BL-initiated.)
10. **Counter tracking and out-of-context handling.** The out-of-context threshold was reduced from 4 to 3 attempts. Counters now reset at the start of the conversation rather than at disclaimer acknowledgment. Three separate counters (OOC, PII, data validation) replace the single counter. (Validation-driven and BL-initiated.)
11. **Transaction identification refinements.** The purchase reason question changed from "always ask" to "ask only once." A year-prompting instruction was added for dates without a year (six-month lookback window). Escalation messages consolidated into the unified escalation pattern. The instruction to not repeat the merchant's name back to the customer was added. Separately, the Confirmation stage was materially simplified: the March 11 version directed the AI to give the customer a final opportunity to change their mind, listen for hesitation, not rush the stage, and route back to negotiation on amount changes, while the April 15 version directs the AI to proceed to disclosure unless the customer explicitly asks to change something and to offer adjustment only if the customer spontaneously mentions concern. This shifts the Confirmation stage from proactive adjustment prompting to passive acceptance unless customer-initiated. (Validation-driven and BL-initiated.)
12. **Empty user input handling formalized.** The March 11 prompt handled empty customer input with a single instruction to apologize once and then invoke the Complete tool to end the conversation. The April 15 version formalizes a three-attempt protocol (two apology-and-retry attempts followed by escalation to a human agent via the unified escalation pattern) and adds empty user input as an enumerated escalation trigger (Trigger 9). The change routes non-responsive callers to a human agent rather than silently terminating the session. (BL-initiated.)

### Updated Prompt (April 15, 2026) — Version 10

The model developer walked Validation through a further revised system prompt on April 15, 2026 (Version 10 per the Connect orchestration prompt configuration: `usb_fdi_orchestration_prompt_unlimitedAI`, Published, Version 10). This revision introduced two structural changes to the conversation flow and one new tool:

**Change 1: Disclaimer stage removed from AI agent scope (validation-driven).**

The disclaimer is now handled as a traditional IVR prompt (yes/no button press) upstream of the AI agent. The caller presses a button to acknowledge before reaching the AI agent; callers who decline are routed to a human agent without entering the AI flow.

This change is validation-driven. MRM flagged two risks during the PA review:

- Item 78 (DDIAI-131): A caller who said "No" to the disclaimer barged over the escalation prompt and continued the dispute flow. The LLM did not reliably enforce the consent boundary.
- Item 79 (DDIAI-132): Non-standard utterances at the disclaimer and disclosure ("uh huh," "ok," "thanks," "NAHH") were accepted or rejected inconsistently by LLM interpretation. MRM's position was that consent to a regulatory disclaimer should have defined acceptance criteria, not rely on LLM interpretation.

By moving the disclaimer to a traditional IVR yes/no prompt, the model owner eliminates the LLM-dependent consent interpretation risk entirely. The AI agent no longer participates in the consent flow at all. This is a positive design change that removes a model risk concern.

**Change 2: Transaction Eligibility Check stage added (BL and API team driven).**

A new Stage 3 ("Transaction Eligibility Check") was inserted between Transaction Identification and Merchant Contact. A corresponding new custom Lambda tool (`usb_fdi_eligibility_tool__eligible_transactions`) calls the Casper eligibility API to verify the transaction is eligible for dispute before the interview continues. If eligible, the conversation proceeds to Merchant Contact. If ineligible (e.g., recurring transaction, or other Casper-side rejection), the AI informs the customer and escalates to a human agent with the reason.

Previously, this eligibility check was embedded inside the submit tool code (`fdi_submit_case_tool.py`). This meant the eligibility API was only called at the very end of the conversation during claim submission. If the transaction was ineligible, the customer had already completed the full interview (merchant contact, confirmation, disclosure) before being told the dispute could not proceed. The Casper API team identified this as a poor customer experience and requested the eligibility check be moved earlier.

The eligibility API call logic was removed from the submit tool code. The submit tool now handles only the final claim submission.

**Change 3: Year prompting logic retained.**

The agent still explicitly asks the customer for the year if omitted from the transaction date. The model developer confirmed this is intentional: the search window covers six months of transactions, so a customer saying "January 26th" in early 2026 could mean January 2025 or January 2026, and defaulting to the current year would be unreliable for border cases.

