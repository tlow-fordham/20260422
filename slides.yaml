The performance metric denominators are drawn from this table as follows. The Intake Error Rate denominator is 42 customer dispute scenarios (17 PE#IA + 9 PE#DC + 1 multi-claim + 15 out-of-scope), which represent all cases involving a dispute type classification decision. The Successful Casper Submission Rate denominator is 25 Casper submissions. Of the 27 in-scope scenarios, 24 produced a single Casper submission, 1 (DDIAI-91, multi-claim) produced 2 submissions, and 3 did not produce a submission: 2 PE#IA scenarios were designed to test escalation paths within an incorrect-amount conversation (DDIAI-110, DDIAI-97), and 1 PE#IA scenario tested the case where the customer completed the interview but declined to submit (DDIAI-40). Each submission is counted separately (24 + 2 - 1 = 25). The 9 guardrail/adversarial scenarios and the 1 infrastructure/stability scenario are excluded from both denominators because they do not involve a dispute type classification decision or a Casper submission.

