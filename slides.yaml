slides:

  - layout: "title"
    title: "Regulatory Foundation for Agentic AI Validation"
    subtitle: "Key principles from SR 2026-13a and OCC 2011-12 that support a tailored approach"
    quotes:
      - label: "PROPORTIONALITY"
        text: "A banking organization may tailor portions of its model risk management practices that are relevant to the risks posed by a particular model and with a level of rigor commensurate with that risk."
        source: "SR 2026-13a, Section III"
      - label: "METHOD FLEXIBILITY"
        text: "Outcomes analysis can take many forms, including testing conducted during model development, reports or analysis performed as part of ongoing monitoring, or standalone activities such as back-testing or outlier analysis."
        source: "SR 2026-13a, Section V"
      - label: "TESTING OWNERSHIP"
        text: "Model testing is a core component of model development... The specific approach depends on the model's characteristics. The rigor of effective testing is commensurate with model complexity and materiality."
        source: "SR 2026-13a, Section IV"
    footer: "Key framing: GenAI and agentic AI are explicitly outside SR 2026-13a scope (Footnote 3). The bank has both the obligation and the latitude to develop a tailored framework applying these principles, not mechanically extending traditional-model prescriptions."

  - layout: "cards"
    title: "Proposed Changes to GenAI Validation Template"
    subtitle: "Five targeted revisions grounded in SR 2026-13a principles and Model 7409 experience"
    cards:
      - heading: "Organize by Risk Category"
        section: "Sections 8.1, 8.2"
        body: "Structure agentic assessments around eight risk categories (tool selection, data isolation, escalation reliability, etc.), not around specific methods. Let each risk accept multiple evidence types."
      - heading: "Architecture Classification Gate"
        section: "Section 7.3"
        body: "Before applying agentic checklists, classify the agent pattern (ReAct, Plan-and-Execute, multi-agent), which components exist, and whether tool selection is structural or probabilistic. Apply assessments selectively."
      - heading: "Structural Enforcement as Evidence"
        section: "Sections 7.3, 8.1, 8.2"
        body: "Where architecture makes a risk structurally infeasible (code prerequisites, schema validation, session-scoped data), document as closing evidence. Scope down testing for that category. Deterministic enforcement is stronger than probabilistic testing."
      - heading: "Pre-Launch / Production Split"
        section: "Section 8.1"
        body: "Structure as 8.1.1 Pre-Launch Outcomes and 8.1.2 Pilot/Production Outcomes. Different evidence types answer different questions. Consistent with both SR 2026-13a and OCC 2011-12 on staged outcomes analysis."
      - heading: "Evaluator Model Documentation"
        section: "Sections 8.1, 8.2"
        body: "When LLM-as-Judge is used (by MO or Validation), require disclosure of evaluator model, justification for independence, and limitation notes. An evaluator from the same LLM family as the model under review is not independent."
    callout: "These are not about lowering the bar. They direct validator effort toward assessments that produce meaningful evidence for the architectures we are actually seeing, and away from assessments that would produce trivial or unreliable results."

  - layout: "two_column"
    title: "Agentic AI Validation Best Practices"
    subtitle: "Lessons from Model 7409 (IVR Dispute Intake) and Model 7637 (RAG Q&A)"
    left_header: "Tool Selection: Two Categories"
    left_sections:
      - heading: "Category 1: High Tool-Discretion"
        bullets:
          - "Many tools (10+), LLM has full discretion on sequence."
          - "Compute precision, recall, F1 per step or use LLM-as-Judge."
          - "Example: research agent with 30 tools spanning multiple domains."
      - heading: "Category 2: Low Tool-Discretion, Structurally Enforced"
        bullets:
          - "Few tools, code-level prerequisites enforce sequence."
          - "Rely on tool error counts, retry counts, outcome metrics, sampled trace review."
          - "Model 7409: 5 tools (Search, Eligibility, Submit, Escalate, Complete). Eligibility requires transaction ID from Search. Submit requires Eligibility success. Out-of-order calls fail as recorded Tool Errors."
          - "Model 7724: Agentic Python libraries but fixed prompt calls same 4 tools in same order every time."
    right_header: "Validation Practices"
    right_sections:
      - heading: "Testing gate"
        body: "Validation starts only when MO testing (final output + intermediate) is complete and documented. Validation does not substitute its own testing where it lacks expertise or access."
      - heading: "Structural mitigations"
        body: "Session-scoped data stores (e.g., ContactId-filtered DynamoDB) close data exfiltration risk by architecture. Document as closing evidence, not background."
      - heading: "Metrics by risk intent"
        body: "Map MO metrics to the risk they mitigate, not to template vocabulary. Tool Error covers tool selection; Intake Error Rate covers classification accuracy; CSAT covers output quality."
      - heading: "Staged evidence"
        body: "Pre-launch (SME, synthetic) and pilot (real calls, runtime telemetry) answer different questions. Structure the IV accordingly."
      - heading: "Evaluator validation"
        body: "If Nova Pro V1 scores every production call for safety, its accuracy is a dependency. Require evaluator model documentation at IV."
      - heading: "Absent components"
        body: "If architecture has no planning module, memory store, or reflection loop, document the design rationale. Do not test components that do not exist."
    footer: "MRM Validation -- AI Center of Excellence | Grounded in SR 2026-13a, OCC 2011-12 | April 2026"
