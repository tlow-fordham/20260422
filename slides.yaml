## 3. Testing Approach Discussion

**Test case ownership**
- John clarified that test case development will be done by the platform team, not business line SMEs, because the testing objective is whether the IVR response matches the content in the knowledge base article, not whether the article content itself is accurate (article accuracy is handled separately through CAD approvals)
- Jordan noted that SME involvement is still needed to curate and verify the ground truth in test cases, citing an example from prior DeepEval testing where an incorrect expected answer in the test case caused a false failure in grading

**DeepEval test case structure**
- Aditi walked through the DeepEval test case format used for a prior model
- Each test case includes a user scenario description, expected outcome, and grading metrics
- Jordan noted that the expected outcome must accurately reflect the scenario to avoid false failures; in one prior test case, mismatched data between the scenario description and the expected answer caused an unfair grade

**Multi-turn capability**
- Baloo confirmed that the model supports multi-turn conversations
- The AI can ask clarifying questions (e.g., offering to deliver a multi-step answer one step at a time)
- Single-turn interactions also occur depending on the query

**SME vs. automated evaluation**
- Jinjun stated that both SME evaluation and automated evaluation are required for initial validation
- The automated evaluation uses an LLM-as-Judge approach, but the SME evaluation is needed to verify that the automated scoring is trustworthy before scaling
- If the SME evaluation confirms that the automated evaluation is reliable, automated evaluation can be scaled for ongoing monitoring

**Evaluation criteria discussed**
- Accuracy: the response matches the article content
- Completeness: no important steps or information are missing
- Faithfulness: the response is grounded in the retrieved article, not hallucinated
- Correct article retrieval: the model accessed the right article for the query
- Root cause attribution: distinguish retrieval errors (wrong article) from hallucination (correct article, fabricated content)

