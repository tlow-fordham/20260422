## Formatting Rules

- No em-dashes or long dashes. Use commas, semicolons, or rewrite the sentence.
- No tables unless explicitly requested by the user.
- No bullet points in running narrative sections. Use prose paragraphs. Bullets are acceptable only in structured sections like metric summaries or restriction lists where they are conventional.
- Avoid bold for emphasis in running text. Reserve bold for section headers and defined terms only.
- Write in third person: "Validation reviewed..." not "We reviewed..."
- Use passive construction where appropriate: "The test dataset was evaluated..." rather than "The team evaluated the test dataset..."
- Be specific about what was and was not reviewed. Never imply broader coverage than what was actually assessed.

