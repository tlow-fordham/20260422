# Bedrock Guardrails Configuration Details

This section documents the detailed Bedrock Guardrails configuration from the Terraform IaC (tagged UAT environment, guardrail name "UAT_Bedrock_Guardrails"). UAT-to-production parity applies.

## Content Policy

| Category | Input Strength | Output Strength |
|----------|---------------|-----------------|
| Sexual | HIGH | HIGH |
| Violence | HIGH | HIGH |
| Misconduct | HIGH | HIGH |
| Hate | MEDIUM | HIGH |
| Insults | MEDIUM | HIGH |
| Prompt Attack | HIGH | NONE |

The MEDIUM input threshold on Hate and Insults is a design choice for a dispute call center context, as frustrated customers may use language that triggers higher sensitivity thresholds, and false positives would disrupt legitimate calls. The HIGH output threshold ensures the AI itself does not produce hateful or insulting language. Prompt Attack filtering is HIGH on input but NONE on output; see the Validation Observations in the Guardrail Testing section for the implications.

## Sensitive Information Policy (PII/PCI)

Two tiers of protection are configured:

**ANONYMIZE (data is masked but call continues):** Email, Phone, Name, Username, Driver ID

**BLOCK (call is interrupted):** Credit/debit card numbers, Card Verification Value (CVV), PIN, Social Security Number (SSN), bank account/routing numbers, ITIN, US passport number, passwords, AWS access/secret keys, international equivalents (IBAN, SWIFT code, CA health/social insurance numbers, UK NHS/NI/taxpayer numbers)

## Custom Regex Patterns

| Pattern Name | Regex | Target |
|-------------|-------|--------|
| Account Number | `XXXXXX1234` format | U.S. Bank account number format |
| US SSN | `XXX-XX-XXXX` format (3 digits, hyphen, 2 digits, hyphen, 4 digits) | Social Security Numbers |
| Japan My Number | 12 consecutive digits | Japanese national ID |
| Polish PESEL | 11 consecutive digits | Polish national ID |
| Ireland PPSN | 7 digits followed by 1-2 letters | Irish Personal Public Service Number |
| UK NI Number | Standard UK National Insurance format | UK National Insurance Number |
| UK Passport | Standard UK passport number format | UK passport |
| Poland Passport | Standard Polish passport number format | Polish passport |

## Profanity Filter

A managed profanity word list is active, with a custom word entry for "HATE."



