## Writing Templates

### Opening a validation section

```
Validation reviewed [what was reviewed] as documented in [source documents].
The assessment is based on [scope of review]. [Any scope limitations noted here.]
```

### Noting a gap (without elevating to a Finding)

```
Validation noted that [specific observation]. [Why it matters in one sentence.]
The model owner may consider [suggested action] to address this gap prior to
[full validation / broader deployment].
```

### Noting a gap that is part of a formal Finding

```
Validation noted that [specific observation, e.g., the exact LLM version and
hyperparameters are not documented in the Model Development Document, although
they have been communicated over email]. This is captured as part of Validation's
[priority level] Finding on [Finding name, e.g., Document Transparency].
```

### Positive assessment (running narrative)

```
Validation reviewed the [specific area] and has no concerns with the
[methodology / results / approach] as presented for [specific use context].
The [specific evidence] is sufficient to support [specific conclusion].
```

### Qualified positive (common for provisional approvals)

```
The information provided is sufficient to support the requested [provisional / pilot]
use. Although [specific gap], these gaps [will be addressed during / do not pose
material risks to] the [pilot phase / intended limited use], particularly given
[specific mitigants].
```

### Provisional Approval conclusion

```
Validation reviewed all available materials and held [N] discussions with
[parties] to understand the model's purpose, methodology, and performance.
Based on Validation's preliminary review of the high-level information provided,
[specific assessment]. Overall, Validation identified no immediate concerns that
would prevent proceeding with the pilot phase prior to completion of a full
validation. Given these considerations, Validation recommends an [Approved with
Restriction] outcome, permitting [time-bound / scope-limited] [pilot / production]
use of the model until [date].
```

### Initial Validation conclusion

```
Validation completed the Initial Validation of [Model ID and Name]. Based on
Validation's assessment of [scope], the outcome is [Approved / Approved with
Restrictions]. [Summary of any Findings issued and their priority levels.]
[Summary of any restrictions imposed.]
```

### Saving Files
```
All newly created, saved, or provided files must begin with the current date in YYYYMMDD format, followed by an underscore. For example, if the date is January 1, 2026, save files as "20260101_Tracker.xlsx" or "20260101_PA Report Draft.docx". When chatting the next day, the prefix should update to "20260102_". If a user provides a filename without the date prefix, add the prefix unless the user explicitly asks not to. Do not duplicate an existing valid YYYYMMDD prefix. If the current date is unclear, ask before saving.
```

### Model Names in Filenames and Deliverables

For model-specific files and deliverables, use the full model identifier and
model name in the format `Model-[ID] [Model Name]`. This applies to filenames,
meeting agendas, meeting minutes, validation reports, provisional approval
documents, special purpose validation documents, trackers, emails, and other
model-facing materials. Do not shorten the model name to only the model number
unless the user explicitly requests a short internal reference.

For filenames, preserve the full model name in a readable, filename-safe form
after the required `YYYYMMDD_` prefix. Keep the model ID hyphenated, such as
`Model-7637`, and do not drop parenthetical qualifiers that are part of the
model name.

Examples of full model names:

- `Model-7215 Vurbalize AI Sales Agent`
- `Model-7306 PayVIEW - GTM and MMP ChatBot`
- `Model-7409 Conversational AI in IVRs (Dispute Claim Submission)`
- `Model-7637 Conversational AI in IVR (Knowledgebase Integration)`

Example filenames:

- `20260518_Model-7215 Vurbalize AI Sales Agent_Meeting_Minutes.md`
- `20260518_Model-7306 PayVIEW - GTM and MMP ChatBot_Question_Tracker.xlsx`
- `20260518_Model-7409 Conversational AI in IVRs (Dispute Claim Submission)_Validation_Report.docx`
- `20260518_Model-7637 Conversational AI in IVR (Knowledgebase Integration)_Meeting_Agenda.md`


