# Development Data

All data referenced in this section is pre-production: the model has not yet been deployed to production, so all data used during development, testing, and PA review constitutes development data.

## Data Sources

Model 7409 uses a pre-trained foundation LLM (Anthropic Claude Haiku 4.5) without fine-tuning, custom training, or Retrieval-Augmented Generation (RAG). The LLM's pre-trained weights are derived from Anthropic's proprietary training corpus, which according to Anthropic's published documentation comprises a broad mix of publicly available internet text, licensed third-party data, data from contracted annotators, and internally generated data. The training approach involves extensive pretraining followed by reinforcement learning from human feedback (RLHF), including Anthropic's Constitutional AI methodology. U.S. Bank did not contribute training data and has no visibility into the specific composition of the training corpus.

All U.S. Bank-specific knowledge is embedded directly in the system prompt: dispute handling rules, the six-stage conversation flow, regulatory disclosure text (CAT-approved language), Casper field mapping instructions, and escalation triggers. No RAG pipeline, knowledge base articles, or external document retrieval is used.

The model receives two categories of input: customer speech (transcribed by Nova Sonic/Lex STT from live voice calls during SME testing) and transaction data (retrieved from Hogan via the Cassandra data layer, cached in a per-customer DynamoDB table with 60-minute TTL). The Search tool's ContactId-filtered queries are described in the Component Stack and Tool Architecture sections.

**Validation Commentary:**

The ContactId-filtered DynamoDB cache is a sound data isolation design. The search tool operates on a small, bounded dataset (a single customer's cached transactions), providing a structural mitigation against data exfiltration: even if an adversarial prompt attempted to direct the LLM to retrieve other customers' transactions, the DynamoDB query is filtered by ContactId at the code level, making cross-customer data access architecturally impossible through this tool.

## Output Data

The model produces three categories of output:

1. **Conversational responses (via TTS):** Spoken responses to the customer, synthesized by Amazon Nova Sonic / Amazon Lex
2. **Casper API payload:** A structured JSON payload submitted to Casper containing dispute claim details extracted and transformed from the conversation
3. **Session state and submission metadata:** The submit tool writes tool_execution_status and case_reference to QConnect session state on successful submission. On Casper API failure, collected dispute information is written to a separate DynamoDB store-and-forward table so data is not lost before escalation to a human agent.

## PII/Payment Card Industry (PCI) Handling

No card data touches the system. LPID (Legal Participant ID) is used instead of the debit card account number. LPID is the unique customer identifier in Hogan/CIS (customer master system) and is not PII. PII captured is limited to the customer's full name (cardMemberName), which is set as a contact attribute in the CTR during account authentication and read by the submit tool from session state. It does not pass through the LLM's context window. Transaction data uses tokenized account numbers.

## Provenance and Traceability

The model owner provides three log sources per call (Conversation Analytics JSON streamed to S3, FDI_SEARCH_TOOL Lambda CloudWatch log, FDI_SUBMIT_TOOL Lambda CloudWatch log), all keyed by ContactId. With the addition of the eligibility tool in the Prod version, a fourth Lambda CloudWatch log is generated for the eligibility check step. Together, these logs form a complete traceability chain from customer speech (STT transcription) through LLM reasoning, tool call parameters, and database results, to the Casper API payload and response. A QIC trace log reviewed by Validation contains the full LLM invocation context (system prompt, expanded tool schemas for all six tools, complete conversation history, and tool call results), confirming that LLM reasoning-level traceability is available.

**Validation Commentary:**

The logging architecture provides sufficient provenance and explainability for PA purposes. Validation independently performed end-to-end walkthroughs reconstructing the full trace across the available log sources, including a multi-claim session containing both PE#IA and PE#DC submissions on the same call. These walkthroughs confirmed that customer utterances can be traced through STT transcription, LLM reasoning, tool call parameters, and Casper API payload, and that key dispute-type-specific behaviors (PE#IA amountDisputed computation, PE#DC full-amount assignment, recurring transaction eligibility check, multi-claim disclosure re-read) are observable in the trace. CloudWatch logging is active with a 6-month retention period. Given that the pilot window also spans 6 months (June 9 through December 9, 2026), logs from the earliest pilot calls may expire before IV is complete; the model owner should confirm whether the retention period is sufficient to retain all pilot logs through the conclusion of IV, and extend it if necessary. The mechanism for cross-source trace retrieval (S3, CloudWatch search tool, CloudWatch eligibility tool, CloudWatch submit tool) is an open item for IV.

