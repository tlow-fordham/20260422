The production pilot deploys three foundation LLMs, each in a distinct role. Claude Haiku 4.5 serves as the primary conversational and reasoning model, processing customer utterances, managing conversation state across six stages, invoking tools, and generating responses. Amazon Nova Sonic 2 provides the speech-to-text and text-to-speech layer; the model developer stated that Nova Sonic uses Haiku 4.5 internally for language processing, meaning the conversational flow runs on a single foundation LLM with Nova Sonic providing the speech interface. Amazon Nova Pro V1 operates as an observability layer, monitoring conversation metrics in real time and raising SEV2 alerts when thresholds are breached; it does not participate in the customer interaction. The PA Request Form also lists Claude Sonnet 4.5 and Amazon Nova Pro 1.0 in evaluation roles (LLM-as-a-Judge, LLM-as-a-Tester); these models are used during development and testing and are not deployed in production.

### Validation Commentary

The benchmark scores cited below are assembled by Validation from publicly available data to provide context on the relative capabilities of the production models and industry comparators. BFCL (Berkeley Function Calling Leaderboard) V4 is the most directly relevant benchmark for Model 7409's core task of invoking tools from natural language input. Latency (mean response time across the benchmark) is included given the real-time IVR context.

| Benchmark | Haiku 4.5 (Conversational) | Sonnet 4.5 (Evaluation) | Nova Pro V1 (Monitoring) | Llama 3.3 70B | Mistral Large 2 | GPT-4.1 | GPT-5.2 |
|---|---|---|---|---|---|---|---|
| **BFCL V4 Overall** (tool/function calling) | **68.70%** | **73.24%** | 24.97% | 31.90% | 38.37% | 53.96% | 55.87% |
| **BFCL V4 Live Single Turn** | 78.68% | 81.13% | **78.53%** | 76.61% | 81.87% | 69.95% | 70.39% |
| **Latency (mean, seconds)** | **1.68s** | 4.31s | **2.25s** | 26.11s | 2.04s | 1.63s | 2.23s |

Note: Bolded cells indicate the benchmark dimension most relevant to each model's production role. Sonnet 4.5 (4.31s) and Llama 3.3 70B (26.11s) latencies would likely be unsuitable for a real-time voice conversation use case; Sonnet 4.5 is used only in an offline evaluation role, and Llama 3.3 70B is included as a comparator only.

Sources: All scores and latency from the Berkeley Function Calling Leaderboard V4 (gorilla.cs.berkeley.edu/leaderboard.html, last updated April 12, 2026; Patil et al., "The Berkeley Function Calling Leaderboard (BFCL): From Tool Use to Agentic Evaluation of Large Language Models," ICML 2025). All models evaluated using native function calling (FC) mode. BFCL V4 Overall Accuracy is the unweighted average of all subcategories (Agentic, Multi Turn, Single Turn, and Hallucination). BFCL V4 Live Single Turn uses real-world enterprise-contributed function definitions evaluated via Abstract Syntax Tree matching. Latency is the mean response time in seconds across the full benchmark as reported by BFCL.

BFCL V4 is the most directly relevant public benchmark for Model 7409's use case, as it evaluates a model's ability to accurately select, parameterize, and invoke functions from natural language input across serial, parallel, and multi-turn scenarios. The Overall Accuracy row reflects the full range of function calling capabilities, including agentic multi-step tool use, multi-turn conversation state management, and hallucination detection (incorrectly invoking a function when none is appropriate). The Live Single Turn row isolates single-turn function calling against real-world API definitions, which is the relevant subcategory for Nova Pro V1's monitoring role.

Validation has no concerns with the foundation model selection for the production pilot. Claude Haiku 4.5 ranks #6 out of 109 models on BFCL V4 Overall with 68.70%, the highest-ranked model in its cost and latency tier and substantially ahead of GPT-5.2 (55.87%, #16) and GPT-4.1 (53.96%, #20). This demonstrates strong function calling capability across the agentic, multi-turn, and single-turn categories relevant to the six-stage conversational dispute intake flow. Claude Sonnet 4.5 ranks #2 on BFCL V4 Overall with 73.24%, higher than Haiku 4.5 but at approximately 2.6 times the latency (4.31s vs. 1.68s); this higher accuracy at higher latency makes it well suited for its evaluation role (LLM-as-a-Judge), where response quality takes precedence over real-time conversational speed. Nova Pro V1 scores 78.53% on BFCL V4 Live Single Turn, nearly identical to Haiku 4.5 (78.68%), which is sufficient for its single-turn monitoring and alerting role where the task is metric extraction and threshold comparison rather than multi-turn conversation management; its low Overall score (24.97%) is driven by agentic and multi-turn subcategories that are not relevant to the monitoring use case. All models operate within acceptable latency bounds for their respective roles. None of these benchmarks directly measure performance on a structured voice conversation task with tool calling into a banking API; the SME evaluation results presented in the Performance section provide the primary evidence of model adequacy for this specific use case.

# Development Data

All data referenced in this section is pre-production: the model has not yet been deployed to production, so all data used during development, testing, and PA review constitutes development data.

## Data Sources

Model 7409 uses a pre-trained foundation LLM (Anthropic Claude Haiku 4.5) without fine-tuning, custom training, or Retrieval-Augmented Generation (RAG). The LLM's pre-trained weights are derived from Anthropic's proprietary training corpus, which according to Anthropic's published documentation comprises a broad mix of publicly available internet text, licensed third-party data, data from contracted annotators, and internally generated data. The training approach involves extensive pretraining followed by reinforcement learning from human feedback (RLHF), including Anthropic's Constitutional AI methodology. U.S. Bank did not contribute training data and has no visibility into the specific composition of the training corpus.

All U.S. Bank-specific knowledge is embedded directly in the system prompt: dispute handling rules, the six-stage conversation flow, regulatory disclosure text (CAT-approved language), Casper field mapping instructions, and escalation triggers. No RAG pipeline, knowledge base articles, or external document retrieval is used.

The model receives two categories of input: customer speech (transcribed by Nova Sonic/Lex STT from live voice calls during SME testing) and transaction data (retrieved from Hogan via the Cassandra data layer, cached in a per-customer DynamoDB table with 60-minute TTL). The Search tool's ContactId-filtered queries are described in the Component Stack and Tool Architecture sections.

**Validation Commentary:**

The ContactId-filtered DynamoDB cache is a sound data isolation design. The search tool operates on a small, bounded dataset (a single customer's cached transactions), providing a structural mitigation against data exfiltration: even if an adversarial prompt attempted to direct the LLM to retrieve other customers' transactions, the DynamoDB query is filtered by ContactId at the code level, making cross-customer data access architecturally impossible through this tool.

## Output Data

The model produces three categories of output:

1. **Conversational responses (via TTS):** Spoken responses to the customer, synthesized by Amazon Nova Sonic / Amazon Lex
2. **Casper API payload:** A structured JSON payload submitted to Casper containing dispute claim details extracted and transformed from the conversation
3. **Session state and consent metadata:** The submit tool writes tool_execution_status, agenticAIDisclosure, agenticAIConfirm, and case_reference to QConnect session state on successful submission. The agenticAIDisclosureRead and agenticAIConfirm flags are also set as contact attributes in the CTR. On Casper API failure, collected dispute information is written to a separate DynamoDB store-and-forward table so data is not lost before escalation to a human agent.

## PII/PCI Handling

No card data touches the system. LPID (Legal Participant ID) is used instead of the debit card account number. LPID is the unique customer identifier in Hogan/CIS (customer master system) and is not PII. PII captured is limited to the customer's full name (cardMemberName), which is set as a contact attribute in the CTR during account authentication and read by the submit tool from session state. It does not pass through the LLM's context window or the Bedrock Guardrails path. Transaction data uses tokenized account numbers.

## Provenance and Traceability

The model owner provides three log sources per call (Conversation Analytics JSON streamed to S3, FDI_SEARCH_TOOL Lambda CloudWatch log, FDI_SUBMIT_TOOL Lambda CloudWatch log), all keyed by ContactId. With the addition of the eligibility tool in V10, a fourth Lambda CloudWatch log is generated for the eligibility check step. Together, these logs form a complete traceability chain from customer speech (STT transcription) through LLM reasoning, tool call parameters, and database results, to the Casper API payload and response. A QIC trace log reviewed by Validation contains the full LLM invocation context (system prompt, expanded tool schemas for all five tools, complete conversation history, and tool call results), confirming that LLM reasoning-level traceability is available.

**Validation Commentary:**

The logging architecture provides sufficient provenance and explainability for PA purposes. Validation independently performed end-to-end walkthroughs reconstructing the full trace across the available log sources, including a multi-claim session containing both PE#IA and PE#DC submissions on the same call. These walkthroughs confirmed that customer utterances can be traced through STT transcription, LLM reasoning, tool call parameters, and Casper API payload, and that key dispute-type-specific behaviors (PE#IA amountDisputed computation, PE#DC full-amount assignment, recurring transaction eligibility check, multi-claim disclosure re-read) are observable in the trace. CloudWatch logging is active with retention sufficient for pilot oversight; production retention configuration and the mechanism for cross-source trace retrieval are open items for IV.

