## Document Architecture Rules

### Section discipline
Each section has one job. Section 2 states what we are doing and why (one to
two sentences). Section 3.2 states the outcome, restrictions, and next
validation activities. Section 5.3 provides the detailed rationale. Facts
introduced in one section should be cross-referenced, not repeated, in
subsequent sections. If the same date or fact appears in more than two
sections, consolidate.

### Date changes
When a document involves date changes (pilot extensions, milestone shifts,
deadline updates), state old and new dates in a clear before/after format at
first mention. Do not embed date changes in narrative prose without first
presenting them cleanly. Example: "Previous pilot period: 02/01/2026 through
08/01/2026. Revised pilot period: 05/04/2026 through 11/01/2026."
Downstream sections should reference "the revised pilot period" or "the
updated restriction date" without re-explaining the change.

### Avoid contradictory hedging
Do not use language that contradicts the document's stated position. If the
memo says the pilot has not started, do not write "the model has been
technically deployed." If the memo says no changes were made, do not introduce
qualifications that imply partial changes. State the position cleanly and let
the rationale support it.

### Restriction descriptions and date references
Restriction descriptions must be self-contained. For time-bound restrictions,
state both the start and end dates. A reader should understand the restriction
from the description alone without cross-referencing other sections.

When a restriction has just been modified by the document itself, do not refer
to it as "existing" or "current" without specifying the updated value. The
reader cannot tell whether "existing" means the pre-change or post-change
state. Either state the specific value or say "updated" or "revised."

### Deployment status language
If the document's position is that the pilot has not formally commenced, do
not introduce qualifications such as "the model has been technically deployed"
or "the system has been available." These undermine the stated position and
invite questions about whether the model is in production. State the position
cleanly and let the rationale support it.

### SPV Outcome Form section discipline
Section 2 states the validation purpose in one to two sentences: what is being
changed and why. Operational milestones, documentation timelines, and
monitoring logistics belong in Section 5.3 or an appendix, not in Section 2.

Section 3.2 Rationale states the outcome and the reasoning that supports it.
It does not re-narrate background already provided in Section 2 or Section 5.

### Distinguishing model changes
When flagging a model change that requires separate approval, name the change
precisely enough that it cannot be confused with a different pending change.
If multiple changes are under discussion, use the specific functional
description (e.g., "consolidating four candidate answers into a single
LLM-summarized response") rather than generic terms.

### Template compliance check
Before finalizing any document based on an MRM template, verify each section
against the template instructions. Check: (a) correct checkbox or dropdown
selection per footnote definitions, (b) required referral language for skipped
sections, (c) footnotes are not truncated, (d) restriction effective date
logic matches the restriction category per the template footnotes. Do not
assume a checkbox is correct without reading the corresponding footnote.

For the SPV Outcome Form specifically: footnote 2 defines that for time-bound
or single-use restrictions, the restriction effective date is the date of last
approved use (i.e., the pilot end date), not the sign-off date. Verify this
field against the footnote before finalizing.

