### Pipeline Manager — Detailed Walkthrough

**Creating a pipeline:** Pipeline Manager → Create Pipeline → enter name and description → Submit. A unique pipeline ID is generated.

**Adding nodes — two methods:**

1. From the UDF Manager: open a completed job in the job queue → click "Add Job to Pipeline" icon → name the node → select which pipeline → Submit.
2. From within the Pipeline Manager: Edit Pipeline → click "Add New Node" icon → name the node → select module (UDF Manager, or any no-code module like EDA, Feature Engineering, etc.) → select the specific UDF/operation → select which job version → Submit.

**Linking nodes:** Drag from the output connector of one node to the input connector of the next node. This creates the execution dependency and data flow.

**Mapping outputs between nodes:** Click on a downstream node → under "Output from Previous Node," select which dataset or result from the upstream node should be passed as input. This mapping is persistent — once set, rerunning the pipeline automatically flows the correct data through all nodes. To rerun the entire workflow on new data, only the first node's input needs to change.

**Running a pipeline:** Save Pipeline (validates the workflow) → click "Run Pipeline" icon → optionally enable remote worker → Submit. Execution history is viewable via the "View Execution History" icon. Successfully completed nodes turn green; click any node to view its results.

**Saving results:** Within any node's results, datasets can be marked "Ready to Use" via the toggle button, making them available in the data management module. Dataset names can be predefined in the UDF code.

**Limitation — partial pipeline execution:** Currently, you cannot selectively run a subset of nodes within an existing pipeline (e.g., skip nodes 1–3 and start from node 4). Workarounds: (1) run the specific UDF independently outside the pipeline, or (2) create a shorter pipeline starting from the desired node with direct input. Vivek acknowledged this as an improvement to consider.

