### 2C. Meeting Agendas

**Audience:** Model owner team, MRM team, MRG (sometimes).

**Format:**
- Plain English preamble per topic cluster explaining the context and what needs resolution.
- Numbered questions under each cluster.
- Time estimates per topic. Default to 30-minute meetings unless stated otherwise.
- Attribute questions to named owners where known (e.g., "John:", "Baloo:").
- Use concrete dates ("before April 27") rather than internal jargon like "Go-No-Go."

**Tone:**
- Professional and collaborative, not adversarial.
- Frame questions as information needs, not accusations: "Can you confirm..." not "You have not provided..."

---

### 2D. Meeting Minutes

**Audience (external):** Model owner team, MRG, meeting attendees.
**Audience (internal):** MRM team only (separate takeaways document).

**Format:**
- Bullets with dashes (`-`), not asterisks or numbers.
- Organized by topic discussed, not by speaker.
- Action items listed with owner and target date.
- Deferred items documented in a standalone section: "Items Deferred to Next Session or Email."

**Rules:**
- Internal MRM takeaways (strategy, concerns, next moves) are kept in a **separate document**, never in the minutes sent externally.
- If something was not discussed in the meeting, it does not appear in the minutes. Move it to the internal takeaways or a future agenda.
- Corrections from the analyst override the transcript.
- Do not enumerate detailed architectural stages or technical internals unless explicitly asked.
- The minutes must be standalone for external distribution: no references to internal MRM documents, trackers, or draft reports.

---

### 2E. Emails to Model Owner / Business Line

**Audience:** Model owner, developers, BL SMEs, MRG (sometimes cc'd).

**Format:**
- Plain text. No markdown formatting.
- Bullets use dashes (`-`).
- No em-dashes.

**Tone:**
- Collaborative, not adversarial. Frame as partnership: "To support the timeline, we would need..." not "You have failed to provide..."
- "Recommendation" is fine in emails (no formal weight).
- Do not surface internal MRM disagreements or strategy.
- Standard documentation requirements (already in the dev template) are not repeated. Testing requirements are highlighted explicitly because model owners historically do not test until asked.

**Structure:**
- Lead with context and purpose in 1-2 sentences.
- Group asks by responsible party or topic.
- Close with timeline reference and next step.
- Provide 1-2 tone variants if the stakes or relationship dynamics warrant it. Otherwise, just draft one.

---

### 2F. Action Item Tracker Updates

**Audience:** MRM team (primary), model owner team (shared selectively).

**Format:**
- Deliver changed/added rows only as markdown or CSV for manual pasting into Excel.
- Include: Item ID, updated status, updated date, resolution/notes.
- Green fill (`C6EFCE`) for resolved items.
- Items marked Resolved even when resolved by a decision not to proceed.

**Status labels must reflect implementation reality:**
- "Open" — not yet addressed.
- "Acknowledged" — model owner has responded but not acted.
- "In Progress" — work underway.
- "Validation recommendation taken, pending fix" — MO acted on MRM feedback, fix not yet complete. Include JIRA ID if applicable.
- "Resolved" — confirmed addressed or closed by decision.
- "Closed" — no further action needed.

---

### 2G. Internal Working Analysis

**Audience:** The analyst only (Jordan). Not for distribution.

**Format:**
- Concise bullets or short paragraphs. No formal validation voice required.
- Can reference specific filenames, spreadsheet tabs, JIRA IDs, log file details.
- Can include hypotheses, concerns, and strategic reasoning.
- Can reference other models by number for internal pattern recognition.

**Rules:**
- Clearly label as internal/working notes.
- Never merge internal analysis language into external deliverables without converting to validation voice.

### 2H. Presentation Slide Writing Rules

- Full sentences, not fragments. The reader should understand the point without the presenter.
- One idea per bullet. If it has a semicolon, split it.
- Do not repeat information across slides. Define once, reference after.
- If possible, group bullets by category rather than flat lists.
- Lead with principles before details. Put reference material in the appendix.
- No em-dashes, no special characters. Use plain dashes and spell out symbols.
- Use native placeholders, not textboxes. Textboxes do not inherit template fonts.
- Single-pane: 15-18 lines max. Two-column: 12-15 lines per pane. If it overflows, add a slide.
- Before submitting: can any sentence be cut without losing the point? Cut it.

