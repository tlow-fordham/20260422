## DataRobot Discussion

Gopal Vemu provided context on DataRobot's current deployment at U.S. Bank:

- The marketing team currently uses the on-prem version of DataRobot, reading SAS datasets directly without format conversion. This capability should carry over to the cloud version.
- Running SAS code (not just reading SAS datasets) on DataRobot is an open question. Gopal committed to checking with the DataRobot team.
- A "Notebooks" feature exists in the cloud version but is not yet enabled in U.S. Bank's environment. It is being enabled incrementally.
- DataRobot is currently available in the IT environment only, not UAT or Prod. Both environments will have the same capacity.
- Gopal reported no Azure-related stability issues with DataRobot's UI, in contrast to the connectivity issues reported during Nimbus training sessions.
- Time series functionality exists in DataRobot (was experimented with 3-4 years ago by other teams on the on-prem version). Regression models are supported as core functionality.

A team member asked whether DataRobot has been used by teams working with statistical models, particularly regression and time series. Gopal confirmed the capability exists and encouraged testing on the latest cloud platform.

---

## SR 2026-13a and Requirements Discussion

Jordan Low asked whether the new SR 2026-13a changes the platform evaluation criteria or comparison targets. Casandra stated that the new guidance does not materially change MRM's requirements. It emphasizes a principles-based approach rather than strict prescriptive requirements, but MRM already operates with a risk-based approach (model risk ratings, validation frequencies based on ratings). The new guidance provides better justification for process improvements MRM was already considering, but does not drive a fundamentally different set of platform requirements.

Jordan also raised that SR 2026-13a suggests lower-risk model performance testing could be pushed toward monitoring, which would change the priorities for an automation platform. Casandra noted this was already under consideration. If validation timelines are pushed out, monitoring becomes more important, and how to balance both is still being determined.

---

## Nimbus Azure Stability Question

Jeeta asked Gopal whether DataRobot's Azure infrastructure experiences the same stability issues that Nimbus has encountered (connectivity drops, "no healthy upstream" errors). Gopal reported no such issues with DataRobot's Azure deployment.

