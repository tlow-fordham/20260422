## Casper API Integration

The Casper API (IVR Dispute Claim swagger.yaml, v1.0.3, last updated February 27, 2026) accepts a structured JSON payload containing account information, transaction details, and interview responses. The field-level mapping from tool schema inputs through tool code processing to Casper API fields is documented in the Tool Architecture section and Appendix A.

### API Error Handling and Data Persistence

The Casper API validates payload structure but not semantics. A well-formatted but factually incorrect payload (e.g., a year inference error producing "20241126" instead of "20251126," or a subtly wrong amount) would be accepted and create an incorrect dispute record.

Validation's review of the Lambda submit tool code confirms that error handling is implemented: non-200 API responses return an escalation message to the LLM, already-disputed transactions are caught and escalated, recurring transactions are detected for duplicate charges, and missing transaction IDs trigger escalation. The system prompt instructs the AI to apologize and transfer to a human agent on tool failure after a small number of retries.

A store-and-forward mechanism exists: when the Casper API fails, collected dispute information is written to a separate DynamoDB table so the data is not lost. The customer hears a technical error message and is transferred to a human agent. A SEV2 incident is raised automatically and the standard production incident response process applies.


**Validation Commentary:**

The model performs multiple inference types beyond simple data extraction, including dispute classification, transaction matching, temporal inference (date parsing and year inference), entity normalization (merchant name matching), and format transformation (natural language to rigid schema). Each of these introduces a distinct failure mode. The silent acceptance of well-formatted but incorrect payloads means that errors may not be caught at submission time and could propagate into downstream dispute processing. Validation recommends the model owner implement post-submission reconciliation checks and monitoring to detect incorrect claim data during the pilot.

## LLM Configuration

The production pilot uses three LLMs, confirmed in the updated architecture document (v09).

**Production Pilot Models:**

