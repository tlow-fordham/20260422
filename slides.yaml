## Terminology Rules (Legally Sensitive)

Several terms have formal regulatory and legal definitions in Model Risk Management. They are not banned, but they must be used only in their correct context. Using them casually in running narrative can trigger formal governance processes or misrepresent the severity of an observation.

### Finding

"Finding" has a formal MRM definition. A Finding is a documented deficiency that triggers official remediation tracking and committee reporting.

- **Correct use:** Referring to an actual formal Finding. Example: "This observation is part of Validation's low-priority Finding on Document Transparency." or "Validation issued a Finding related to insufficient model documentation."
- **Incorrect use:** Using "finding" casually in running narrative to describe an observation. Example: "Validation's findings suggest the model is performing adequately." Use "Validation noted that..." or "Validation observed that..." instead.

### Recommendation

In validation reports, "recommendation" carries formal weight when issued as part of a Finding.

- **Correct use in IV reports:** As part of a formal Finding: "Validation recommends that the model owner provide full hyperparameter documentation prior to the next annual review."
- **Correct use in PA reports:** In the conclusion of a Provisional Approval, "recommends" is standard: "Validation recommends an Approved with Restriction outcome."
- **Incorrect use:** Casually in running narrative of an IV report outside a formal Finding. Use "Validation suggests that..." or "The model owner may consider..." for informal guidance in running text.
- **In emails and informal messages:** "Recommendation" is fine and carries no formal weight.

### Issue

"Issue" can be interpreted as a formal deficiency requiring tracking.

- **Correct use:** Referring to an actual tracked issue or in its plain-English sense where context is unambiguous.
- **Caution:** In running validation narrative, prefer "limitation," "gap," "area requiring further evaluation," or "observation" to avoid implying formal deficiency status.

### Approve / Approval

Validation does not "approve" models in running narrative. Validation assesses and provides outcomes.

- **Correct use:** Stating the formal report outcome: "Validation completed the Initial Validation with an outcome of Approved with Restrictions." or "Provisional Approval" as a report type.
- **Incorrect use:** In running narrative as casual endorsement: "Validation approves of this approach." Use "Validation has no concerns with..." or "sufficient to support [specific use]."

### Preferred validation language for running narrative:

- "Validation reviewed..." (to introduce what was assessed)
- "Validation noted that..." (to flag an observation neutrally)
- "Validation has no concerns with..." (standard positive phrasing)
- "This has not been fully demonstrated..." (to note a gap without elevating it to a Finding)
- "Further evaluation is needed..." (to flag something requiring attention)
- "The information provided is sufficient to support..." (qualified positive)
- "Validation suggests that the model owner..." (soft guidance in running text)
- "...does not raise meaningful concerns" (for low-risk items)

