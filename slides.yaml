### 3. DeepEval Evaluation Metrics

- Aditi asked how "task completion" is determined. Purnima explained the two-step process: (1) LLM-as-caller simulates a dispute conversation with the agent, producing a JSON with session state; (2) LLM-as-judge evaluates the simulation output against the test JSON's source-of-truth fields (required fields, dispute type, amounts, etc.). The "success" status in the CSV reflects the simulation completing; task completion scoring comes from the evaluation step matching captured fields to expected values.
- On the 0.929 score, Purnima stated she does not know exactly how DeepEval calculates it internally. The framework uses an LLM judge. The evaluation LLMs are Nova Pro and Claude Sonnet, configured in the DPL config file. Purnima provided the DeepEval GitHub link (Confident AI).

### 4. Compiled Results

