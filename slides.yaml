1. Guardrail/adversarial test execution. During Baloo's platform walkthrough on 5/6, we observed guardrail and adversarial test case files in the GitLab repo that have not been included in the current DeepEval regression suite. Purnima confirmed during the 5/7 touchpoint that the 33-case suite was designed for SME testing coverage and that the scope expansion to include these files would need to come through you. There are two folders in the repo (test_cases/guardrail/ with 7 files and adversarial/ with 6 files), with some overlapping file names across the two. Given that the current architecture relies on instruction-based guardrails as the primary protection on the conversation path (per the AWS phased strategy), running these adversarial test cases on V11 would provide important evidence that the instruction-based approach is performing as intended. Can you confirm whether these tests can be executed as part of the current V11 regression run, and provide an authoritative list of which test cases should be included?

2. Evaluation configuration. MRM reviewed the DeepEval documentation (Confident AI) and summarized the 20 metrics currently in use (metric definitions attached to the 5/7 minutes distribution). As the team prepares to run the guardrail/adversarial tests, two items are worth reviewing:

   a. Context fields for adversarial test cases. Several of the LLM-as-judge metrics rely on context fields (such as chatbot_role, scenario, and expected_outcome) to produce meaningful evaluations. For adversarial test scenarios where the expected behavior is refusal rather than dispute completion, the judge needs that context to score correctly. For example, Conversational Tone and Empathy will penalize an agent that correctly refuses an adversarial request if the judge does not know the user is adversarial. Similarly, Merchant Contact Check, Dispute Confirmation, and Claim Submission Disclosure are dispute-flow metrics that would not apply to guardrail tests where no dispute was initiated. We'd suggest the team confirm that the evaluation configuration distinguishes between dispute-path and guardrail test types.

   b. Metric review. The team may find it helpful to organize the guardrails metrics by archetype, for example: safety-oriented metrics (No PII Disclosure, No System Disclosure, Decline Malicious Requests), tone and conduct metrics (Professional Tone, No Offensive Language, No Inappropriate Comments, Empathy, Conversational Tone), role and scope metrics (Guardrail Role Adherence, AI Disclaimer), and dispute-flow metrics (Merchant Contact Check, Dispute Confirmation, Claim Submission Disclosure). Within those groupings, the team could consider whether some metrics evaluate similar dimensions and could be consolidated (for example, Conversational Tone and Professional Tone, or No Offensive Language and No Inappropriate Comments). The metric definitions spreadsheet should help with that review.

   c. Claim reference number and PII metrics. The agent reads the Casper case reference number aloud to the customer digit by digit (e.g., "D dash 2 6 0 2 0 4 7 0 0 0 4 3"). An LLM-as-judge evaluating the No PII Disclosure metric may flag this as a potential PII disclosure depending on how broadly the judge interprets the criteria. This would be a false positive since reading the claim reference to the customer is required behavior. Worth confirming that the evaluator handles this correctly across dispute-path test cases.

   d. Manual review scalability. Purnima noted during the 5/7 touchpoint that subjective metrics flagged by the LLM judge are currently resolved through manual review of each conversation JSON by the team. For the current regression suite this is manageable, but as the test suite expands to include adversarial/guardrail scenarios, the team may want to consider whether the evaluation configuration can reduce the volume of false positives that require manual disposition.

