# Conclusion

Validation has completed its preliminary assessment of Model 7409's conceptual soundness, development, performance, and risk mitigation strategies for the limited pilot scope. The model framework (Amazon Connect AI Agents with a stage-gated agentic conversation flow, Claude Haiku 4.5 as the primary LLM, and three custom Lambda tools for transaction search, transaction eligibility check, and claim submission) provides a sound architecture for the constrained pilot: two dispute types only, automatic escalation for all others, a $300 transaction threshold, and a consent/disclosure flow. The system prompt, reviewed across multiple revisions, provides sufficiently precise instructions to bridge the impedance mismatch between the LLM's free-form generation and the downstream Casper API's strict field requirements.

Performance testing (42 customer dispute scenarios, 9 guardrail and adversarial scenarios, and 1 stability test) conducted by a Business Line SME via live IVR calls indicates that, after bug fixes and retests, the model meets both defined thresholds: Successful Casper Submission Rate of 100% (>=90% threshold) and Intake Error Rate of 0% (<=10% threshold). Before bug fixes, the submission success rate of 76.0% (6 failures in 25 submissions) would have fallen below the 90% threshold. DeepEval automated regression testing on V10 complements the V9 SME baseline by confirming that bounded, business-driven changes did not degrade scenario-level behavior.

Guardrails have been implemented at multiple levels: prompt-based instructions in the system prompt, real-time Bedrock Guardrails filtering content, PII/PCI, profanity, and prompt attack detection, and real-time metrics monitoring via Amazon Nova Pro V1 with SEV2 alerting.

Consequently, the model is granted an "Approved with Restriction" outcome. The pilot restrictions are: (1) time-bound pilot window, starting on May 19, 2026 with PA expiring on November 19, 2026; (2) scope limited to duplicate charges (PE#DC) and incorrect amounts (PE#IA), with all other dispute types automatically escalated to a human agent; (3) transactions exceeding $300 automatically escalated to a human agent; and (4) a maximum of 3 dispute claims per customer within a 30-day period, enforced via the Casper eligibility API check.

The acceptable performance under constrained pilot conditions is supported by multiple risk mitigation layers: automatic escalation to human agents for out-of-scope dispute types, the $300 transaction threshold, the 3-claim-per-30-day rate limit, store-and-forward data persistence on Casper API failure, real-time aggregate monitoring via Nova Pro V1 with SEV2 alerting, multi-layer guardrails (prompt-based instructions, Bedrock Guardrails for content/PII/PCI filtering, and the inherent safety properties of Claude Haiku 4.5). During the pilot, the model owner will implement periodic SME review of a sample of production calls for manual quality assurance.

**Validation recommends the following:**

**Recommendations During the Pilot:**

- The Model Owner should log all model inputs and outputs via the QIC trace files and actively monitor results, including Casper claim data accuracy, escalation rates, and customer complaint feedback
- Continue the phased rollout and monitoring approach, including the time-boxed initial activation with revert-to-legacy option, the cross-functional war room at go-live, downstream lifecycle completion (Casper to Visa dispute confirmation, approximately 3 days) prior to throttle increases, and incremental throttle expansion over multiple weeks with per-phase evaluation of technology logs, operational feedback, and agent experience
- Implement post-submission reconciliation: periodically compare Casper claim data against conversation transcripts to detect silent errors (incorrect dates, wrong amounts, missing fields)
- Expand the SME field-level evaluation checklist from 11 fields to 15 fields for pilot production call reviews. The V9 SME testing covered 10 Casper fields and 1 non-Casper consent field. Four additional fields were validated during V9 testing but not tracked on the checklist: unableToContactReason, explainNoAttemptToResolve, contactMethod, and noShowOrPartialPrePayment. The BL has agreed to include all 15 fields in the pilot SME review.
- Monitor the Nova Pro V1 real-time alerting: track what metrics are monitored, what thresholds trigger SEV2 alerts, and response actions taken
- Track and report pilot metrics against the defined thresholds: Successful Casper Submission Rate (target >= 90%), Intake Error Rate (target <= 10%), escalation rate by reason, average call duration vs. human agent baseline, customer complaint rate
- Monitor call transfer and escalation rates as a signal of customer experience quality. An increasing trend in customer-requested transfers (as opposed to system-initiated escalations for out-of-scope disputes or threshold breaches) may indicate that customers are dissatisfied with the AI interaction. The model owner should track transfer rates over time during the pilot and investigate sustained increases.
- Maintain a versioned change log of all changes to the system prompt, Lambda tool code, and Bedrock Guardrails configuration deployed during the pilot. The system prompt is the primary mechanism controlling model behavior (no fine-tuning or RAG), meaning even small prompt edits can alter the model's risk profile. Changes that significantly affect model outcomes, such as adding or removing dispute types, adding a conversation stage, changing the LLM, changing the number or type of tools, modifying escalation logic, changing fuzzy match tolerances, altering the regulatory disclosure, or modifying PII handling rules, require MRM notification before deployment. Changes that do not significantly affect model outcomes (e.g., voice-friendly wording adjustments that do not alter logic) should be logged but do not require pre-notification.
- Record the model version (system prompt and tool code) against which each JIRA test story was executed and retested. The JIRA exports reviewed during the PA did not consistently associate test runs with the specific system prompt or tool code version in effect at the time of the test, requiring Validation to reconstruct the testing timeline from test execution dates and prompt release dates. Tagging each JIRA story and retest with an explicit model version (e.g., March 11 initial, March 17 interim, March 28 V9, April 15 V10) would allow unambiguous mapping of test results to the version they apply to, supporting both pilot monitoring and IV performance evaluation.

**Before Full Production (must be addressed before IV completion):**

- Submit the complete Initial Validation documentation package, consisting of the GenAI Model Development Document, the Monitoring Plan Document, and the Implementation Framework and Testing Document, at least 12 weeks (3 months) before the intended full production date. The three-document package is the primary basis for IV and is expected to include, among other things, the pilot monitoring data and metric outcomes, ongoing monitoring plan, red teaming results, automated testing results, access controls, and change management procedures.
- Expand SME test coverage to include: boundary conditions near the $300 threshold, ambiguous customer inputs, multiple matching transactions, all contactMethod enum values, and adversarial scenarios.
- Address the Casper API silent acceptance risk: implement server-side validation that checks semantic correctness (e.g., date reasonableness, amount consistency) in addition to format validation.
- Implement a platform-enforced conversation turn limit and a configured upper bound on search tool results returned per invocation, or formally document these as accepted model limitations. The current architecture has no configured limits on either. The system prompt contains per-stage escalation triggers that bound specific interaction patterns (PII counter at 2, out-of-context counter at 3) but no overall conversation turn cap. While Validation assessed minimal practical risk for the pilot (search results are bounded by the number of transactions on an actual customer account, and live voice calls are unlikely to sustain conversations long enough to stress the 200,000-token context window), a configured limit or formal risk acceptance should be in place before full production.

- Document any observed system prompt leakage behavior and the mitigation strategy. One anecdotal instance of system prompt content appearing in model output was observed during the offsite; it could not be replicated. The model owner should monitor for additional occurrences during the pilot, assess the risk of exposing internal instructions to callers, and document any planned mitigations before full production.
- Validate the accuracy of the Nova Pro V1 real-time monitoring evaluator against human-reviewed samples to confirm that the pilot safety metrics (Toxicity, PII, Jailbreaks, Topic Containment) are reliable, and incorporate the evaluator results into the ongoing monitoring plan for full production.

