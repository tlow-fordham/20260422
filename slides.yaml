### Model 5856 Use Case — End-to-End Validation Demonstration

**Model overview:** Logistic regression model predicting probability of credit card default in the next month. Variables include credit limit, repayment history, billing amounts, and payment amounts. Target variable: default/no-default.

**Validation workflow implemented in Nimbus (10 nodes):**

1. Data Ingestion / Preprocessing — handle missing values, duplicates, empty columns
2. Exploratory Data Analysis — data quality, completeness, accuracy checks
3. Random Forest Feature Selection — identify important variables, reduce dimensionality
4. Weight of Evidence (WoE) Transformation — ensure monotonic relationship with target
5. Information Value (IV) Filtering — keep strong predictors, remove weak ones
6. Correlation Filtering — remove highly correlated variables to avoid multicollinearity
7. Recursive Feature Elimination — iteratively refine optimal feature set
8. Logistic Regression Model — fit model, interpret coefficients, validate assumptions
9. Benchmark Models — alternative model comparison
10. Performance Testing — AUC, KS, Gini, PSI, CSI, rank ordering, lift curves

**Results comparison against developer documentation:**

- AUC on training data: Nimbus = 0.75, Documentation = 0.75 ✓
- AUC on out-of-time sample: Nimbus ≈ 0.74, Documentation ≈ 0.74 ✓ (close match)
- KS statistics: similar values on both train and test data
- **Coefficients showed discrepancies:** Example — "Total Utilization FIN Accounts 36 months" coefficient was 0.61 on Nimbus vs. 0.71 in documentation. Another feature showed 1.032 vs. 1.05.

**Discrepancy explanation:** Vivek noted the out-of-time sample had a ~10% higher bad rate than expected, suggesting a data discrepancy. Additionally, default model iteration parameters and feature engineering differences may contribute. Vivek stated that for other clients, coefficients have matched to 3–4 decimal places, so this should be resolvable.

**Jeeta's directive:** Coefficient accuracy needs to match to at least the first or second decimal place for the POC to be credible. Follow-up offline to investigate data and parameter alignment.

