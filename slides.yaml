## Meeting Minutes

### 1. DeepEval Results

- Sudhakar confirmed all 30 evaluation errors previously identified by Validation have been addressed (updated from 20 of 30 as of the prior day's communication). Results are in DDIAI-279.
- Test counts confirmed: 10 dispute path, 17 transfer path, 13 guardrail, 40 total.
- Varun walked through how the evaluator configuration handles different test types. Metric applicability is controlled at the test case level, not the YAML level. Each test case JSON specifies which metrics to disable for that case. For guardrail and transfer cases, dispute-only metrics are disabled within the individual test case file. The YAML defines the metric definitions and thresholds; the test case files control which metrics apply.
- Jordan raised the chatbot_role, scenario, and expected_outcome context fields. Scenario and expected_outcome are populated in the test case JSONs. The chatbot_role field is defined only within the role_adherence metric in the YAML, where it still references a collections/overdue balances agent (this metric is disabled). For other enabled metrics, chatbot_role is not defined. Sudhakar confirmed this was not fully resolved and committed to follow up.
- Jordan asked why the safety_metrics section of the YAML (toxicity, bias, misuse, role_violation, PII leakage) is entirely disabled, given that there are no Bedrock Guardrails on the conversation path. Purnima and Varun clarified the YAML structure: it has three top-level sections (conversation_quality_metrics, safety_metrics, guardrails_metrics). The safety_metrics section is a built-in DeepEval module that the team is not using. The actual safety evaluation is handled through the guardrails_metrics section, which includes Professional Tone, No Offensive Language, No PII Disclosure, No System Disclosure, Guardrail Role Adherence, Decline Malicious Requests, Privacy Protection, and No Inappropriate Comments.
- Jordan noted the disabled role_adherence metric references "overdue balances" and the disabled role_violation metric references "insurance claims." These are from a different use case. The BL confirmed these will be cleaned up.
- Jordan requested a compiled pass/fail summary spreadsheet across all 40 test cases. The BL confirmed individual test case results are all passing but a consolidated summary has not been prepared. Varun committed to providing one.

### 2. SME Production Quality Review Plan (Item 90)

- Jordan asked about the quality review plan. Sudhakar clarified that the ACCU dashboard (shown by Baloo during the 5/6 walkthrough) is a technical support tool for the development team, not an operational quality review tool. Operations has its own analytics-based review process.
- John confirmed Jayden returns tomorrow and has the controls documentation. John will get it from Jayden and send to MRM. The controls plan is part of the broader PRISM framework with compliance, FRM, and other risk groups.

### 3. Pilot Launch Readiness and Version Freeze

- Jordan mentioned Xinyu is on leave at the end of May. Sudhakar confirmed that V26/V11 is the final model version for pilot, unless a showstopper is identified. Jordan confirmed the model has 3 custom tools (Eligibility, Submit Case, Search Transaction) and 3 native tools (Complete, Disclaimer, Escalate), for a total of 6. The Disclaimer tool is newly added as a native tool compared to the original configuration.
- John confirmed the pilot launch date is June 9, 2026. Sana confirmed December 9, 2026 is the end date in Archer.
- Sudhakar stated the BL needs all approvals by May 29 (absolute latest) to initiate the production change request. The actual production deployment would be June 9. Jordan confirmed that the BL can launch later than June 9 even if the PA lists June 9 as the start date, since the PA permits use from that date forward but does not require deployment on that exact date.

### 4. Hypothetical: Adding a Policy-Based Guardrail Before Pilot

- Baloo raised a hypothetical question: if the BL wanted to add one policy-based guardrail in the AWS configuration (e.g., for prompt injection attack detection), with no prompt changes, would that be considered a material change or reset the PA review clock?
- Jordan confirmed this would not reset the clock since this is a relatively small, defensive change, but Validation needs sufficient time to update the narrative and the PA should reflect the actual pilot production model with all such changes. If made after June 9, minor changes that do not significantly affect model outcomes (as previously discussed) should be logged through the change control process.
- Sana noted the EMA and Archer artifacts should be reviewed if the guardrail configuration changes. Baloo noted the current Archer forms capture guardrails at a general level, not at the policy-type detail level, and agreed to review and update if applicable.
- Sudhakar clarified the BL is not currently planning to add a policy-based guardrail but is running tests to determine whether it is needed. If testing shows it is required, they wanted to understand the process.

