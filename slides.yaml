### Documentation Module — Detailed Walkthrough

This was the primary teaching segment of the session.

**Creating a document:** Navigate to Documentation module → Create Document → enter name, author, and select either a blank template or a previously uploaded template.

**Placeholders:** Within a document, users create named placeholders (e.g., "Summary Statistics") that serve as designated drop zones for results. Each placeholder holds one result — to show multiple outputs (e.g., 3 tables from one job), create 3 separate placeholders.

**Adding results to documentation — two methods:**

1. From the EDA/test module: open a completed job, click "Add to Document," select the target document and placeholder, add a heading and comment. A green checkmark appears on the job queue item once mapped.
2. From within the document: use the "Add Resources" tab to browse completed jobs by module and submodule, then drag-and-drop results into the document.

**Key behaviors:**

- If a result is added to a placeholder that already has content, the new result replaces the old one — it does not append.
- Tables and charts can both be added via drag-and-drop.
- Only the first table from a multi-table job is pulled when adding from the job queue directly. To get all tables, create separate placeholders for each.

**Auto-updating results (important nuance):**

If individual jobs are added to placeholders manually, rerunning the job creates a new job ID — the document does not auto-update. To enable auto-updating, the jobs must be part of a **workflow (pipeline)**. When a workflow is connected to a document template, rerunning the workflow refreshes all mapped placeholders. If only a subset of jobs needs rerunning, either remove the irrelevant placeholder connections before rerunning, or clone the workflow and modify the clone.

**Q (Ali):** Can both the old and new versions of a result coexist in the document? **A:** Yes — create a separate placeholder for each version.

**Q (Yixia):** Can plots and tables be resized within the platform? **A:** Limited resizing capability exists for images on the platform, but it may not carry through to exports. For full formatting control, export to Word and adjust there.

