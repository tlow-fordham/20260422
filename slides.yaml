## Reviewer Workflow Rules

### New content flagging
If a draft includes content not explicitly discussed or agreed upon in a
meeting or email chain, flag it with a bracketed comment before the reviewer
sees it: "[NEW — not discussed in meeting. Rationale: X. Please confirm
before finalizing.]" Do not let a sign-off reviewer discover new substantive
content during review.

### Pre-submission outline for sign-off documents
For any document requiring manager or executive sign-off, generate a 3-5 line
outline first stating: (a) what the document concludes, (b) what restrictions
or dates are being changed, (c) any new content not previously discussed.
Present the outline for approval before drafting the full document.

### Post-signoff Archer upload and distribution

After signoff with Xinyu Wu (transcripts may render as Xinyu Wy) and Bob
Larson, the next process step is typically to upload the approved result to
Archer. Treat the steps below as a rough working template only. The correct
answers, dropdowns, routing, due dates, and comments will change depending on
whether the deliverable is a provisional approval, special purpose validation,
initial validation, targeted validation, annual review, or another validation
activity. Do not reuse the template values without checking the applicable
approval document, validation report, Archer record, and current governance
expectations.

Common Archer upload steps after signoff:

- Save the approved validation result as a PDF and confirm the approvals or
  signoffs are included.
- Open the relevant model record in Archer and go to the Validation tab.
- Add a new validation record, or update the existing validation record if the
  workflow requires an update rather than a new entry.
- Complete the required dates, validation type, validation outcome, validation
  group, next validation activity, next validation due date, annual review date,
  restriction fields, and rationale or comment fields based on the approved
  document.
- For SPV or pilot-extension situations, common fields may include extension of
  restriction, a restriction effective date tied to the last approved pilot use
  date, and a next activity of initial validation. Verify each value against the
  document and template footnotes before submission.
- Attach the approved PDF and complete any attachment metadata, including the
  report or template version if Archer requires it.
- Submit the Archer record and resolve any required fields that appear only
  after submission is attempted.
- Remind the assigned secondary reviewer or method owner reviewer to complete
  their review if the record remains in pending submission or pending review
  status.

After the Archer upload is complete, send the distribution list from the
approval document an email with the PDF of the result attached. The message
must be tailored to the model ID, model name, reviewed activity, validation
type, outcome, restriction dates, and any expectations in the approved report.
Use the sample below as a tone and structure reference, not as reusable factual
content:

```
All,

MRM has completed our independent review for [reviewed activity] of Model
[model ID] - [model name].

[Briefly summarize the prior approval or prior restriction, if applicable.]
[State the current MRM outcome and the approved use period or restriction
period, if applicable.] [Summarize key scope limits such as pilot population,
use case, article set, geography, or other usage boundaries.]

I would like to thank both the business line and the model development team for
their collaboration. Your efforts in providing [materials reviewed], conducting
[additional analysis, if applicable], and engaging in discussions have aided
Validation in understanding the model theory, model usage, feedback collection
mechanisms, performance evaluation, and monitoring through the validation
process.

Attached is the validation report with approvals. Please review MRM's
supporting rationale for this [outcome] outcome, as well as our
recommendations and expectations therein, and feel free to reach out if you
have any questions.
```

