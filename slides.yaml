### Version Alignment

Purnima explained that DeepEval is run against the IT environment, not UAT, and that version numbering in IT does not correspond directly to the UAT version labels (V9, V10, V11). The dev team updates the IT prompt to match UAT when changes are made, but there is no formal version tracking between the two environments.

Purnima confirmed that the current IT environment matches V11 in UAT. She stated she cannot pinpoint which IT configuration corresponds to V9 and would need the V9 prompt provided to her in order to load and rerun against it.

Jordan noted that if V11 produces a clean DeepEval result after the test case corrections, a separate V9 regression run may not be necessary. Purnima agreed to proceed with V11 first.

The DDIAI-256 run (April 17/20) and DDIAI-263 run (April 23) were confirmed to have been executed on different prompt versions during a period of active development. Aditi labeled the April 23 run as "V10.1" for tracking purposes, since it does not correspond to V11.

### DeepEval Architecture and Mocking

Purnima and Varun explained the DeepEval testing architecture. DeepEval uses a second LLM to simulate a caller interacting with the QIC agent LLM. All tools are mocked: the search tool returns mock transaction data from a CSV, and the submit tool does not call the live Casper API. The Lambda code includes an evaluation bypass flag that prevents hits to the transaction database.

Varun clarified that DeepEval does call the tools through the QIC agent flow, but the underlying API calls and transaction lookups are mocked. The test evaluates the conversation between the two LLMs, not the end-to-end integration.

### Test Case Issues (Items 106, 107)

Aditi walked through the 12 misaligned cases identified in MRM's analysis. The issues fall into two categories:

- Top 5 (higher priority): includes test cases where the ground truth does not match the mock transaction data (e.g., user description references Shopify and Temu but the expected disputes reference Amazon), and cases where the eligibility tool was called once instead of twice for dual-dispute scenarios.
- Bottom 7 (lower priority): cases where the escalation type of dispute was incorrectly inferred by the agent. Jordan noted that if the BL confirms this is a known limitation with no material model risk (the call was correctly escalated regardless of the dispute type label), Validation would document it as a limitation rather than a deficiency.

Purnima acknowledged the issues and committed to reviewing and fixing the top 5 test case designs and rerunning DeepEval on V11. She will also review the bottom 7 to assess performance on V11.

### Evaluation Methodology

Jordan asked how DeepEval determines success or failure. Purnima explained that an evaluation step runs after the simulated conversation and checks multiple metrics, including whether required fields were captured. However, the evaluation results were not included in the deliverables shared with MRM. Purnima stated she was not asked to provide them and will check with Sudhakar on whether the evaluation results and methodology can be shared.

Jordan requested the evaluation methodology (which DeepEval metrics are used) and the grading logic (e.g., whether partial field capture is scored as pass or fail). Purnima agreed to follow up after confirming with Sudhakar.

### SME QIC Logs

Jordan noted that QIC logs for the 52 SME test cases conducted by Linda were not provided to MRM. Purnima and Varun acknowledged that retrieving SME QIC logs from the UAT environment is difficult because multiple testers share the environment and individual calls are hard to isolate.

### Next Steps Agreed in Session

- Purnima to fix the top 5 test case designs and rerun DeepEval on V11.
- Purnima to review the bottom 7 escalation-type cases on V11.
- Purnima to check with Sudhakar on sharing the evaluation results and methodology.
- Target: end of week (May 1).

