### Documentation Templates

**Uploading a template:** Settings → Documentation Template → Upload. Supported formats: `.md`, `.html`, `.docx`. Templates are **global** — they must be published before they can be used, even by the uploader.

**Template fidelity issue (Duncan):** When the standard MRM validation template (with brand formatting, graphics, headers) was uploaded and then downloaded back from Nimbus in Word format, formatting was stripped — colors, images, and layout were lost. Vivek acknowledged the limitation: the platform's built-in editor does not support full Word formatting fidelity. PDF and HTML exports preserve formatting better than Word. The Nimbus team committed to enhancing the editor in a future version.

