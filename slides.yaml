# DeepEval Automated Testing Assessment

## Framework Description

The Model Developer implemented DeepEval, an automated black-box testing framework that employs LLM-as-a-Tester simulations. DeepEval creates synthetic customers with scripted scenarios and has an LLM (Nova Pro 1) play the customer side of the conversation against the live AI agent. Validation reviewed 10 DeepEval test transcripts as part of the preliminary assessment.

## Limitations Identified

Validation identified several limitations that prevented the framework from producing PA-quality evidence:

- Tests are text-based and bypass the speech layer entirely (Nova Sonic/Lex STT). Real speech variability is not tested.
- Synthetic customers respond with fully formed grammatical sentences in 2-3 second intervals, which does not represent real caller behavior.
- The SessionStateMetric checks whether certain session state keys exist and match expected values. It does not compare Casper field values against what the customer said and cannot evaluate field accuracy.
- Multiple "happy path" tests failed because the FDI_SEARCH_TOOL could not find the expected transactions, suggesting test data misconfiguration rather than model failures.
- The evaluation metric itself produced unexplained results (e.g., flagging "dispute_type is incorrect" when session state showed the correct value), reducing confidence in the automated evaluation framework.

Based on Validation's recommendation to focus on SME evaluation as the primary approach, DeepEval was set aside for PA-level assessment. The Model Developer accepted this recommendation at the March 18, 2026 meeting.

## Early Engagement Position on DeepEval Scope

Validation's Early Engagement position was that DeepEval is appropriate for volume and regression but cannot replace human-in-the-loop SME evaluation for PA-level performance claims, for the reasons detailed under Limitations Identified. Validation recommended SME testing be scheduled early, which produced the V9 SME baseline. This sequencing is what allowed DeepEval regression to serve as a reasonable V9-to-V10 check at PA: the V9 SME baseline establishes the human-validated performance floor, and the V10 changes (Disclaimer moved upstream to deterministic IVR, Eligibility pulled into a dedicated tool, prompt tightened around the same stage structure) are bounded and risk-reducing relative to V9. Any future regression against a V10+ change that does not meet the same "bounded, risk-reducing" characterization should trigger a new SME-in-the-loop cycle rather than relying on DeepEval alone.

## Recommendations for IV and Pilot Use

DeepEval remains the only available mechanism for high-volume automated testing and should be incorporated into the pilot monitoring plan once its data misconfiguration and metric reliability issues are resolved. Specifically, the model owner should use DeepEval (or an equivalent automated framework) during the pilot for:

- **Continuous regression testing:** Running the existing 56 SME-designed scenarios automatically after any prompt, tool code, or guardrail change to detect regressions without requiring the SME to re-execute all calls manually.
- **Adversarial and red-team testing at scale:** SME testing covered 8 guardrail/adversarial scenarios. Automated synthetic testing can generate hundreds of adversarial scenarios (prompt injection, PII probing, off-topic injection, boundary-condition inputs) at volumes not feasible for human testers.
- **Edge-case exploration:** Systematic testing of the untested paths identified in the PA review (merchant contact N and U paths, contactMethod values other than Phone, boundary amounts near $300, ambiguous dispute descriptions that straddle classification boundaries).

The model owner should address the following before relying on DeepEval for pilot monitoring: fix the test data configuration so happy-path scenarios succeed, replace the SessionStateMetric with a Casper-field-level comparison metric, and add speech-layer testing (either via Nova Sonic integration or by validating text-based results against a representative sample of voice-based calls).

## DeepEval Synthetic Testing Data

Prior to SME testing, the Model Developer implemented DeepEval using Nova Pro 1 as the synthetic customer LLM. The 10 DeepEval transcripts reviewed by Validation provided a preliminary baseline for expected conversation length (~795 words per full conversation, approximately 20 conversational turns for a complete submission).

## DeepEval Bypass Mode in Submit Tool

The submit tool has a DeepEval bypass mode (`is_deepeval` flag, read from session state) that returns a hardcoded dummy case reference (`F-D-260219800147`) instead of calling the Casper API. This is appropriate for testing. The DeepEval flag will not be part of production code.

