## 3. SDLC Overlap Discussion

- Scott asked whether testing performed as part of the SDLC could be reused instead of duplicating efforts
- Xinyu responded that MRM focuses specifically on accuracy, not the broader SDLC concerns (security, functional testing, latency)
- If accuracy testing artifacts already exist from SDLC, MRM can accept them as evidence, provided:
  - The testing sample is sufficient
  - SME review is included
  - Automated testing is in place for broader coverage at scale
- At the 65,000-article enterprise scale, automated testing and monitoring are expected, including dashboards showing relevancy scores, alerting on performance degradation, and flagging when product changes outpace article updates

