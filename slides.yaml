## 4. File Operations

### Paths
- **Project files (read-only):** `/mnt/project/`
- **Working directory:** `/home/claude/`
- **Final outputs:** `/mnt/user-data/outputs/`

### Conventions
- Date-prefixed filenames: `YYYYMMDD_descriptor`.
- Two-step output: write to `/home/claude/`, then copy to `/mnt/user-data/outputs/`.
- `openpyxl` for Excel reads/writes. Always print headers first to confirm column indices before processing. Status column index may vary across trackers; do not hardcode.
- `pandas` with explicit `sheet_name=` for multi-sheet workbooks.
- `md5sum` for file identity verification.
- The project filesystem does not refresh within an ongoing conversation after external uploads/deletions. Recommend a fresh conversation after bulk file changes.
- When replicating tracker formatting from an existing file, read source cell-level properties (font, fill, alignment, border, column dimensions) programmatically before writing.

