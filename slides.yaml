# Meeting Summary: Nimbus POC — Casandra's Strategic Context and Team Pushback

**Date:** Wednesday, May 6, 2026
**Key Speaker:** Casandra Kerr (SVP, MRM Program Office)
**Facilitator:** Maxim Borissyuk
**Attendees:** Jeeta Misra, Duncan Fung, Ben Vulu, Valerie Hsu, Max Zalutskiy, and others from MRM validation team

---

## TLDR

Validators continued to push back against Nimbus adoption, questioning whether it can handle their model types, whether the vendor will be around long-term, and whether automation even addresses the real cause of timeline delays. Casandra joined to respond directly. Her three reasons to press forward:

1. **Budget or nothing.** CapEx funding expires end of 2026. If MRM does not select a platform, the funding is lost. Building a custom solution was already evaluated and is too expensive (JP Morgan spent $12 million; U.S. Bank does not have that budget). The alternatives evaluated so far (Lumenova, DataRobot, Azure ML Studio) have less functionality than Nimbus.

2. **Validation timelines must come down.** Jodi Richard and Gunjan Kedia have directed MRM to shorten validation timelines to get models to market faster. The target is a 20% total reduction, concentrated on high-risk models that are revalidated frequently. This is not optional.

3. **On-prem is going away.** SAS and on-prem infrastructure are end-of-life. MRM's work needs to move to cloud in a cohesive way, and a platform is the vehicle for doing that.

Her explanation for the poor delivery so far: the project was funded in January 2024 but technology deprioritized infrastructure setup for almost a year. Nimbus did not get a working environment until January 2026, compressing everything. The platform is not ready and she acknowledges that, but the team needs to start somewhere and document what works and what does not so leadership can make an informed decision.

