### Additional 3 — Section 5.1: Condense the compensating controls inventory

Section 5.1 currently reproduces the full compensating controls list from the PA across nearly two pages (User Access and Training, Data Controls, Gateway Security Controls, Model Framework Guardrails, Human-in-the-Loop Oversight, Logging and Monitoring). For an SPV that is extending a date, this is disproportionate. The reader who wants the full detail can refer to the PA.

**Suggested approach:** Replace the six sub-headed bullet lists with a single paragraph that names the key control categories and confirms they remain in effect.

**Example:**

> The provisional approval incorporated the following categories of risk mitigation, all of which remain unchanged and in effect: user access and training controls (employee-facing only, phased agent rollout, mandatory training); data controls (curated KB articles with no customer data, preserved source links); ISS GenAI Gateway security controls (authentication, logging, PII filtering, content filtering); model framework guardrails (containment checks, VRL, canned responses for low-confidence answers, profanity filtering, prompt injection controls); human-in-the-loop oversight (agents review all responses before use); and logging and monitoring (usage logs, feedback tracking, LLM interaction logging via the Gateway). For full detail on each control, refer to the Provisional Approval report for Model 7306 (signed 01/30/2026).

This brings the section from two pages down to one paragraph and keeps the SPV at an appropriate length for an administrative memo.
