### Insights / Fraud Portfolio

**Bart / Data Feeds for Risk Grading**
Discussion focused on data feed readiness for fraud/risk use cases. Four data sources discussed: Falcon, Elavon, LOS, and Casper. Paramjit Chumber led the discussion.

Falcon: Data already ingested into Hive on monthly cadence, but insufficient frequency for downstream risk grading. Data exists in Prime but must be made available in CDP Ops. By end of May, expectation is a documented impact analysis supporting a go/no-go decision on Falcon readiness for risk grading. Owner: Paul Carpenter.

LOS: Explicitly deprioritized, placed on backlog.

Casper: Can be analyzed in parallel with Falcon; both leverage data already in the feature store.

Elavon: Active discussions ongoing. Primary contact (Katie) not present; no concrete status update.

- Status as of May 2026 MPP: Data readiness assessment. Pre-model stage.

