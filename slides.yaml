## Category 10: Benchmarking (§7.3)

No benchmarking metrics were presented at the offsite.

**Template requirement:** §7.3 requires comparison against a suitable benchmark. For Model 7409, the natural benchmark is the existing human-agent FDI dispute intake process. Metrics that should be compared at IV include AHT, intake error rate, CSAT, and touches per claim across the human-agent channel and the AI-agent channel.

**IV action:** Model owner should be asked to provide the human-agent baseline data for the pilot dispute types (PE#IA and PE#DC) to support the §7.3 benchmarking comparison.

