## Category 1: Correctness (§7.1 — Outcome Analysis)

Correctness measures whether the model produced the right answer: correct dispute type classification, correct Casper field values submitted.

| # | Metric | Source | Definition | Goal Value | Coverage Level | IV Notes |
|---|---|---|---|---|---|---|
| 1 | Intake Error Rate | Ekene (FDW) | Percent of calls where the bot assigned an incorrect claim type or submitted incorrect Casper field values. Blended across channels. | ≤10% | Covered at pilot scope | Primary correctness metric. Classification error (wrong dispute type) and field-value error (wrong amount, date, merchant) are both captured. |
| 2 | Successful Casper Submission Rate | Pre-pilot SME testing | Percent of in-scope test calls where all Casper fields matched what was said during the conversation. | ≥90% | PA-stage only | Pre-pilot metric. Pilot equivalent is Intake Error Rate (inverse framing). |

---

## Category 1A: Faithfulness (§7.1 — LLM-as-Judge Output Quality)

**N/A by design, with one exception.** Faithfulness evaluates whether a model's outputs are grounded in retrieved context. Model 7409 is not a RAG or open-ended generation model. Its outputs are structured tool calls and scripted conversation stages, not free-form answers synthesized from retrieved documents. The risk that faithfulness testing addresses in a general chatbot — the model asserting unsupported claims — is mitigated here by the correctness metric (Intake Error Rate, which verifies submitted field values against what the customer said) and by the deterministic tool-call architecture (the model cannot fabricate transaction data; it can only use what the search tool returns).

**Exception: `merchantResponse` field summarization.** The `merchantResponse` Casper field is a free-text LLM summary of the customer's description of their interaction with the merchant. The model developer confirmed that the LLM summarizes the conversation context at submission time rather than passing through verbatim customer language. Early SME testing documented an example: the customer said "that I follow up with my bank" and the Casper field showed "Follow up with bank." This is a narrow faithfulness risk — the summary could omit, distort, or fabricate details about what the merchant told the customer. This is assessed as minor because the field is informational input to the claims process rather than a determinative field (dispute type, amount, and transaction identity drive the claim outcome), but material distortions could affect downstream claims processing.

**IV action (minor):** No separate faithfulness metric required. The sampled pilot call review (Layer 1 field-level correctness) already compares Casper fields against the conversation transcript. Reviewers should annotate `merchantResponse` specifically, flagging cases where the LLM summary materially diverges from what the customer said. This is an additional annotation on the existing review, not a separate activity.

---

## Category 2: Relevancy (§7.1 — LLM-as-Judge Output Quality)

**N/A by design.** Relevancy evaluates whether a model's free-text responses are on-topic relative to a query. Model 7409 operates within a scripted multi-stage interview flow with eleven enumerated escalation triggers; it does not generate open-ended responses to arbitrary queries. Off-topic input is handled by Topic Containment (guardrail block) and the escalation framework, both of which are assessed under Guardrail/Safety (Category 7). In-domain response appropriateness is a function of the system prompt's stage logic, which is assessed through correctness testing and tool-sequence review. Document design rationale at IV; no separate relevancy testing required.

Topic Containment (#3 below) is reclassified to Guardrail/Safety where it substantively belongs.

---

