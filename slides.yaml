### 2. SME Production Review Plan (Item 90)

- John confirmed that the production quality review plan is being developed as part of a broader controls framework with compliance, FRM, and other risk groups. The review will closely mirror the existing process for monitoring human agent calls: a sample of calls will be listened to and scored using call replays and transcripts. The review will be conducted by the quality team under Nils Tang. Sample size is not yet determined.
- John committed to providing the control documentation to MRM by May 15.
- Current target pilot launch date is June 9, 2026.

### 3. Amazon Connect Platform Walkthrough

Baloo conducted a screen-sharing walkthrough of the Amazon Connect UI and the AWS Console. Key observations:

**Agent configuration.** The FDI agent ("usb_fdi_orchestration_unlimitedAIAgent," Published, last updated 5/5/26) has six configured tools: three built-in native tools (Complete, Disclaimer, Escalate) and three custom Lambda tools routed through the Agent Core Gateway (Eligibility, Submit Case, Search Transaction). ~~Whether the Disclaimer tool is still actively invoked after the V10 disclaimer stage change requires confirmation from Baloo.~~ [Clarified 5/7 touchpoint: The Disclaimer tool is a native QIC tool, not a custom Lambda tool. Whether it is still actively invoked in V11 requires confirmation from Ravi/Baloo (Action Item 7, still open).]

**Prompt configuration.** One system prompt ("usb_fdi_orchestration_prompt_unlimitedAI," Published, last modified 5/5/26) confirms the reasoning model as Claude Haiku 4.5 (us.anthropic.claude-haiku-4-5-20251001-v1:0). MRM confirmed read-only access to the prompt.

**Guardrails.** No policy-based guardrails are attached to the agent (Guardrails (0)). Baloo confirmed that instruction-based guardrails (embedded in the system prompt) are the primary and currently sole guardrail mechanism on the AI agent conversation path. ~~AWS recommended instruction-based over policy-based due to latency.~~ The updated V11 diagram shows Bedrock Guardrails at steps 9/19; whether these are active on the conversation path or only on the tool execution path requires confirmation from Baloo (Action Item 5, still open). [Clarified post-meeting: Baloo forwarded the AWS recommendation email (from Sudha Nistala, AWS, dated 5/5/2026). AWS recommended a three-layer phased strategy: (1) in-prompt guardrails as the current baseline, providing lower latency with no additional API calls; (2) targeted Bedrock Guardrails to be added incrementally only where in-prompt guardrails prove insufficient through testing; (3) conversation audit / real-time alerts via CloudWatch for asynchronous monitoring. The recommended approach is to start with Layer 1, use red-teaming to identify gaps, and selectively apply Layer 2 for specific gaps rather than configuring Bedrock Guardrails broadly. AWS noted that the current in-prompt implementation has been validated through red-teaming across 5 adversarial scenarios (conducted by AWS, separate from the DeepEval test suites).]

**Contact flow.** The dispute contact flow (309_NLU_debitDispute, 27 blocks, Voice: Tiffany Generative) was demonstrated. The flow designer does not support fully read-only access; MRM was instructed not to save changes.

**AWS Console.** The FDI gateway ("usb-fdi-gateway-unlimitedAI") shows the three custom tools. MRM access requires the US East 1 (Virginia) region. Baloo recommended reviewing Lambda code through GitLab rather than the console.

**Contact Lens and real-time metrics.** Baloo demonstrated call summary, customer sentiment tracking, transcript, and audio playback on a sample UAT call. The real-time metrics dashboard shows per-contact metrics including containment status, latency, toxicity, profanity, tool rephrases, errors, and commitments. The "unauthorized commitments" metric showed a non-zero value on the sample call; Baloo will investigate. Per-contact metrics are available now; the aggregated trend dashboard is under development and may not be ready before pilot launch.

**Two Bedrock instances.** The diagram labels two environments: Amazon Bedrock (Service Account), AWS-owned, containing Claude Haiku 4.5, Nova Sonic 2, and the guardrail types; and Amazon Bedrock (USB Account), US Bank-owned, containing the Agent Core Gateway, Lambda tools, and the Terraform-configured guardrail (content policy filters, PII/PCI policy).

**Adversarial testing.** Baloo stated adversarial testing has been conducted manually and through the DeepEval framework, covering jailbreaking, malicious requests, model disclosure, persona hijacking, prompt injection, repetition begging, role-play jailbreak, tool disclosure, and off-topic questions. ~~The DeepEval repo contains a separate adversarial test suite alongside the 33 dispute path scenarios. Whether the adversarial tests are included in the current regression run requires confirmation.~~ Baloo offered to schedule a live adversarial demo for MRM. [Clarified 5/7 touchpoint: Purnima confirmed the 33-case suite was designed for SME testing coverage, not as a dedicated guardrail suite. The separate guardrail/adversarial test files in the repo have not been run. The GitLab repo (usb-fdi-deepeval) contains two folders maintained by different owners: test_cases/guardrail/ (Purnima, 7 files: dan_persona, instruction_override, persona_hijacking, promptInjection, prompt_injection, repetition_begging, tooldisclosure) and adversarial/ (Varun, 6 files: jailbreak, malicious, politics, promptInjection, technology, tooldisclosure). There is overlap between the two folders. Neither has been included in the regression run. MRM requested the test case files and is following up with Sudhakar on scope expansion.]

Sudhakar suggested giving MRM access to the ACCU real-time technical metrics UI.

