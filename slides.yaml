### Pre-Session Q&A

**Project sharing vs. collaborative projects (Ali)**

There are two distinct sharing mechanisms in Nimbus. The first is "Shared Project," which sends a copy of the entire project to another user — the recipient clones it into their own workspace. The two users do not interact within the same project instance. The second is "Collaborative Project," which creates a team workspace where multiple users work together on the same project with shared access to all artifacts.

Ali flagged that some users (e.g., Yixia) were not appearing in the collaborative project user list but did appear in the shared project list. Vivek acknowledged this as a possible account-side glitch and committed to checking with the technology team.

**UDF debugging not available (Ali)**

When creating a User-Defined Function, there is no copy-paste option during function definition (though code can be edited after creation). The debug mode toggle exists but is deactivated. Vivek explained that Nimbus's built-in IDE (Jupyter) was not approved within US Bank, so Azure ML Studio is being used instead. The integration is not yet set up. Sessions 3 and 4 will cover Azure ML Studio setup, which will enable code debugging.

**Platform latency / performance (Ali)**

Even simple operations (e.g., a two-line print statement) were taking noticeable time in the job queue. Vivek noted that infrastructure sizing had been increased after latency issues in Session 1, and that QA testing earlier the same day may have contributed. Team to monitor and escalate to technology if latency persists.

**Time tracking methodology (Ali)**

The platform tracks time spent per module for each user. Time tracking is activity-based: it runs while the user is performing operations, continues during platform-side computation (e.g., data prep jobs running in background), and stops after 5–10 minutes of idle time. This is relevant for the POC efficiency comparison against traditional (non-platform) validation workflows.

