## Category 7: Guardrail / Safety (§7.2)

| # | Metric | Source | Definition | Goal Value | Coverage Level | IV Notes |
|---|---|---|---|---|---|---|
| 26 | Toxicity and Profanity blocks | Baloo (safety) | Blocks triggered by profanity or toxicity. | N/A (counter) | Partial | Counter only; no attempt denominator for rate computation. |
| 27 | Privacy (PII) blocks | Baloo (safety) | Blocks triggered by PII mention. | N/A (counter) | Partial | Same denominator limitation. |
| 28 | Unauthorized Commitment | Baloo (safety) | Any unauthorized commitment made by the AI agent. | N/A (counter) | Partial | |
| 29 | Jailbreaks (successful prompt injection) | Baloo (safety) | Successful prompt injection attacks detected. | N/A (counter) | Partial | Tracks successful bypasses but does not normalize against total adversarial attempts. |
| 30 | Refund Commitment | Baloo (safety) | Any refund or financial commitment made by the AI agent. | N/A (counter) | Partial | |
| 31 | Topic Containment (out-of-domain) | Baloo (safety) | Out-of-domain question blocks. | N/A (counter) | Partial | Also listed under Relevancy (#3). |

**Pre-pilot guardrail testing (PA-stage):** 9 dedicated test cases covering PII protection, model/system prompt disclosure, jailbreak attempts, and off-topic injection. All passed (0/9 bypass rate on the tested set).

**Template gaps:**
- **Bypass rate denominator:** Pilot counters track observed blocks during live calls, but without a structured adversarial attempt population (pre-launch red team or systematic adversarial sample), no attempt denominator exists for computing a bypass rate. IV requires a structured red-team campaign.
- **False positive rate:** No metric captures legitimate queries incorrectly blocked by Bedrock Guardrails or by prompt-based escalation. Early-escalation patterns observed at the offsite suggest this is material.
- **Severity scoring and pattern analysis:** Categories are present but severity bands and periodic pattern review are not defined.
- **Pre-launch red teaming:** No formal red team beyond the SME-level 9 guardrail cases. Red teaming is a stated IV requirement in the PA draft.
- **Evaluator accuracy:** Nova Pro V1 computes the safety/compliance metrics in real time. Its accuracy (false positive/negative rate on each category, agreement with human-reviewed samples) is not measured. IV should document evaluator-model validation.

