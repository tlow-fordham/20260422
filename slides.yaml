# V10 Follow-Up Items

**IV follow-up — Empty user input vs. background noise scope.** The V10 prompt introduces a three-attempt protocol on `<EMPTY_USER_INPUT>` that escalates to a human agent. This marker is emitted by the NovaSonic speech layer when it detects silence (no audio to transcribe). It does not cover the case where NovaSonic transcribes persistent background noise into coherent-looking but meaningless text (e.g., ambient conversation, typing picked up as speech per DDIAI-65). In that scenario, the LLM receives regular input, does not see `<EMPTY_USER_INPUT>`, and may loop asking the customer to repeat until one of the other counters (OOC, data validation) happens to trip or the customer hangs up. The call does not terminate automatically. For IV, confirm with the BL: (a) does NovaSonic have an STT confidence threshold below which `<EMPTY_USER_INPUT>` is emitted instead of a low-confidence transcription, and (b) was noisy-environment / low-confidence STT behavior included in the V10 UAT test scope. This is an STT/infrastructure-layer question rather than a prompt concern, but the customer-experience risk (indefinite loop in a noisy environment) warrants explicit IV confirmation.

**IV follow-up — Eligibility tool minor observations.** Validation has no major concerns with the eligibility tool code for pilot use (see PA report, Tool Architecture). The following minor items are captured for IV-stage cleanup and do not affect PA:

- **Legacy function name.** The primary eligibility check function is named `isRecurring()`, inherited from when the recurrence check was embedded in the submit tool. The function now handles all four documented error codes plus technical failure, not just recurrence. Rename is cosmetic but improves log and maintenance clarity.
- **DISPUTE_TOOL_NAME typo.** The module-level constant `DISPUTE_TOOL_NAME = "FDI_ELIGIBILTY_TOOL"` is missing the "I" in "ELIGIBILITY." This value propagates into session state entries and CloudWatch log messages. Impact is limited to trace/debugging consistency.
- **Tempfile cleanup under warm Lambda reuse.** `secretManagersCert()` (SessionState.py) writes cert, key, and CA files to `tempfile.NamedTemporaryFile(delete=False)` at module-scope import. The same pattern runs in Token.py. Across many warm invocations of the same Lambda container, `/tmp` could accumulate these files without cleanup. For IV, confirm that Lambda `/tmp` is cleaned between invocations in the production container lifecycle or that the existing pattern has been tested under sustained warm load.
- **Dict-merge precedence in `lambda_handler`.** The payload build `{**session_data, **event, **matched_transaction}` applies left-to-right precedence, with the matched transaction record winning over the LLM-supplied event. This is functionally correct (the matched record is authoritative), and matches the pattern used by the submit tool.

