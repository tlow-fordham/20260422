# Casper API Integration — Full Detail

The PA report covers the Casper API behavior, the contactDate format gap, the submit tool error handling, and the inference-type risk in summary form. The full original prose, including the search-tool date-validation contrast and the precise retry mechanics, is preserved here for IV depth review.

The Casper API (IVR Dispute Claim swagger.yaml, v1.0.3, last updated February 27, 2026) accepts a structured JSON payload containing account information, transaction details, and interview responses. The field-level mapping from tool schema inputs through tool code processing to Casper API fields is documented in the Tool Architecture section and Appendix A.

### API Error Handling and Data Persistence

The Casper API validates payload structure but not semantics. A well-formatted but factually incorrect payload (e.g., a year inference error producing "20241126" instead of "20251126," or a subtly wrong amount) would be accepted and create an incorrect dispute record. Validation also notes that the submit tool performs no format validation on the contactDate field: if the LLM generates a natural language date string (e.g., "Nov 26th 2025" or "January fifth") instead of the required yyyyMMdd format, the submit tool passes it through to Casper as-is via `map_field`. By contrast, the search tool validates date format (`len==8` and `isdigit()`) and rejects malformed dates with a ValueError. [TBD — confirm with the Model Owner whether the Casper API rejects malformed contactDate values or accepts them silently. If the latter, this is an additional silent-error vector that should be addressed by adding date format validation to the submit tool code.]

Validation's review of the Lambda submit tool code confirms that error handling is implemented: non-200 API responses return an escalation message to the LLM, already-disputed transactions (IC-2031 error code) are caught and escalated, recurring transactions are detected for duplicate charges, and missing transaction IDs trigger escalation. The system prompt instructs the AI to apologize and transfer to a human agent on tool failure; the customer is transferred after 2 retries (3 total attempts: 1 initial + 2 retries).

A store-and-forward mechanism exists: when the Casper API fails, collected dispute information is written to a separate DynamoDB table so the data is not lost. The customer hears a technical error message and is transferred to a human agent. A SEV2 incident is raised automatically and the standard production incident response process applies.


**Validation Commentary:**

The model performs multiple inference types beyond simple data extraction, including dispute classification, transaction matching, temporal inference (date parsing and year inference), entity normalization (merchant name matching), and format transformation (natural language to rigid schema). Each of these introduces a distinct failure mode. The silent acceptance of well-formatted but incorrect payloads means that errors may not be caught at submission time and could propagate into downstream dispute processing. Validation recommends the model owner implement post-submission reconciliation checks and monitoring to detect incorrect claim data during the pilot.

