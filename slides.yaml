## 3. GenAI Development Template - Section 5 Discussion (5 min, time permitting)

If the article breakdown from Liz Eisert is available, we would like to begin discussing Section 5 (Development Data). If not available, this will be deferred to the next meeting.

**Data Sources (5.1)**

24. What are the source systems for the knowledge base articles (ServiceNow, Salesforce, or both)? Who is the data source owner?
25. What is the article count for the 24Hr Banking scope, and how are articles distributed across categories or tags?
26. Are there differences between the articles available in the development/testing environment and the production knowledge base?
27. What data sources will be used for testing and evaluation (Cyara outputs, SME-curated sets, synthetic data, or a combination)?

**Data Quality (5.2)**

28. What quality controls exist for the knowledge base articles (e.g., reconciliation against ServiceNow, duplicate detection, staleness review)?
29. How frequently are articles updated, and what is the synchronization process between ServiceNow/Salesforce and QIC?
30. Has a coverage analysis been performed to identify gaps in the KB relative to expected customer queries?

**Data Pre-Processing (5.3)**

31. Is any preprocessing applied to articles before ingestion into QIC (e.g., HTML stripping, formatting normalization, PII masking)?
32. Is any preprocessing applied to customer queries before they reach the LLM (e.g., query rewriting, spelling correction)?
33. If synthetic test data will be generated, what methodology and tools are planned?

**N/A Confirmation**

34. Several Section 5 template requirements appear not applicable to this model. Can you confirm the following do not apply?
    - Foundation LLM training data details (proprietary Anthropic model, no U.S. Bank training data)
    - Fine-tuning or distillation data sources
    - Data partitioning splits (training, holdout, out-of-time)
    - Upstream feeder models other than Nova Sonic for STT
