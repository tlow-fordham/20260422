## 2. Article Inventory and Scope Discussion

Since each business line operates its own IVR with its own scoped article set, cross-BL article contamination is not a retrieval concern. However, within each BL's article set, the article count, topic organization, and content quality directly affect retrieval accuracy. Validation needs the article breakdown to understand the within-BL retrieval challenge and to plan test coverage accordingly.

- John asked why article count is needed
- Jordan explained that even within a single BL's article set, retrieval becomes more complex as the article count grows, particularly when semantically similar articles exist across adjacent topics within the same BL (e.g., a general escrow overview vs. a state-specific escrow article)
- Sana noted the EMA references approximately 3,600 articles for 24Hr Banking
- John stated the team would not go live with all of those articles at once and noted that other business lines (Card and MPS) also want to start at the same time
- John emphasized the goal of getting approval for knowledge base integration as a whole, at scale, so that any group can move forward quickly without requiring months of individual work per business line
- Jinjun noted that targeted validations can be performed after the initial validation when new business lines are onboarded
- Jinjun also noted that if articles are too long, chunking becomes important, and that some models use parent-child chunking approaches
- Scott asked what is required to obtain blanket approval for KB integration if the basic architecture remains the same (Claude Haiku, QIC Amazon platform)

**Xinyu provided the following guidance on enterprise-scale approval:**
- The business line is still designing the application, and the second line of defense should not be part of the design process, as that would compromise independence; general principles can be discussed, but MRM will not participate in design decisions
- If the model owner wants future business line expansions to proceed without triggering full targeted scope validations, the model should be designed with that goal in mind from the start
- Although each BL operates its own IVR, the key risk factor for scalable expansion is whether the article format, length, layout, content structure, and metadata are consistent across business lines; if the retrieval algorithm and chunking configuration are optimized for one BL's article format and a new BL's articles differ significantly, the same pipeline may not perform equally well
- Xinyu recommended pre-processing all KB articles to have a consistent look and feel across the full 65,000-article universe, so that the same retrieval algorithm can be applied to each new BL's IVR without re-optimization
- When onboarding a new business line, the model owner would run performance testing; if results are consistent with baseline, the model change management process would be streamlined; if performance drops, root cause analysis would be needed
- Xinyu shared observations from prior experience: article quality varies across business lines, some pre-processing has been done incorrectly in the past (truncating important information, resulting in incorrect answers to customers), article lengths vary widely (some 8-10 pages, others half a page), and titles vary in specificity
- Expanding usage to a different business line is considered a material change that requires additional validation

**Jordan** demonstrated a data source article from "The Source" (U.S. Bank's internal KB portal) showing 17,082 results with articles organized by business line tags, to illustrate the volume and topic density within a single BL's article set and the importance of accurate retrieval when semantically similar articles exist within the same category.

**Scott** responded that the team is aligned on consistent formatting and tagging, with variations expected to be minimal and only smaller reviews required.

