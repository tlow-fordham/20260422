### UDF Arguments — Clarification

Jeeta requested a thorough re-explanation of arguments. Key points clarified:

Arguments are function inputs that define what data or artifacts the UDF receives from the Nimbus platform each time it runs. Argument types include: Dataset (any dataset in the active project), Model (internal or external model objects), Console File (CSV, JSON, pickle, YAML, zip, etc.), Column (a specific field from a dataset), Choice (user-defined dropdown options), and numeric/string values.

Arguments enable reusability: the same UDF can be rerun with different datasets by simply changing the argument value, without modifying code. Multiple arguments are supported (no limit). Functions can call other functions, and complex objects can be passed within the code itself since the editor is a standard Python notebook.

**Q (Jordan):** Can UDFs connect to external APIs (e.g., Azure OpenAI) and use artifacts beyond what's in `requirements.txt` — such as sentence transformer weights, NER models, or direct API calls? **A:** Yes — the platform sits on US Bank Azure, so API connections are possible. Users provide API keys within the UDF code. Data can be fetched from or pushed to external APIs, dashboards, or reporting tools from within UDFs.

**Q (Jordan):** Can I import code from an internal US Bank repository (GitLab)? **A:** The "Import Code" functionality exists for GitHub and Bitbucket but is currently disabled in the US Bank environment. GitLab support needs to be verified and enabled.

**Q (Jordan):** Can you pass custom Python classes between UDF functions (e.g., passing a class object from one module to another)? **A:** Classes can be defined and used within a single UDF (the editor is a standard Python notebook). For passing between UDFs in a pipeline, objects can be serialized via console files (pickle, JSON). Vivek committed to checking if there are any limitations on class writing and passing between pipeline nodes.

