## Team Discussion

**Duncan Fung** asked about exceptions for vendor models and non-standardizable high-risk models. He noted that many mortgage and market risk models (PolyPaz, ICE, Calypso, Bloomberg, custom MCMC models) have small datasets, no pipelines, and existing working code. Casandra confirmed exceptions will exist but the justification needs to be solid, and those decisions go through the validation executive and Vijay.

**Max Zalutskiy** asked about vendor viability and lock-in risk. If MRM commits to a vendor, will they be around in 5 years? Are there bigger names? Casandra noted the main larger-name alternative is SAS's platform, which is cost-prohibitive. Solytic (the Nimbus vendor) has a long-standing relationship with U.S. Bank leadership going back to the UPAN era, and TPRM requires financial statement review before any long-term contract. Max also observed that the vendor's responsiveness during POC testing is a preview of post-contract behavior.

**Valerie Hsu** raised that automation may not address the actual root cause of timeline delays, which for her team is the back-and-forth with model owners and insufficient documentation, not the analytical work itself. Casandra agreed and described the parallel process improvement initiative, including documentation acceptance criteria and monitoring automation.

**Duncan** asked about the trade-off between standardization and risk-based prioritization, noting that high-risk models tend to be the least standardized and therefore the hardest to automate. Casandra acknowledged the trade-off and said the ROI of customization will be weighed case by case.

**Ben Vulu** asked whether first-line development groups are expected to adopt the platform. Casandra confirmed she wants them on it but cannot force it, and that coordinating across groups involves "turf wars, egos, and things not working great for everybody."

