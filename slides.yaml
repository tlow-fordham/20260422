## Common Mistakes to Avoid

1. Do not use "Finding" in PA narrative. Use "observation," "early engagement recommendation," or "early engagement observation."
2. Do not conflate metric denominators. State each denominator explicitly.
3. Do not recommend specific sample sizes or test designs. Independence requirement.
4. Do not reference the PA draft in external communications unless confirmed issued.
5. Do not include internal analytical notes in sendable documents.
6. Do not reference other models by number in external documents.
7. Do not assume a colleague's prior work is correct. Verify against source data.
8. Do not use "Go-No-Go" in validation documents. Use "before pilot launch" or the specific date.
9. Do not add items from one model's tracker to another model's documents.
10. Do not carry over architectural facts across models.

