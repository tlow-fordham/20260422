## Process and Logistics Notes

**AI Enablement Deployment Tracking (new as of May 2026):**
A new swim lane ("AI Enablement") and Jira component were introduced for tracking Brian, Paul, Samata, and Kartike's deployment work across archetypes. Teams should add stickies to that swim lane during planning and tag epics in Jira with both their project component and the new "AI Enablement" component. This allows the deployment team to see cross-archetype stories on a consolidated board.

**Net New Room:**
Removed from MPP breakout structure because PDLC runs its own planning. H2/H3 rooms remain. Mural board preserved for future use.

**Capacity Planning Guidance:**
Plan at 75-80% capacity. Account for summer vacations, COE office hours, and Track 2 commitments. Dependencies should be captured in both Mural and Jira.

**Meeting Forwarding:**
Open forwarding policy. Anyone can forward the MPP invite to additional participants.

