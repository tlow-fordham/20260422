84,3/26/2026,Architecture,Confirm whether the architecture uses a ReAct reasoning loop,Baloo,Resolved,"The architecture is not ReAct. The FDI AI Agent runs a deterministic multi-stage workflow: the stages follow a fixed order and do not skip or go backward. Within each stage, the LLM uses internal adaptive reasoning (extended thinking, sometimes called chain-of-thought) to plan and reason before producing a response or a tool call. The depth of reasoning scales with the complexity of the problem.

The system prompt provides a <thinking> tag for this per-turn reasoning, with the instruction that thinking content must never be placed inside the message tags sent back to the caller. Thinking tokens are stripped from the output and are not exposed to the caller.

Confirmed at the 4/1 meeting: the stage sequence is deterministic, the turns within each stage are not, and the LLM suggests tool calls while the QIC platform actually executes them. Baloo posted the official per-turn flow diagram to Confluence after the meeting."
