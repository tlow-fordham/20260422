# Risk Mitigation

The following risk mitigation strategies are in place or proposed for the pilot:

**Scope Restrictions:**
- Only two dispute types processed (duplicate charges and incorrect amounts); all others escalate to human agent
- Transaction amount threshold of $300; amounts above this escalate to human agent
- Maximum of 3 dispute claims per customer within a 30-day period, enforced via the Casper eligibility API check invoked by the eligibility tool (DDIAI-147, confirmed as part of the Prod version)
- Duplicate transaction policy: if more than 2 transactions have the same amount, the call transfers to a human agent

**Automatic Escalation Triggers:**
- Out-of-scope dispute type detected
- Customer does not recognize the transaction (potential fraud)
- Customer explicitly requests a human agent at any point in the conversation
- Three out-of-context questions from the customer
- Tool call failure after 3 total attempts (1 initial + 2 retries), per system prompt instructions
- Transaction is still pending (customer instructed to call back in 1-3 days)

**Duplicate and Error Prevention:**
- Already-disputed transactions are detected via Casper API error code IC-2031; the LLM is instructed to inform the customer and transfer to a human agent
- Recurring transactions are detected for duplicate charge disputes before submission; if recurring, the submission is blocked and the call is transferred

**Consent and Disclosure:**
- Regulatory disclosure read before dispute submission; customer must acknowledge before the submit tool is invoked
- Regulatory disclosure read verbatim before claim submission; customer must acknowledge
- Confirmation stage gives the customer an explicit opportunity to review and adjust all dispute details before submission

**Monitoring and Audit:**
- Real-Time Alarms component uses Amazon Nova Pro V1 to monitor conversation metrics and raise SEV2 alerts when thresholds are breached
- Conversation Analytics component streams turn-by-turn data to S3 for reporting via Amazon QuickSight
- Success metrics defined: Successful Casper Submission Rate >= 90%, Intake Error Rate <= 10% (measured at call level)

**Data Persistence on Failure:**
- Store-and-forward mechanism via a separate DynamoDB table: when the Casper API fails, collected dispute information is persisted so it is not lost
- The customer hears a technical error message and is transferred to a human agent
- A SEV2 incident is raised automatically and the standard production incident response process applies

**Data Protection:**
- No card data in the system; tokenized account numbers and LPID used instead
- PII limited to customer's full name
- System prompt instructs the AI not to disclose or discuss PII, with a dedicated `<pii_handling>` section enforcing a 2-attempt escalation protocol
- Instruction-based guardrails validated through 13 adversarial test cases on the Prod version
- Real-time post-call monitoring via Nova Pro V1 LLM judge evaluates each conversation for PII disclosure, toxicity, jailbreaks, and unauthorized commitments

**Inherent LLM Safety:**

Model 7409 uses Anthropic Claude Haiku 4.5 as its foundation LLM. Claude Haiku 4.5 is part of the Claude 4.5 model series developed by Anthropic and released in October 2025. The LLM's training data and training approach are described in the LLM Training Data section under Development Data. Claude Haiku 4.5 offers a 200K context window with up to 64K output tokens. The production configuration sets max_tokens=2048 per invocation, capping each per-turn output length (see LLM Configuration section).

The training approach embeds safety behaviors during training through Constitutional AI (reinforcement learning from human feedback aligned with established principles) rather than relying solely on post-hoc filtering. Post-training, the model underwent safety checks and was optimized to produce structured outputs in formats such as YAML, JSON, and XML, which is relevant to Model 7409's requirement to generate well-formed tool call parameters for the Casper API.

Claude Haiku 4.5 is configured with Temperature=0.0 (greedy sampling), which selects the most probable next token at each step, eliminating stochastic variation and producing deterministic outputs for identical inputs. For a conversational data collection task where consistency and accuracy are more important than creativity, greedy sampling is the appropriate choice. The production invocation parameters are temperature=0.0 (overriding the platform default of 1.0) and max_tokens=2048 (a required parameter with no platform default). The max_tokens=2048 setting caps each per-turn output length well within the model's 64,000-token maximum output capacity, providing an implicit guardrail against runaway generation.

Independent of the application-level guardrails, the foundation LLM has inherent safety characteristics documented in Anthropic's published system card (October 2025):

- **AI Safety Level 2 (ASL-2):** Claude Haiku 4.5 is released under Anthropic's ASL-2 standard. Automated evaluations confirmed the model remained well below ASL-3 thresholds across all evaluated domains (biology, autonomy), performing similarly to Claude Sonnet 4, which was also deployed with ASL-2 safeguards.
- **Misaligned behavior:** On Anthropic's internal automated behavioral audit metrics, Claude Haiku 4.5 achieved Anthropic's strongest safety performance to date, scoring slightly better than Claude Sonnet 4.5 on the overall misaligned behavior metric and showing clear improvements over Claude Haiku 3.5.
- **Harmful code refusal:** In testing with access to coding tools, Claude Haiku 4.5 achieved a 100% refusal rate on clearly harmful code requests.
- **Prompt injection resistance:** The system card reports robust prompt-injection defenses, with a low rate of successful prompt injection attacks compared to other models.
- **Over-refusal rate:** Claude Haiku 4.5 showed a 6.01% over-refusal rate on higher-difficulty benign request evaluations, meaning it occasionally refused legitimate requests. This is relevant for customer-facing use, as an over-refusal during a dispute conversation could disrupt the flow and require escalation.
- **Toxic content handling:** The model was assessed for its ability to manage toxic content, showing a high refusal rate for harmful requests, aligning with Anthropic's Responsible Scaling Policy and safety protocols.

These inherent safety properties provide a baseline layer of protection independent of the application-level guardrails (system prompt instructions). However, Anthropic's system card notes that the safety evaluations relied entirely on automated benchmarks and selected snapshots; independent adversarial testing and human red-teaming were not performed. This limitation should be considered when assessing the robustness of the inherent LLM safety layer for a customer-facing banking application.

**Pilot Monitoring Plan:**

The model owner has presented a pilot monitoring plan in substance, combining business line analytics, customer experience measurement, an FDI AI Agent dashboard, and platform-level technical metrics:

- **BL analytics cadence.** Week 1: data availability confirmation and triage of gaps; daily meetings on initial observations and client-impacting issues. Week 2: daily meetings as needed; two-week trend reporting. Week 3: refreshed analytics on client channel utilization; three-week trend reporting. Week 4+: refreshed analytics and estimated initial full-time equivalent (FTE) impacts; FTE impacts tracked for a minimum of 12 weeks. Reporting handoff to the standard analytics dashboard team will be planned once production data is available.
- **CSAT measurement.** Conversational AI calls are added to the existing survey covering contained IVR experiences. Metrics include Call Satisfaction, Issue Resolution, and Effort to Resolve, with comparison to live-agent experience where possible. Text analytics will be used to provide context and identify specific pain points. Results are reported in existing business-as-usual IVR and Operations forums.
- **FDI AI Agent dashboard.** A dedicated post-release dashboard will be developed after production data stabilizes (approximately 4 weeks after implementation), following a structure similar to the existing Agent Scorecard. Estimated launch: approximately 10 weeks after implementation.
- **Platform technical metrics.** The full metric inventory (21 metrics across 4 sources) is documented in the Real-time Monitoring and Alerting section above. Metrics are viewable per contact ID through a dashboard UI in UAT. Traceability logs are maintained as a CloudWatch query for troubleshooting.

*Additional monitoring items:*

- **Manual quality review of production calls.** The model owner provided a controls framework documenting 6 controls for the dispute intake process, developed in coordination with First Line risk and compliance groups. The manual quality review control specifies that throughout each month, a sample of AI bot transcripts will be reviewed to determine if the bot captured client information correctly, with overall results reported to leadership monthly. The review will be conducted by the quality team under Nils Tang, mirroring the existing process for monitoring human agent calls. Validation has no concerns with the controls framework as presented. The sample size methodology and the exception/feedback determination process for remediation are noted as pending finalization and will be assessed during IV.
- Per-call trace files combining the conversation transcript (S3), search tool log (CloudWatch), eligibility tool log (CloudWatch), and submit tool log (CloudWatch) are produced in UAT and will be retained in production. Validation used these traces during the PA to reconstruct end-to-end call flows, including a multi-claim session with both PE#IA and PE#DC submissions. The same traces will support field-level accuracy assessment on production data during the pilot and IV.
- The alerting threshold for all 6 CloudWatch alarms is confirmed: more than 3 datapoints within a 5-minute evaluation period triggers a SEV2 alarm. Response actions for triggered alarms are not yet documented and are required for IV.

**Pilot Success Measurement:**

The model owner defined two quantitative success metrics for the pilot:

- **Bot Successful Interview Completion Rate:** >=90%
- **Intake Error Rate:** <=10%

These thresholds are consistent with the thresholds against which the pre-pilot SME testing was assessed (Successful Casper Submission Rate >=90%, Intake Error Rate <=10%), providing a consistent reference point for judging pilot performance against pre-pilot expectations.

In addition to the two success metrics, the model owner will monitor a broader set of operational and customer experience metrics during the pilot to inform a holistic assessment of the model's readiness for full production. These include Call Containment Rate, CSAT, Claim Volume Impact, Touches per Claim, Incomplete Interview per channel, Requests for Additional Information per channel, Average Handle Time, and Intake Success Rate. These metrics do not have predefined thresholds; they will be reviewed by senior leadership alongside the two success metrics to evaluate overall pilot performance and determine whether to proceed to full production.

**Change Management During Pilot:**

The system prompt was revised multiple times during the Early Engagement period (Prod version frozen on May 11; PA review formally kicked off on May 13). During the pilot, the model owner may need to modify the prompt, tool code, or guardrail configuration in response to production observations. The change-control framework distinguishes between changes that significantly affect model outcomes and changes that do not:

- **Changes that significantly affect model outcomes** (require MRM review before deployment): changing the LLM, changing temperature or other hyperparameters, adding or removing tools, adding or removing conversation stages, adding new dispute types to the pilot scope, modifying escalation logic (thresholds, triggers, routing), changing the regulatory disclosure text, modifying PII/PCI handling rules or guardrail configuration (including adding or removing policy-based Bedrock Guardrails), and changing the intake submission disclosure played before the customer confirms submission.
- **Changes that do not significantly affect model outcomes** (deploy after internal testing and logging, no MRM review required): minor system prompt wording adjustments that do not alter logic (e.g., adding a few-shot example to fix an identified issue, voice-friendly phrasing changes), bug fixes to tool code that correct behavior to match existing documented intent, and changing fuzzy match tolerances in the search tool.

Only changes that do not significantly affect model outcomes are permitted during the pilot. A change that significantly affects model outcomes requires a new Provisional Approval for a new pilot or Initial Validation for full production use.

**Validation Commentary:**

Validation considers the scope restrictions and automatic escalation triggers as the primary risk mitigations for this pilot. The restriction to two low-complexity dispute types with a $300 ceiling and a 3-claim-per-30-day limit bounds the potential financial impact of errors. The multiple escalation triggers ensure that complex, ambiguous, or potentially fraudulent scenarios are handled by human agents. The store-and-forward mechanism for Casper API failures and the automated SEV2 alerting via Nova Pro V1 provide additional operational resilience.

However, Validation notes the following residual risks inherent to the use case and pilot design:

- **No human-in-the-loop for individual interactions.** The model speaks directly to customers with no agent reviewing AI responses before they are delivered. This is inherent to the use case — the purpose of the model is to automate the dispute intake conversation. The Nova Pro V1 Real-Time Alarms component monitors aggregate metrics, not individual conversation content, and cannot prevent errors in real time. This risk is mitigated during the pilot by periodic SME review of a sample of production calls and by the scope restrictions that limit the model to low-complexity dispute types.
- **Pilot governance.** The pilot monitoring metrics, change-control framework, and phased rollout approach are documented in the Pilot Monitoring and Governance section.

