### Collaborative Project — Locking and Version Tracking

**Issue encountered (Ali):** Received "artifact is being accessed by another user" error when trying to use a UDF in a collaborative project. Root cause: if a user closes the browser tab without properly exiting the UDF, the artifact remains locked.

**Resolution:** Use the "Locked Artifacts" icon (top right notification bar) → right-click on the locked UDF → "Unlock Artifact." The dataset then becomes accessible.

**Version tracking in collaborative projects:** UDF Manager → Version History tab shows all commits with the name of the user who made each change (author column), timestamps, and file-level diffs. Currently, the "Created By" field in audit trail shows the project owner's name rather than the actual user — an improvement is in progress to show the actual executing user.

**Data versioning in collaborative projects:** When multiple users transform the same dataset, the platform creates versions rather than overwriting. The original data stays intact. Operations by all users are tracked in job queue logs and audit trail.

**Audit logs — two levels:**

1. Organization-wide: Settings → Audit Logs — shows every action by every user across all projects (action type, timestamp, project ID, user).
2. Project-level: Project Details → Audit Trail — shows operations within a specific project, with user attribution.

Current limitation: audit logs show basic information (action, timestamp, user) but not detailed compute usage, package information, or execution details. Enhanced logging (including CPU utilization) is in development for a future release.

