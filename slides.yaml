# Model Purpose and Usage

Model 7409 is a Generative AI-powered Interactive Voice Response (IVR) solution designed to automate debit card dispute claim initiation through natural language voice conversation in U.S. Bank's contact center. The model uses Amazon Connect AI Agents with Anthropic Claude Haiku 4.5 as the primary conversational Large Language Model (LLM) to collect dispute information from customers via telephone and submit structured claims to U.S. Bank's internal Casper dispute management system via API.

The model replaces a portion of the existing manual process in which human agents collect dispute details from callers and enter them into Casper. The AI agent conducts a multi-stage conversation to: (1) identify the dispute type, (2) identify the disputed transaction from the customer's account, (3) collect merchant contact history, (4) confirm dispute details with the customer, (5) read regulatory disclosures and obtain consent, and (6) submit the claim to Casper and provide the customer with a case reference number.

The use of conversational AI in the IVR has been identified by Bank leadership as a key strategic AI opportunity and is an AI Center of Excellence (COE)-sponsored initiative. Currently, callers must speak to a human agent to submit a dispute claim; the complexity of dispute claims makes self-service infeasible without AI models. Model 7409 creates a self-service feature within the IVR that allows customers to submit their own dispute claims. The business justification for the GenAI agentic approach is improved performance: the pilot success metrics are Bot Successful Interview Completion Rate (>=90%), Intake Error Rate (<=10%), Call Containment Rate (monitored during the pilot), and Customer Satisfaction (CSAT) (monitored during the pilot). A production pilot is necessary because lower-environment testing with synthetic data cannot replicate production customer behavior; the pilot is intended to evaluate the technology's effectiveness before solidifying a long-term roadmap, prioritizing use cases, and evaluating cost/benefit for investment decisions.

During the pilot production period from May 19, 2026 until November 19, 2026, the model is restricted to processing only two dispute types: duplicate charges (PE#DC) and incorrect amounts (PE#IA). All other dispute types are immediately escalated to a human agent. Transactions exceeding $300 in posted amount are also escalated. A rate limit of 3 dispute claims per customer within a 30-day period is enforced via the Casper eligibility API check invoked by the eligibility tool. The model serves only U.S.-based debit card customers. The model owner reports that these two dispute types represent approximately 23% of total dispute volume across all 12 dispute types and less than 1% of overall 24-hour banking IVR call volume, based on actual experience over approximately the past year. All eligible callers will be routed to the AI agent during the pilot; there is no A/B testing or control group with human-only processing.

**Validation Commentary:**

Validation has assessed the purpose and usage of Model 7409 and the proposed pilot scope. The restriction to two dispute types with automatic escalation for all others provides a clean validation boundary. The $300 transaction threshold and the 3-claim-per-30-day limit provide additional safeguards against high-value errors and abuse. Validation notes that Model 7409 is directly customer-facing: it speaks to customers with no human review of individual AI responses before they are delivered. This elevates the risk profile relative to employee-facing models and, in Validation's assessment, warrants rigorous guardrail testing and monitoring. Validation recommends that the model owner document guardrail testing results covering hallucination detection, toxicity, and adversarial testing (prompt injection, jailbreaking, data exfiltration) as part of the Initial Validation documentation package.

