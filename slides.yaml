## Jeeta's Platform Comparison Summary

Jeeta presented a high-level comparison, positioning Nimbus as the strongest option for MRM's traditional model validation lifecycle. Key arguments:

**Lumenova assessed as insufficient for MRM lifecycle.** Jeeta characterized Lumenova as a "model inferencing platform" that does not support the model benchmarking and development that MRM requires across the full validation lifecycle. Traditional statistical techniques used in credit risk and market risk (AUC, ROC, KS statistics, F-statistics, T-statistics) were described as not available on Lumenova based on conversations with the Lumenova team. Jeeta stated that Nimbus has approximately 90% of the required statistical metrics available versus Lumenova's partial coverage.

**SAS and on-prem database connectivity.** Nimbus can integrate with SAS, absorb SAS files and R files, and connect to on-prem databases (Vault, FTW). Lumenova was described as having only partial capability in this area. This was framed as critical because most MRM models are still in SAS, with very few in Python.

**Audit trail and SR 11-7 compliance.** Nimbus was described as having stronger audit trail support aligned with SR 11-7 requirements than Lumenova.

**DataRobot still under evaluation.** Jeeta noted her team was onboarded to DataRobot that week. Initial impressions suggest it has more functionality than Lumenova but whether it meets MRM's specific statistical and model-type requirements is unknown. A DataRobot demo was scheduled for the following day.

**Nimbus roadmap.** Q2 2026 testing continues through July. Concurrent feature enablement includes Azure ML Studio connectivity, SAS connections, and database connections. Jeeta committed to sharing a detailed feature-by-feature Excel comparison with the group.

