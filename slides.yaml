slides:

  - layout: "title"
    title: "How We Validate Agentic AI Models"
    subtitle: "A consistent approach across projects, prioritized by materiality"
    footer: "MRM Validation - AI Center of Excellence | April 2026"

  - layout: "two_column"
    title: "Classify First, Then Assess"
    left_header: "Architecture Classification"
    left_sections:
      - heading: "1. What components exist"
        bullets:
          - "Persistent memory across sessions? (yes/no)"
          - "Separate planning module? (yes/no)"
          - "Reflection or self-evaluation loop? (yes/no)"
          - "If no, document design rationale - do not test what is absent"
      - heading: "2. Tool selection"
        bullets:
          - "High discretion: many tools (10+), LLM decides order"
          - "Low discretion: few tools, sequence enforced by code or API"
    right_header: "Worked Examples"
    right_sections:
      - bullets:
          - "7409: 5 tools, low discretion - code prerequisites enforce order; no memory, no reflection, no planner"
          - "7724: 4 tools, low discretion - fixed prompt calls same tools in same order every time"

  - layout: "single"
    title: "Tier 1 - Always Validate"
    sections:
      - bullets:
          - "Task completion accuracy"
          - "Output safety (toxicity, PII, unauthorized commitments)"
          - "Escalation reliability"
          - "Data isolation"
          - "System prompt and tool code review"
          - "MO test methodology and results review against source evidence"
          - "MO business metrics review"
          - "Sampled trace review"

  - layout: "two_column"
    title: "Tier 2 and Tier 3"
    left_header: "Tier 2 - Scope by Architecture and Use Case"
    left_sections:
      - bullets:
          - "Tool selection (Tier 1 if high discretion; use error counts if low discretion)"
          - "Conversation boundary integrity"
          - "Upstream model dependency"
          - "Guardrail quantitative results (bypass rate, false positive rate)"
          - "Benchmarking (what alternatives were considered)"
          - "Explainability process (documented SME review and flagging procedure)"
    right_header: "Tier 3 - Defer to Monitoring"
    right_sections:
      - bullets:
          - "Sensitivity/robustness - implicit if test cases are sufficient"
          - "LLM evaluator alignment - document limitations; elevates when evaluator scores drive production decisions"
          - "Component-level attribution - root cause on errors"

  - layout: "two_column"
    title: "Construction Review and Model Selection (§7.2/§7.3)"
    left_header: "Always Review"
    left_sections:
      - bullets:
          - "End-to-end agent flow and stage logic"
          - "System prompt as a code artifact (versioned, diff-able)"
          - "Tool code and schema definitions"
          - "Guardrail layering (prompt-based, runtime enforcement, structural)"
          - "Architectural caps (turn limits, retry limits, escalation triggers)"
          - "LLM selection: model, version, temperature, context window"
    right_header: "LLM Selection and Alternatives"
    right_sections:
      - heading: "Depth is proportional"
        body: "Always document what LLM was selected and key hyperparameters. If the model tests well and the choice is defensible on its face, a brief rationale is sufficient."
      - heading: "Go deeper when"
        bullets:
          - "Model performance is weak or inconsistent"
          - "LLM choice is unusual for the use case"
          - "Fine-tuning was considered but rejected (document why)"
          - "Multiple LLMs were benchmarked (document comparison)"
      - heading: "Skip"
        body: "Exhaustive vendor comparison when the model tests well and the LLM choice is standard."

  - layout: "two_column"
    title: "Key Practices and Regulatory Grounding"
    left_header: "Practices"
    left_sections:
      - heading: "Structural enforcement is evidence"
        body: "Code prerequisites, schema validation, session-scoped data stores close risk categories by design. Document as closing evidence."
      - heading: "MO tests, Validation assesses"
        body: "Assess methodology, verify against logs and traces. Do not substitute testing where we lack expertise or access."
      - heading: "Metrics by risk intent"
        body: "Map MO metrics to risk, not template vocabulary. Do not require a specific evaluation method when the underlying risk is already covered."
    right_header: "SR 2026-13a Principles"
    right_sections:
      - heading: "Footnote 3"
        body: "GenAI/agentic AI explicitly outside scope. Bank develops tailored framework."
      - heading: "Proportionality (§III)"
        body: "\"Tailor practices... commensurate with that risk.\""
      - heading: "Method flexibility (§V)"
        body: "\"Outcomes analysis can take many forms.\""
      - heading: "Testing ownership (§IV)"
        body: "\"Model testing is a core component of model development.\""
    footer: "MRM Validation - AI Center of Excellence | April 2026"
