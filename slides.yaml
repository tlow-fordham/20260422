### Azure ML Integration & Nimbus Agent Setup

This section covered the one-time setup required to connect Azure ML notebooks to the Nimbus platform via the Nimbus Agent.

**Why this is needed:** Nimbus's built-in IDE (Jupyter Hub) was not approved within US Bank. Azure ML Studio is the approved alternative. The Nimbus Agent creates a bridge: users can write code in Azure ML notebooks and push UDFs, commits, and results to the Nimbus platform.

**When this is needed:** Only required if users want to write custom Python code, use Spark clusters, or work with models hosted on Azure ML. For simple no-code workflows or the Nimbus Core Editor (once enabled), this setup is not required.

**Setup steps (one-time per user):**

1. Log into Azure ML portal → verify NimbusDev01 workspace is visible → confirm personal compute instance is running (Manage → Compute → check name in table)
2. Open terminal from the Notebooks tab (navigate to personal folder → three dots → Open Terminal, or click the Terminal button)
3. Change directory to personal user folder
4. Copy setup files (requirements.txt, Nimbus Agent, conda dependencies YAML) — verify with `ls` command showing 3 files
5. Generate JFrog identity token (US Bank's artifact repository for secure package downloads) — log into JFrog platform, generate and save token
6. Edit `.bashrc` file via `nano` to add JFrog credentials (preferred ID and token) at three locations in the file — save with Ctrl-O, exit with Ctrl-X
7. Source the `.bashrc` file
8. Create conda environment with a chosen kernel name (e.g., "nimbus")
9. Install required packages via `pip install` using the requirements.txt
10. Activate the conda environment

**Issues encountered during session:** Multiple attendees had terminal access failures (reconnection errors, compute instances not appearing). Shaysia restarted compute instances for some users. Valerie and others were missing compute instances entirely — taken as a follow-up to add. The Langsmith package caused installation errors requiring a version change (0.1.32). Requirements.txt was blank for one user (Jenning).

**Nimbus Agent commands (demonstrated by Varun):**

- `nimbusagent -h` — list all available commands
- `nimbusagent initagent --org "US Bank"` — log into Nimbus account via SSO
- `nimbusagent createudf <name> <project_id>` — create a new UDF from Azure ML, automatically appears in Nimbus
- `nimbusagent initializeudf <name> --project_id=<id>` — pull an existing Nimbus UDF into Azure ML for editing
- `nimbusagent commitchanges <udf_name> "<message>"` — commit code changes
- `nimbusagent savechanges <udf_name>` — push committed changes to Nimbus (version history updated)
- `nimbusagent createtask <udf_name>` — create a pending task in Nimbus job queue
- `nimbusagent uploadresults <task_name>` — push execution results from Azure ML to Nimbus (completes the pending task)
- `nimbusagent deinitializeudf` — remove a fetched UDF from local working directory
- `nimbusagent stopagent` — log out

Tasks created via the agent show as "UDF Agent Task" in the job queue (vs. "UDF Manager Task" for tasks run natively in Nimbus).

