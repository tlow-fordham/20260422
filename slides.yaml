### Nimbus Core Editor (Internal Editor) — First Live Demonstration

This was the first session where the internal editor was functional and demonstrated. Unlike the Azure ML setup from Session 5, the Core Editor requires no external configuration — it is built into the Nimbus platform.

**How it works:** Create a UDF → define arguments → go to the Code tab → double-click `main.ipynb` file → click "Debug" button → the internal editor opens (installs required components on first launch). The editor is a Jupyter-like notebook interface where users can write, test, and execute Python code directly. Supports Python 3.10 (with R also available via dropdown). Pre-installed packages include pandas, matplotlib, scikit-learn, and other common libraries. Additional packages can be specified in `requirements.txt` and auto-install on next run.

**Key advantage over Azure ML setup:** No compute instance configuration, no terminal commands, no conda environments, no JFrog tokens. Users just open the editor, write code, and run it. Significantly more lightweight and accessible for analysts.

**Q (Duncan):** How can I see what packages are pre-installed and their versions? **A:** Vivek committed to providing a list of pre-installed packages. Additional packages can be added via `requirements.txt` or installed from the backend by the Nimbus team.

**Q (Ali):** If I edit an argument name after UDF creation, does the code update automatically? **A:** No — argument names in the code must be manually updated to match.

