# Appendix A: Casper API Field Mapping

This appendix documents every field in the Casper API payload (IVR Dispute Claim swagger.yaml, v1.0.3), its source, and when in the conversation flow it is populated. "Populated By" identifies the specific component and, where applicable, the tool code method responsible. "Conversation Stage" indicates when in the six-stage flow the data originates. See the Tool Architecture section for the full field-level mapping from tool schema inputs through tool code processing to these Casper fields.

| Casper API Field | Casper Section | Description | Required | Format | Populated By | Conversation Stage | Evaluated at PA |
|------------------|---------------|-------------|----------|--------|-------------|-------------------|-----------------|
| callWrapped | top-level | Indicates the call was handled by the IVR (always True for AI agent calls) | Yes | boolean | Hardcoded True in submit tool (build_api_payload) | N/A — constant | No |
| IVRCallReference | top-level | Unique identifier for the call, set to the Amazon Connect contactId | Yes | string | Submit tool reads contactId from session state (build_api_payload) | Pre-conversation: set by Amazon Connect | No |
| tokenAccountNumber | accountInfo | Tokenized debit card account number for the customer | Yes | string | Submit tool reads TokenizedCardNumber from session state (build_api_payload) | Pre-conversation: account authentication in Connect flow | No |
| cardMemberName | accountInfo | Customer's full name as authenticated during the IVR flow | Yes | string | Submit tool reads customerName from session state (build_api_payload) | Pre-conversation: account authentication in Connect flow | No |
| cardholderID | accountInfo | Legal Participant ID (LPID), the unique customer identifier in Hogan/CIS | Yes | string (LPID) | Submit tool reads legalParticipantID from session state (build_api_payload) | Pre-conversation: account authentication in Connect flow | No |
| refNumber | transactionDetails | Transaction reference number from the bank's records | Yes | string | Submit tool reads disputedTransactionId from matched transaction record (build_api_payload). Originally sourced from DynamoDB TransactionId via search tool. | Stage 3: Transaction Identification (search tool output → LLM → submit tool) | Yes (pass-through) |
| merchantName | transactionDetails | Merchant name as recorded in the bank's transaction system | Yes | string | Submit tool reads from matched transaction record (build_api_payload). Originally sourced from DynamoDB MerchantName via search tool. | Stage 3: Transaction Identification (search tool output, stored in session) | Yes (pass-through) |
| transactionDate | transactionDetails | Date of the disputed transaction | Yes | string (yyyyMMdd) | Submit tool reads Date from matched transaction record (build_api_payload). Originally sourced from DynamoDB via search tool. | Stage 3: Transaction Identification (search tool output, stored in session) | Yes (pass-through) |
| tranAmount | transactionDetails | Posted amount of the disputed transaction | Yes | float | Submit tool reads Amount from matched transaction record; converted via map_amount (build_api_payload). Originally sourced from DynamoDB via search tool. | Stage 3: Transaction Identification (search tool output, stored in session) | Yes (pass-through) |
| natureOfDispute | interview | Dispute classification code (PE#IA for Incorrect Amount, PE#DC for Duplicate Charge) | Yes | string (PE#IA or PE#DC) | Submit tool maps typeOfDispute via deterministic lookup in build_interview_payload: "Incorrect Amount" → PE#IA, "Duplicate charge" → PE#DC | Stage 2: Issue Identification (LLM classifies from customer speech) | Yes |
| amountDisputed | interview | Dollar amount in dispute; for PE#DC the full transaction amount, for PE#IA the difference between charged and expected amounts | Yes | float (< tranAmount) | Submit tool calculates in build_interview_payload: PE#DC = full Amount (line 233); PE#IA = Amount − expectedAmount (line 237) | Stage 3: Transaction Identification (LLM collects expectedAmount for PE#IA) | Yes |
| hasAttemptedToResolve | interview | Whether the customer attempted to resolve the dispute with the merchant | Yes | string (Y, N, or U) | Submit tool maps merchantContactStatus via map_bool_to_attempt in build_interview_payload | Stage 4: Merchant Contact (LLM asks Y/N/U) | Yes |
| contactDate | merchantContactDetails | Date the customer contacted or attempted to contact the merchant | Conditionally required (Y path per Casper swagger; optional in tool schema) | string (yyyyMMdd) | Submit tool passes merchantContactDate via map_field in build_interview_payload | Stage 4: Merchant Contact (Y path: LLM collects date) | Yes |
| contactMethod | merchantContactDetails | How the customer contacted the merchant | Conditionally required (Y path per Casper swagger; optional in tool schema) | string (enum: Phone, Mail, Email, Face-to-Face, Web Support/App, Other) | Submit tool maps merchantContactMethod via map_contact_method in build_interview_payload | Stage 4: Merchant Contact (Y path: LLM collects channel) | Yes |
| nameOfContacted | merchantContactDetails | Name of the person the customer spoke with at the merchant | Conditionally required (Y path per Casper swagger; **optional in tool schema**) | string | Submit tool passes merchantContactName via map_field in build_interview_payload | Stage 4: Merchant Contact (Y path: LLM collects contact name) | Yes (blank in DDIAI-39 and DDIAI-41; DDIAI-66 moved to Testing 3/30) |
| merchantResponse | merchantContactDetails | Summary of what the merchant told the customer | Conditionally required (Y path per Casper swagger; optional in tool schema) | string | Submit tool passes merchantResponse via map_field in build_interview_payload. Free-text LLM summary. | Stage 4: Merchant Contact (Y path: LLM summarizes merchant response) | Yes |
| unableToContactReason | interview | Reason the customer was unable to reach the merchant (U path only) | Conditional (U path) | string | Submit tool routes noSuccessContactReason → unableToContactReason when hasAttemptedToResolve=U (build_interview_payload, line 250). **Overloaded:** same LLM field as explainNoAttemptToResolve. | Stage 4: Merchant Contact (U path: LLM collects reason) | Not tested; U path has no SME cases |
| explainNoAttemptToResolve | interview | Reason the customer did not attempt to contact the merchant (N path only) | Conditional (N path) | string | Submit tool routes noSuccessContactReason → explainNoAttemptToResolve when hasAttemptedToResolve=N (build_interview_payload, line 254). **Overloaded:** same LLM field as unableToContactReason. | Stage 4: Merchant Contact (N path: LLM collects reason) | Not tested; N path has no SME cases |
| noShowOrPartialPrePayment | interview | Whether the transaction was for a no-show or partial pre-payment (PE#IA only) | Conditional (PE#IA only) | string (Y or N) | Submit tool maps noShowOrPartialPrePayment via map_bool_to_attempt in build_interview_payload. Only included for non-PE#DC. | Stage 3: Transaction Identification (PE#IA only: LLM asks customer) | No |
| purchaseDescription | interview | Description of what was purchased (PE#DC only) | Conditional (PE#DC only) | string | Submit tool passes purchaseReason via map_field in build_interview_payload. Only included for PE#DC. | Stage 3: Transaction Identification (PE#DC only: LLM asks reason for purchase) | Yes (PE#DC cases) |
| origTxRefNumber | interview | Reference number of the original transaction being disputed as a duplicate (PE#DC only) | Conditional (PE#DC only) | string | Submit tool copies disputedTransactionId via map_field in build_interview_payload. Same source as refNumber. | Stage 3: Transaction Identification (search tool output) | Yes (pass-through) |
| origTxDate | interview | Date of the original transaction being disputed as a duplicate (PE#DC only) | Conditional (PE#DC only) | string (yyyyMMdd) | Submit tool copies Date from matched transaction via map_field in build_interview_payload. Same source as transactionDate. | Stage 3: Transaction Identification (search tool output) | Yes (pass-through) |

