## 4. Section 6 N/A Confirmation

- Baloo confirmed that the following Section 6 template requirements do not apply to this model:
  - No fine-tuning: Claude Haiku 4.5 is used as-is
  - No graph database: vector database only, abstracted behind the QIC platform
  - No content-based feature generation: articles are ingested as-is with no summarization, keyword extraction, or metadata generation beyond existing tags
- Agentic framework: Baloo described the model as agentic but stage-based, not autonomous, with a single stage in the current implementation. The model uses only OOTB Escalate and Complete tools with no custom Lambda tools, no planning, and no autonomous tool selection. Validation will follow up to confirm whether Section 6 Instruction 6 (Agentic AI) applies given the template's definition, which scopes to models with planning, autonomous tool selection, and reasoning traces

