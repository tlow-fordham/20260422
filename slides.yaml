## How 7306 Differs from Model 6788 (24-Hour Banking)

Model 7306 is architecturally a lift-and-shift of Model 6788's RAG and VRL framework, but with the following key differences:

1. **Knowledge base:** Different set of KB articles. 6788 uses 24-Hour Banking articles; 7306 uses GTM/MMP Product Central SharePoint documents (up to 800, with 526 confirmed at one point). Documents are not curated KB articles — some cover many topics, some have parsing errors.
2. **Foundation LLM:** 6788 used Mixtral 8x7B; 7306 upgraded to GPT-4o accessed via U.S. Bank's Azure OpenAI Gateway.
3. **Number of answers per query:** 6788 defaulted to 2 top articles; 7306 generates 4 candidate answers. This is a parameterized setting (not a structural deviation), but it changes the user experience and evaluation methodology.
4. **Retrieval field structure:** 6788 extracted Title, Purpose, Answer, and Procedure from structured JSON, with KeyBERT for keywords and LLM-generated Main Topic and Summary. 7306 sources from unstructured SharePoint HTML documents rather than structured JSON; it has no direct equivalents for Answer or Procedure, and relies on KASummary and KAFAQs instead. KAPurpose does not exist in 7306. The exact generation method (extraction vs. LLM) for each 7306 field should be confirmed with the MD during IV.
5. **Business line and user population:** 6788 serves CBB branch employees (agents at call center); 7306 serves GTM/MMP sales agents (sales people on call with clients). Different domain — customer service vs. client engagement.
6. **HTML parsing:** 7306 encountered known issues with HTML-to-text conversion from SharePoint articles using Beautiful Soup, documented as a limitation for the pilot.
7. **Model governance:** MRG assigned a separate model ID due to different business line, monitoring process, user population, and document topics.

