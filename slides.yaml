|-------|----------|------|-----------------|-----------------|
| Amazon Nova Sonic 2 | amazon.nova-2-sonic-v1:0 | Speech-to-speech model for customer speech processing and voice response | Temperature=0; other hyperparameters managed internally by the service | The model developer stated in earlier meetings that Nova Sonic uses Haiku 4.5 behind the scenes for its language processing; the PA form does not confirm or deny this. If true, the conversational flow runs on a single foundation LLM (Haiku 4.5) with Nova Sonic providing the speech layer. |
