# Model Framework and Architecture

## Overview

Model 7409 uses Amazon Connect AI Agents (or QIC, Q in Connect) to orchestrate a voice-based agentic conversation flow. The customer calls in, the AI collects dispute details through a structured multi-stage conversation, and the system submits a claim to U.S. Bank's Casper dispute management system via API. Routing to a human agent occurs when the caller requests it, when the dispute type is out of scope, or when the transaction exceeds $300.

Prior to reaching the AI agent, the caller passes through a traditional IVR disclaimer prompt (yes/no button press) for AI agent identification and consent.

The AI agent conversation then proceeds through six stages defined in the V10 system prompt (V10 system prompt, eligibility tool schema and code, and updated submit tool code delivered April 15, 2026):

1. **Issue Identification Stage:** Identifies the customer's dispute type; escalates immediately if not duplicate charge or incorrect amount; escalates credit processing disputes, merchant credit promises, and transactions debited instead of credited
2. **Transaction Identification Stage:** Searches customer's recent transactions, presents candidate match, obtains customer confirmation; if customer does not provide a year with the transaction date, the agent explicitly asks for the year (six-month lookback window makes defaulting to current year unreliable); escalates if customer does not recognize the transaction (potential fraud)
3. **Transaction Eligibility Check Stage:** Calls the eligibility tool to verify the transaction is eligible for dispute before proceeding; if ineligible (e.g., recurring transaction), escalates to a human agent with the reason. This stage was added in the April 15 revision after the Casper API team identified that the eligibility check, previously embedded inside the submit tool, ran too late in the conversation, creating a poor customer experience when transactions were found ineligible after a complete interview.
4. **Merchant Contact Stage:** Collects whether the customer contacted the merchant, contact details (date, method, name, response), or reasons for not contacting
5. **Confirmation Stage:** Reviews dispute details with the customer, provides opportunity to adjust
6. **Disclosure and Dispute Submission Stage:** Reads regulatory disclosure verbatim, obtains acknowledgment, submits claim to Casper via API, reads case reference number to customer

The QIC platform implements a stage-gated deterministic workflow: the six stages provide a sequential structure, and within each stage the LLM reasons non-deterministically over multiple turns using extended thinking (thinking tags) to decide whether the stage objective is met. Thinking tokens are used for per-turn reasoning only: the content of the `<thinking>` tag is stripped from the output before the response is delivered to the customer, and thinking tokens are not retained across turns. The model uses short-term memory for turn-by-turn conversation processing but does not retain or expose internal reasoning tokens at the application level. This is not ReAct in the formal sense; there is no explicit reason-act-observe loop, but the LLM performs planning and reasoning within each stage to determine next steps. Validation assessed this as Few-Shot prompting with stage-gated flow control and bounded agentic tool use (see System Prompt section).

The execution model follows an LLM-suggests / QIC-executes pattern. The LLM generates tool call requests (search, submit, escalate, complete) as structured outputs, but the QIC platform manages the actual execution: invoking Lambda functions, routing calls, and terminating sessions. The LLM is not an autonomous orchestrator; it operates within a platform-managed execution loop.

The remainder of this section is organized as follows:

1. **Component Stack** describes the LLMs and services that power the flow.
2. **System Prompt** documents the instructions that drive the six-stage conversation and summarizes key changes across the four prompt revisions reviewed during the Early Engagement period (March 11 baseline, March 17 interim, March 28 updated, and April 15 current).
3. **Tool Architecture** details the five tools the LLM can invoke and maps their input/output fields through the tool code to their upstream and downstream systems, referencing the conversation stages defined above.
4. **Conversation Flow** provides the full end-to-end walkthrough integrating all components, tools, and escalation paths.
5. **Casper API Integration** documents the downstream system of record.
6. **LLM Configuration** presents the model selection, benchmarks, and hyperparameter details as reference material.

## Component Stack

The production pilot architecture comprises Amazon Connect as the contact center platform, three LLMs (Claude Haiku 4.5, Nova Sonic 2, Nova Pro V1), and the Casper API for claim submission. Policy language, regulatory disclosures, and dispute handling rules are embedded directly in the system prompt rather than being retrieved dynamically from an external knowledge base (e.g., via Retrieval-Augmented Generation).

| Component | Role | Details |
|-----------|------|---------|
| Amazon Connect | Contact center platform | Manages inbound calls, telephony |
| Amazon Nova Sonic 2 | Speech processing | Speech-to-text (STT) transcription and text-to-speech (TTS) voice synthesis; uses Haiku 4.5 behind the scenes; selected to reduce speech processing latency |
| Connect AI Orchestrator (QIC) | Flow orchestration and guardrail invocation | Manages the overall conversation flow and invokes Bedrock Guardrails on both the input path (customer utterance) and the output path (LLM response). |
| Connect AI Agent (QIC) | LLM interaction and tool dispatch | Drives conversation logic, stage transitions, and tool calling. Hosts two native tools (Complete, Escalate) dispatched directly within the Amazon Connect Platform boundary, and dispatches the three custom Lambda tools (Search: fdi_txn_search_tool; Eligibility: usb_fdi_eligibility_tool; Submit: fdi_submit_case_tool) via Bedrock Agent Core. |
| Anthropic Claude Haiku 4.5 | Primary conversational LLM | Processes customer utterances, generates responses, manages conversation state; also underlies Nova Sonic 2 |
| Amazon Bedrock | LLM access | Provides access to foundation models; Bedrock Guardrails deployed for real-time content and PII filtering |
| Bedrock AgentCore Gateway | API integration | Model Context Protocol gateway for Casper API calls |
| Casper | System of record | U.S. Bank's internal dispute claims management system |
| DynamoDB | Transaction cache | Per-session cache of a single customer's recent transactions, retrieved from the Digital Transaction API (Cassandra/Hogan) with a 60-minute Time-to-Live (TTL). The Search tool Lambda queries this table using two scan patterns (date+amount, merchant+date) filtered by ContactId, ensuring the search is ringfenced to the active caller's transactions only. |
| DynamoDB | Store-and-forward | Separate table used for data persistence when the Casper API fails. Collected dispute information is written to DynamoDB so it is not lost; the customer is transferred to a human agent, and a SEV2 incident is raised automatically. |
| Amazon Nova Pro V1 | Real-time monitoring | Monitors conversation metrics and raises SEV2 alerts when thresholds are breached. Not part of the conversational flow; operates as an observability layer. |

Note: Real-Time Alarms uses Amazon Nova Pro V1 (model ID amazon.nova-pro-v1.0) for metrics monitoring and alerting.

## System Prompt

The system prompt for Model 7409 governs all conversational behavior, stage transitions, tool invocation, escalation logic, and security controls. Because the model uses a pre-trained foundation LLM (Claude Haiku 4.5) without fine-tuning, RAG, or custom training, the system prompt is the primary mechanism through which the model owner controls model behavior. The quality and completeness of the prompt therefore has a direct bearing on model risk.

Validation received and reviewed four iterations of the system prompt during the Early Engagement period: March 11 (initial), March 17 (interim), March 28 (Version 9, with Search and Submit custom tools), and April 15 (Version 10, with Search, Eligibility, and Submit custom tools; Version 10 per Connect orchestration prompt configuration). V10 is the current version deployed in UAT and is the version assessed below; April 15 marks the PA review kickoff for V10.

### Prompt Design and Engineering Assessment

Validation assessed the April 15 prompt against standard prompt engineering best practices. The prompt employs an instruction-based prompting strategy with stage-gated flow control and embedded worked examples: detailed procedural rules govern each conversation stage, with illustrative Customer/Response examples provided for guardrail scenarios (six security deflection cases covering system prompt disclosure, model identity, tool revelation, persona change, PII requests, and harmful requests) and voice-friendly output formatting. A six-stage finite state flow governs conversation progression (Issue Identification, Transaction Identification, Transaction Eligibility Check, Merchant Contact, Confirmation, Disclosure and Dispute Submission). The prompt provides a `<thinking>` tag for optional per-turn reasoning and instructs the LLM to invoke tools within a bounded action space (three custom Lambda tools for transaction search, eligibility check, and claim submission, plus two native QIC tools for escalation and session completion), giving it agentic characteristics within a constrained scope. Tool definitions are incorporated by reference via the `{{$.toolConfigurationList}}` template variable. MRM received and reviewed JSON schemas for all three custom Lambda tools and the prompt instruction text for the two native QIC tools (see Tool Architecture section). Together with the system prompt, these constitute the complete instruction set the LLM receives at the start of every conversation.

The following prompt engineering dimensions were assessed: role specification (clear persona with domain-specific context), XML-style delimiters for structured instruction sections, instruction-based prompting with embedded worked examples for guardrail deflection scenarios and voice-friendly output formatting, a `<message>` and `<thinking>` tag output format optimized for speech synthesis, explicit constraints on security boundaries and PII handling, error handling for tool failures and out-of-context questions, verbatim content controls for regulatory texts, voice/channel optimization with anti-patterns for visual formatting, locale control to prevent language-switching attacks, and security defenses against prompt injection, persona hijacking, and information leakage.

### Validation Review and Prompt Evolution

Validation reviewed the March 11 baseline and identified observations across seven areas. The model owner addressed all of them across subsequent revisions, with additional proactive improvements. The April 15 V10 version is the result. The material changes between the baseline and V10 are summarized below.

1. **Disclaimer stage removed.** The model owner removed the disclaimer from the AI agent entirely and moved it to a traditional IVR yes/no prompt upstream, as testing showed customers could bypass the disclaimer by speaking over it and that the LLM interpreted non-standard acknowledgments inconsistently. This eliminates the LLM-dependent consent interpretation risk. (Validation-driven.)
2. **Transaction eligibility check added.** A new stage and tool verify the transaction is eligible for dispute immediately after the customer confirms it, rather than at submission. Customers with ineligible transactions are now escalated before completing the full interview. (BL-driven.)
3. **Issue identification rewritten.** A structured decision tree replaces a brief responsibility list, with an explicit non-qualifying dispute list, trigger phrases for immediate escalation, and clarifications for legitimate incorrect-amount scenarios. Credit processing escalation is narrowed to true processor-level issues. (Both.)
4. **Escalation triggers expanded and restructured.** Eleven explicit triggers replace a single implicit out-of-context counter, including new triggers for account information changes and account security concerns. All triggers reference a unified escalation pattern defined once and invoked consistently. (Validation-driven.)
5. **Mandatory Escalate tool invocation.** A unified pattern requires the AI to inform the customer, invoke the Escalate tool, and stop processing, fixing earlier cases where a transfer message was spoken but the tool was never called. (Validation-driven.)
6. **PII handling protocol added.** A dedicated section sets a two-attempt escalation threshold for PII and model-disclosure requests, replacing prior behavior where the AI made up to seven attempts before escalating. (Validation-driven.)
7. **Merchant contact field accuracy.** The prompt now names the relevant Casper field, clarifies routing between the "did not contact" and "could not reach" paths, and adds escalation logic when a $0 expected amount is reported. (Validation-driven.)
8. **Merchandise/Service collection and incorrect amount coverage.** The prompt now collects whether the dispute concerns Merchandise or Service, the expected amount, and the no-show or pre-payment context for incorrect-amount disputes, closing a known submission failure mode. (Validation-driven.)
9. **Regulatory disclosure rewritten.** The verbatim disclosure was rewritten from formal legal tone to a softer empathetic tone, and a receipt upload instruction was added. (BL-driven.)
10. **Counter tracking and out-of-context handling.** The out-of-context threshold was reduced from four to three attempts, counters now reset at conversation start, and three separate counters (out-of-context, PII, data validation) replace a single shared counter. (Both.)
11. **Transaction identification refinements.** The purchase reason is asked once rather than every turn, the AI prompts for the year on undated dates given the six-month lookback window, and the merchant name is no longer repeated back. The Confirmation stage was simplified from proactive adjustment prompting to passive acceptance unless the customer raises a concern. (Both.)
12. **Empty user input handling formalized.** A three-attempt protocol (two apology-and-retry attempts followed by escalation) replaces a single apology and call termination. Empty input is now an enumerated escalation trigger. (BL-driven.)

### Validation Commentary

A central challenge in Model 7409's architecture is the impedance mismatch between the LLM's free-form text generation and the downstream Casper API's strict input requirements. The LLM generates natural language outputs such as "Incorrect Amount" or "yes, I called them on January fifth by phone," while the Casper API requires rigid enumerated values (PE#IA, Y, 20260105, Phone). This gap is bridged by three mechanisms: the system prompt instructs the LLM on what to collect and how to format it; the tool schemas constrain the structure of the tool calls the LLM can construct; and the tool code performs deterministic transformations, computations, field routing, and merges with session state and transaction data before the Casper payload is assembled. Validation's review assessed each layer. This section covers the system prompt; the tool schemas and tool code are covered in the Tool Architecture section.

All observations raised during the initial March 11 review have been addressed. The April 15 version materially strengthens the prompt across escalation completeness, dispute type classification, credit processing handling, Casper field mapping accuracy, and conversation flow structure. Both structural changes (disclaimer removal and eligibility check addition) reduce model risk. The BL-initiated changes were assessed independently. Each either reduces model risk (structural simplification via disclaimer removal and eligibility check addition, tightened PII thresholds, human handoff on empty input rather than silent call termination) or is neutral with respect to existing controls (disclosure text rewrite, Confirmation stage simplification, counter reset timing). Validation has no concerns with any of these changes for pilot use.

Validation notes that the prompt was revised four times during the Early Engagement period (March 11, March 17, March 28 V9, and April 15 V10) with no formal versioning until the April 15 version (Version 10 in the Connect configuration), which marks the PA review kickoff for the latest model version. Validation recommends that the model owner implement version control on all system prompt files. Because the system prompt is the primary mechanism controlling model behavior in the absence of fine-tuning or RAG, any system prompt change that significantly affects model outcomes requires MRM notification before deployment during pilot production use (see Change Management During Pilot).

## Tool Architecture

The LLM has access to five tools. Three are custom Lambda functions developed by the model owner; two are native capabilities built into the QIC platform.

| Tool | Type | Function | Invocation |
|------|------|----------|------------|
| Search tool | Custom Lambda (fdi_txn_search_tool.py) | Queries DynamoDB for the customer's recent transactions using fuzzy matching; returns eligible transactions to the LLM for selection | LLM outputs structured tool call; QIC invokes Lambda via Bedrock Agent Core |
| Eligibility tool | Custom Lambda (usb_fdi_eligibility_tool) | Calls the Casper eligibility API to verify a confirmed transaction is eligible for dispute before the interview continues; returns specific reason codes for ineligible transactions (e.g., recurring transaction, more than 3 disputes in 30 days) that are communicated to the caller. Pure API failures trigger a generic "technical difficulty" message and transfer to a human agent. Schema requires three fields: disputedTransactionId, sessionId, and expectedAmount. | LLM outputs structured tool call; QIC invokes Lambda via Bedrock Agent Core |
| Submit tool | Custom Lambda (fdi_submit_case_tool.py) | Transforms LLM-collected dispute details into a Casper API payload and submits the claim. | LLM outputs structured tool call; QIC invokes Lambda via Bedrock Agent Core |
| Complete | Native QIC tool | Signals the QIC platform to end the conversation session after successful claim submission or when the customer declines to proceed. Prompt instruction: "Mark the conversation as complete ONLY after confirming the customer has no additional questions or needs. Always ask if there is anything else you can help with before using this tool." | LLM outputs tool call; Connect AI Agent handles session termination directly |
| Escalate | Native QIC tool | Signals the QIC platform to transfer the call to a human agent. Prompt instruction: "Escalate the conversation to a human agent when you cannot provide adequate assistance, when other tools fail or return errors, or when the customer's request requires human intervention." | LLM outputs tool call; Connect AI Agent handles call routing directly |

The three custom tools are referred to by multiple identifiers in the model owner's documentation: FDI_SEARCH_TOOL, usb_fdi_eligibility_tool, and FDI_SUBMIT_CASE_TOOL in the QIC agent configuration; search_transactions, eligible_transactions, and submit_claim_interview in the JSON tool schemas; and fdi_txn_search_tool.py, fdi_eligibility_tool.py, and fdi_submit_case_tool.py in the Lambda source code. This report uses "Search tool," "Eligibility tool," and "Submit tool" for brevity except where a specific technical identifier is relevant.

The Escalate tool is the mechanism by which all escalation paths are implemented: the LLM decides that escalation is warranted and outputs an escalate tool call; the QIC platform performs the actual call routing. The Escalate tool instruction defines three trigger conditions: (1) the LLM cannot provide adequate assistance, (2) other tools fail or return errors, and (3) the customer's request requires human intervention. The explicit instruction to escalate on tool errors is a safety control that ensures tool failures do not leave the customer stranded. The Complete tool terminates the session after a successful submission when the customer has no further claims, or when the customer declines to proceed at the disclaimer stage. The Complete tool instruction requires the LLM to confirm the customer has no additional questions before invoking the tool. Both are built-in QIC capabilities with no custom code, dispatched directly by the Connect AI Agent within the Amazon Connect Platform boundary (unlike the custom tools, which route through Bedrock Agent Core).

MRM received JSON schemas and full source code for the three custom Lambda tools. The JSON schemas define the tool name, description, and input parameters that the LLM sees when deciding whether and how to invoke each tool. The model owner provided the prompt instruction text for the two native QIC tools (Complete and Escalate). These are prompt-level instructions embedded in the tool configuration, not JSON schemas; the native tools are platform-provided QIC capabilities and do not have configurable schemas like the custom Lambda tools.

### Custom Tool Schemas

The tool schemas are injected into the LLM's context at runtime via the `{{$.toolConfigurationList}}` template variable in the system prompt. Together, the system prompt and tool schemas define the complete instruction set the LLM receives at the start of every conversation. The schemas define the interface the LLM uses to construct tool calls, including the tool name, a natural language description of its purpose, and the input parameters with types, descriptions, and required/optional designations.

**Search tool schema (`search_transactions`):** The schema accepts five string-typed fields. The LLM must populate `merchant`, `date`, and `amount` from natural language customer speech before invoking the tool. `typeOfDispute` is the only optional field; it is not used in the DynamoDB query but is consumed post-query for the PE#DC duplicate-transaction policy check, allowing the LLM to invoke Search before classifying the dispute type. `sessionId` is supplied by the QIC platform and used to read session state. All schema fields are collected during Stage 3 (Transaction Identification) except `typeOfDispute`, which is classified during Stage 2 (Issue Identification). The full field-by-field schema mapping has been retained as supporting reference material outside this report.

**Eligibility tool schema (`eligible_transactions`):** The schema accepts three string-typed fields, all required: `disputedTransactionId` (round-tripped from the Search tool through the LLM), `sessionId` (QIC platform), and `expectedAmount` (LLM, PE#IA only). Because all three are required, the LLM cannot invoke the tool with missing inputs.

**Submit tool schema (`submit_claim_interview`):** The schema accepts 11 string-typed fields covering dispute type, expected amount, merchant contact status and details, purchase reason, no-show/pre-payment indicator, and the disputed transaction ID. The tool code handles all type conversions (string-to-float for amounts, string-to-enum for contact methods), routing logic (merchant contact path Y/N/U determines which fields are included), and dispute-type-specific computation (PE#IA computes the difference between transaction amount and expected amount; PE#DC uses the full transaction amount).

### Validation Commentary: Independent Code Review

Validation independently reviewed the three custom Lambda Python tool implementations to verify that the tools correctly consume the LLM's schema inputs, enforce business rules and security controls at the code level, handle errors appropriately, and produce consistent outputs to the Casper API.

**Casper payload assembly:** When the submit tool sends a dispute to Casper, not all fields come from the AI conversation. The submit tool assembles its payload from three sources:

1. **Session state** (set during the IVR authentication step, before the AI conversation begins): the customer's account number, name, cardholder ID, and the call reference ID. These fields never enter the LLM's context window, which is a security design feature that keeps sensitive account data outside the AI boundary.
2. **The matched transaction record** (from the DynamoDB cache): the transaction amount, date, and merchant name. The LLM helps the customer identify which transaction to dispute, but the actual values submitted to Casper come from the bank's transaction record, not from the customer's spoken words. This reduces the risk of transcription errors affecting the dispute submission.
3. **The LLM's tool call** (collected during the conversation): dispute type, merchant contact details, expected amount, and other interview responses.

The full Casper-centric field mapping is documented in Appendix A.

**Schema-Casper required/optional mismatches:** Four merchant-contact fields (`merchantContactName`, `merchantContactMethod`, `merchantContactDate`, `merchantResponse`) are optional in the tool schema but required or conditionally required by the Casper API when `merchantContactStatus=Y`. The `merchantContactName` mismatch was directly relevant to the systematic blank `nameOfContacted` pattern observed in early SME testing, which has since been resolved. Since the LLM is not required by the schema to populate these fields, it may omit them without triggering a schema validation error, even though the Casper API spec lists them as required or conditionally required. The blank `nameOfContacted` pattern may reflect a broader schema design pattern where conditionally required fields lack schema-level enforcement rather than an isolated LLM omission. SME testing exercised the Y path but only with Phone for `contactMethod`, so the coverage of this pattern across all conditional fields and enum values is limited. Validation noted this during early engagement; the model owner acknowledged the observation and agreed to expand testing coverage across all merchant contact paths and enum values. Validation has no concerns for the pilot.

**Observations from code review:**

- In the V9 code, the `IVRCallReference` field in the submit payload was set to `contactId`, a per-call identifier. Two disputes submitted on the same call shared the same `IVRCallReference`, causing the Casper API to reject the second submission as a duplicate reference number. In V10, this is resolved by the addition of a per-claim `TempClaimID` that distinguishes successive submissions within a single call.
- The fuzzy match tolerances (+/-3 days, +/-10% amount, 60% merchant name) are reasonable for matching customer-recalled details to bank records, but introduce a risk of matching the wrong transaction when multiple similar transactions exist within the date window.
- The merchant name matching is lexical (character similarity), not semantic. If a customer describes a merchant by category rather than name (e.g., "gas station" instead of "Shell"), the character similarity score will be low and the merchant match will fail. The search tool falls back to date and amount matching when the merchant match fails.

**Per-tool code detail:**

**Search tool (fdi_txn_search_tool.py):** The Lambda handler queries DynamoDB using two scan patterns: (1) date + amount, and (2) merchant + date. Both patterns filter by `ContactId`, ringfencing the search to the active caller's transactions. Results from the two patterns are combined and deduplicated first by TransactionId (removing overlapping rows across patterns) and then by the composite key of Amount, Date, and MerchantName (collapsing transactions that are identical on these dimensions so the customer is not asked to choose among indistinguishable records). Fuzzy matching tolerances are applied in three dimensions: +/-3 days on date, +/-10% on amount, and 60% string similarity on merchant name via Python's `SequenceMatcher`. The $300 threshold is enforced here (line 109, `>= 300`): transactions at or above $300 trigger an escalation message. The duplicate transaction policy (>2 duplicates of the same amount/date/merchant combination triggers transfer to human agent) is also enforced in this tool, not in the system prompt. Before returning results to the LLM, the tool strips `TokenizedCardNumber` from the transaction list, providing a code-level PII protection layer independent of the Bedrock Guardrails.

**Eligibility tool (fdi_eligibility_tool.py):** The Lambda handler reads session state from QConnect, locates the matching transaction by `disputedTransactionId`, and calls the Casper eligibility API with a payload containing `IVRCallReference`, `accountInfo` (tokenAccountNumber, cardMemberName, cardholderID), `transactionDetails` (refNumber, merchantName, transactionDate, tranAmount), and `interview` (natureOfDispute, amountDisputed). The `natureOfDispute` mapping matches the submit tool convention ("Incorrect Amount" → "PE#IA", "Duplicate charge" → "PE#DC"). For PE#IA, `amountDisputed` is computed as transaction amount minus expected amount; for PE#DC, the full transaction amount is used. Authentication uses OAuth client credentials retrieved from AWS Secrets Manager; transport is mTLS with certificate, key, and CA chain also retrieved from Secrets Manager. The tool maps four Casper error codes to escalation messages (IVR-415 recurring transaction, IC-2031 already disputed, IC-2034 needs further review, IC-3001 no matching transaction) and falls back to a generic technical-error escalation on any other non-200 response or exception. Session state `tool_execution_status` is updated to one of `recurring_transaction`, `transaction_already_disputed`, `needs_review`, `api_error`, or `failed`, providing traceability for downstream review.

**Submit tool (fdi_submit_case_tool.py):** The Lambda handler reads session state from QConnect, matches the disputed transaction by ID, merges session data with LLM-collected fields and matched transaction data, and submits the Casper API payload. The `build_interview_payload` method handles the PE#IA vs. PE#DC distinction for `amountDisputed` (full transaction amount for PE#DC; transaction amount minus expected amount for PE#IA) and gates conditional fields by dispute type and merchant contact path. The `map_contact_method` function maps prompt-defined values to Casper API enum values (e.g., postal to Mail, in-person to Face-to-Face). Each submission carries a unique CorrelationId in the request header for end-to-end traceability. For multi-claim sessions, the tool accepts an optional TempClaimID that is passed through to Casper as a per-claim identifier, distinct from the per-call IVRCallReference. Error handling returns a generic escalation message to the LLM on API failure, timeout, or missing transaction.

Validation has no major concerns with the tool code for pilot use. The payload construction matches the Casper spec, the four documented error codes are mapped to correct escalation paths, authentication and transport security are consistent across tools, and session state tracking provides traceability.

## Conversation Flow

The end-to-end flow proceeds as follows. An inbound customer call arrives at Amazon Connect, which performs account authentication and retrieves account identifiers (tokenized card number, cardholder name, Legal Participant ID (LPID)). These identifiers are set as contact attributes in the Amazon Connect flow and recorded in the Contact Trace Record (CTR) — a structured metadata record generated by Amazon Connect for every call, containing caller ID, queue, agent, timestamps, and attributes set during the flow. The CTR serves two roles in Model 7409: it provides pre-authenticated customer data to the submit tool via session state (the tool reads cardMemberName, tokenAccountNumber, and cardholderID from the CTR rather than extracting them from conversation text), and it stores consent flags (agenticAIDisclosureRead and agenticAIConfirm) that are not persisted in Casper. Because these fields are set as contact attributes before the call reaches the LLM, they do not pass through the LLM's context window or the Bedrock Guardrails path. The call is then routed to the Connect AI Agent, which invokes Claude Haiku 4.5 with the system prompt and begins the conversation.

[The end-to-end conversation flow below reflects the April 15, 2026 stage structure (Version 10). The V10 prompt text, eligibility tool code, and updated submit tool code have been received. The Stage 3 (Transaction Eligibility Check) narrative is based on the received prompt instructions and the model developer's walkthrough on 4/15.]

**IVR Disclaimer (upstream of AI agent):** Before reaching the AI agent, the caller passes through a traditional IVR disclaimer prompt that identifies the AI assistant and states its scope. The caller presses yes/no to acknowledge. If the caller declines, the call is routed to a human agent without entering the AI agent flow. This disclaimer was previously the first stage of the AI agent's conversation but was moved to a traditional IVR prompt after Validation flagged the risk of the LLM misinterpreting non-standard utterances (Items 78, 79).

**Stage 1 (Issue Identification):** The AI asks the customer to describe their issue. Claude Haiku 4.5 performs dispute type classification based on the customer's natural language description. If the dispute is one of the two in-scope types (duplicate charge or incorrect amount), the flow continues. If the customer describes any other dispute type (e.g., merchandise not received, unauthorized transaction, general dispute), the AI immediately escalates to a human agent. Credit processing disputes, merchant credit promises not honored, and transactions debited instead of credited are also immediately escalated. This is a critical inference point: the LLM must correctly classify free-form customer speech into one of 12 dispute categories (see Appendix B for the full list).

**Stage 2 (Transaction Identification):** For duplicate charge disputes only, the AI first asks the reason for the purchase. The AI then collects merchant name, approximate date, and approximate amount from the customer and invokes the Search tool. If the customer provides a transaction date without a year, the agent explicitly asks for the year (the six-month lookback window makes defaulting to the current year unreliable for border cases). The Search tool queries the transaction database with fuzzy matching tolerances (see Tool Architecture for details) and returns eligible transactions. The $300 threshold and pending transaction checks are also enforced at this stage (see Tool Architecture). The AI presents the matched transaction to the customer for confirmation. If the customer does not recognize the transaction, the LLM flags this as potential fraud and immediately invokes the Escalate tool to transfer the call to a human agent.

**Stage 3 (Transaction Eligibility Check):** After the customer confirms the transaction, the AI invokes the Eligibility tool to verify the transaction is eligible for dispute. If eligible, the conversation proceeds to the Merchant Contact stage. If ineligible (e.g., recurring transaction, or other Casper-side rejection reason), the AI informs the customer and invokes the Escalate tool to transfer to a human agent. This check was previously embedded inside the submit tool and only ran at the end of the conversation; moving it to a standalone early stage eliminates the poor customer experience of completing a full interview only to learn the transaction was ineligible.

**Stage 4 (Merchant Contact):** The AI collects whether the customer has attempted to resolve the dispute with the merchant. Three paths exist: Y (contacted, collects date, channel, contact name, merchant response), N (did not try, collects reason), U (tried but unable to reach, collects date, channel, reason). The merchant contact channel values spoken by the customer (phone, postal, email, in-person, online, other) are mapped to Casper API enum values by the submit tool code.

**Stage 5 (Confirmation):** The AI reviews all collected dispute details with the customer and provides an explicit opportunity to change or adjust. If the customer wants to modify details, the flow routes back to the relevant stage.

**Stage 6 (Disclosure and Submission):** The AI reads a regulatory disclosure verbatim (eGRC Compliance Approval Tool (CAT)-approved text embedded in the system prompt covering provisional credit timelines, resolution timelines, and additional information requirements). The customer must explicitly acknowledge. Only after acknowledgment does the AI invoke the Submit tool, which builds the complete Casper API payload by merging session state, event data, and matched transaction data. On successful submission, the Casper API returns a case reference number (pyID), which the AI reads aloud to the customer digit by digit. The AI then asks if the customer has additional disputes; if not, the LLM invokes the Complete tool to end the session. On API failure, the tool returns an escalation message and the AI invokes the Escalate tool to transfer to a human agent.

**Escalation paths** can occur at any stage: customer requests a human agent, dispute type is out of scope, transaction exceeds $300, transaction is pending, transaction is ineligible for dispute, customer does not recognize the transaction (fraud), three consecutive out-of-context questions, tool call failure, or recurring transaction detected. In all escalation cases, the LLM outputs an Escalate tool call and the QIC platform handles the actual call routing to a human agent.

### Flow Diagram

The model developer posted a "Per Turn Flow" diagram to Confluence. The diagram depicts a 13-step per-turn data flow across two platform boundaries (Amazon Connect Platform and Amazon Bedrock).

**Input path (steps 1-5):** User speech arrives at Amazon Connect Flow (step 1), routes to Lex / Nova Sonic for speech-to-text transcription (step 2), and passes to the Connect AI Orchestrator (step 3), which detours through the Bedrock Guardrails for input filtering (content policy and sensitive information policy for PII and PCI; see Guardrail Architecture below). The filtered input is forwarded to the Connect AI Agent (step 4), which invokes Anthropic Claude Haiku 4.5 within the Amazon Bedrock boundary (step 5). The LLM may respond directly to the caller or decide that a tool call is required.

**Tool execution (steps 6-9):** When the LLM decides a tool call is required, Claude Haiku 4.5 connects to Bedrock Agent Core to dispatch a custom Lambda tool (step 6). Bedrock Agent Core invokes the custom developed tools (Search Txn, Eligibility, Submit Case) and returns results (step 7). Tool results return to the LLM, which may call another tool (returning to step 6) or proceed to generate a response (step 8). Built-in OOTB tools (Escalate, Complete) are dispatched directly by the Connect AI Agent within the Amazon Connect Platform boundary, without routing through Bedrock Agent Core (step 9). The LLM's response returns from the Connect AI Agent to the Connect AI Orchestrator (step 10).

**Output path (steps 10-13):** The Connect AI Orchestrator detours through the Bedrock Guardrails for output filtering (step 11), the filtered response passes to Lex / Nova Sonic for text-to-speech synthesis (step 12), and the synthesized speech is delivered back to the user via Amazon Connect Flow (step 13).

Guardrails are invoked on both the input and output paths (steps 3 and 11) but not on the tool call path (steps 6 through 8); see Guardrail Architecture for the per-policy configuration and implications. Custom tools route through Bedrock Agent Core within the Amazon Bedrock boundary, while built-in tools are dispatched directly by the Connect AI Agent within the Amazon Connect Platform boundary.

