All scenarios were reviewed by Validation with scenario descriptions, results, bug references, and log file availability tracked per scenario.

## Context Window Utilization

The model operates within the context window limits of the active LLMs. On each turn, the LLM receives the full accumulated context: the system prompt (loaded once, persists across all turns), tool schemas (loaded once), all prior conversation turns (growing with each exchange), and all prior tool call results (growing with each tool invocation). Thinking tokens are not retained across turns; the model uses short-term memory for turn-by-turn conversation processing but does not retain or expose internal reasoning tokens at the application level. Context growth is therefore driven by conversation history and tool results only, not by accumulated reasoning traces.

The model owner has not provided a token-level sizing analysis of the Prod prompt, tool definitions, or per-conversation context growth. Validation developed the following estimates independently by tokenizing representative samples of prose and JSON content using Claude Haiku's tokenizer. Unlike typical English text, where token counts are commonly approximated at 1.33 times word count, Validation observed that the Prod system prompt contains dense XML tag structure (`<message>`, `<toolConfiguration>`, nested `<example>` blocks) and the tool schemas contain JSON structural scaffolding (nested braces, quoted property keys, type declarations) that increase token density relative to plain prose. Based on these measurements, token counts were approximated as characters divided by 4.25 for prose and XML content, and characters divided by 3.7 for JSON schemas and JSON tool results.

**Static inputs (loaded on every turn):**

| Component | Chars | Tokens (est.) |
|---|---:|---:|
| Prod system prompt (excluding `Complete`/`Disclaimer`/`Escalate` blocks; includes `<tool_instructions>` wrapper and name-only references to the 3 custom tools) | ~25,831 | ~6,060 |
| `Complete` inline block in system prompt | 282 | ~65 |
| `Escalate` inline block in system prompt | 857 | ~200 |
| `usb_fdi_eligibility_tool` JSON schema | 722 | ~195 |
| `usb_fdi_txn_search` JSON schema | 1,008 | ~270 |
| `usb_fdi_submit_case_tool` JSON schema | 2,355 | ~640 |
| **Static per-turn input** | **~31,055** | **~7,430** |

**Accumulated inputs (grow over the conversation):** Occurrences below are based on a typical conversation ending in a successful Casper submission.

| Component | Tokens per occurrence (est.) | Occurrences per conversation (est.) | Subtotal (est.) |
|---|---:|---:|---:|
| Customer utterance (single turn, voice-transcribed) | ~20 to 60 | 10 to 15 | ~200 to 900 |
| Agent response (single `<message>` block, bounded by max_tokens = 2,048) | ~40 to 120 | 10 to 15 | ~400 to 1,800 |
| `usb_fdi_txn_search` tool call + result | ~200 to 250 | 2 to 4 | ~400 to 1,000 |
| `usb_fdi_eligibility_tool` tool call + result | ~200 to 250 | 1 | ~200 to 250 |
| `usb_fdi_submit_case_tool` tool call + result | ~200 to 250 | 1 | ~200 to 250 |
| **Accumulated inputs per conversation** | | | **~1,400 to 4,200** |

Context utilization peaks on the final turn of the conversation, when the full accumulated context is re-sent alongside the static inputs. For a typical successful-submission conversation, peak context utilization is approximately 8,800 to 11,600 tokens, which represents approximately 4.4% to 5.8% of Claude Haiku 4.5's published 200,000-token context window.


