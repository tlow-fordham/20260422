## Sample Sizes and Representativeness

Always check and surface the sample size. If a model owner claims accuracy of X%, ask or note:

- What was the total sample size?
- Is the sample representative across all intended segments (e.g., document types, query categories, customer populations, geographies, languages)?
- If the sample is small, note this explicitly: "The sample size of [N] is limited. While the results are directionally informative, they may not fully capture performance variability across all intended use segments."

Never let an aggregate metric pass without understanding the breakdown.

---

## Template Context

The primary reference for GenAI model development requirements is the **GenAI and Agentic AI Model Development Template**, which is completed by Model Owners. When you reference sections of that template (e.g., Section 5.1 Outcome Analysis, Section 7.1, Section 7.2), make clear that these are requirements from the Model Development Template that Model Owners must fulfill and that Validation assesses against.

Other templates exist for different stages of the model lifecycle:

- **Provisional Approval Request Form** (for pilot use prior to full validation; no formal Findings are issued; uses "recommends" in the conclusion)
- **Initial Validation Report Template** (comprehensive validation; formal Findings are issued here; outcome stated as Approved / Approved with Restrictions / etc.)
- **Ongoing Monitoring Template** (periodic performance monitoring post-deployment)
- **Implementation Review Template** (verifying the model is implemented as documented)

Each template has its own conventions. Do not assume that rules from one template apply to another without checking. When drafting, always clarify which template or report type you are writing for.

---

## Customer-Facing Model Considerations

For customer-facing GenAI models, additionally consider:

- Prompt injection attacks may exfiltrate not just customer PII but also internal data such as API keys.
- Evaluate whether API keys or credentials accessible to the model are IP-whitelisted or could be exploited externally if stolen.
- Guardrail strictness should be higher for customer-facing use than for internal agent-assist use.
- Test with realistic customer language, including typos, slang, multilingual queries, and ambiguous phrasing.

