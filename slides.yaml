0,2/4/2026,Architecture,"Final model framework diagram showing end-to-end path with explicit LLM-to-stage mapping (which LLM, prompt, outputs, and retrieval methods at each conversation stage). Official diagram should map each LLM component (Haiku 4.5, Nova Sonic 2, Nova Pro V1) to its role at each stage, including all decision points, tool calls, escalation paths, and error handling.",Baloo,Resolved,"Baloo posted official 'Per Turn Flow' diagram to Confluence on 4/1/2026, following the weekly meeting where Baloo clarified the architecture. The diagram shows the following per-turn data flow: User -> (1) Amazon Connect Flow -> (2) Lex - Nova Sonic (STT/TTS) -> (3) Connect AI Orchestrator -> (4) Connect AI Agent. Connect AI Agent -> (9) Anthropic Claude Haiku 4.5 (Reasoning) within the Amazon Bedrock boundary. Claude Haiku 4.5 connects to Bedrock Agent Core, which dispatches custom Lambda tools: Search Txn (6) and Submit Case (8), with tool results returning (7). Connect AI Agent directly dispatches built-in OOTB tools: Escalate and Complete. Guardrails (Block PII/PCI) are invoked at step (11) by the Connect AI Orchestrator. Response returns via (12) to Lex - Nova Sonic for TTS, then (13) back to User. Key architectural details: (1) The Connect AI Orchestrator and Connect AI Agent are separate components -- the orchestrator manages the overall flow (including guardrail invocation and speech return); the Agent handles LLM interaction and tool dispatch. (2) Built-in tools (Escalate, Complete) are dispatched by Connect AI Agent within the Amazon Connect Platform boundary. Custom tools (Search Txn, Submit Case) are dispatched by Bedrock Agent Core within the Amazon Bedrock boundary. (3) Guardrails sit on the orchestrator path (step 11), not inline between the LLM and tools. This diagram is consistent with the meeting discussion and formalizes the per-turn flow discussed at the meeting. MRM does not yet have the instruction text or schemas for the two native QIC tools (Complete and Escalate)."
1,2/17/2026,Architecture,Clarify Bedrock Guardrails status -- actively filtering in conversation flow or just deployed in IT? Documentation needed.,Baloo,Resolved,"The Bedrock Guardrails are deployed via Terraform Infrastructure-as-Code in UAT. Validation reviewed the full configuration.

Content policy (six filters, each with separate LLM input and output strengths): Sexual, Violence, and Misconduct are set to HIGH on both the input and output sides. Hate and Insults are MEDIUM on the input side and HIGH on the output side, which is reasonable for a dispute call center where frustrated customers may use strong language but the AI should not. Prompt Attack is HIGH on input and NONE on output.

Sensitive information (PII) policy: names, emails, phone numbers, usernames, and Driver IDs are set to anonymize (the value is replaced with a placeholder and the call continues). Passwords, credit/debit card numbers, CVV, PIN, SSN, US bank account and routing numbers, US ITIN, US passport number, international bank account numbers, SWIFT codes, AWS access and secret keys, and a range of international health and tax identifiers are set to block. Eight custom regex patterns (account numbers, SSN, and several international identifiers) are also set to block.

Word policy: the AWS managed Profanity list is enabled along with one additional custom blocked word.

Validation observations:
1. Prompt Attack is NONE on the output side. No concern — prompt injection guardrails are intended to protect against outside bad actors, and the LLM's outputs follow the system prompt templates.
2. Hate/Insults at MEDIUM on the input side avoids over-refusals when customers are frustrated. No concern.
3. The Name anonymize action does not affect any name field written to Casper. See Item 58 for the full path analysis covering cardMemberName, merchantName, and nameOfContacted.
4. The configuration is tagged UAT; the same configuration will be deployed to production."
