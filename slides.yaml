### UDF Manager — Detailed Walkthrough

**Creating a UDF:** Click "Create UDF" → enter name → add tags (predefined tags map to platform modules, e.g., "Preliminary Steps," "Treating Outlier") → optionally check "Show as user-defined function in the operation bar" (makes the UDF appear as a selectable operation within the tagged module's no-code workflow) → define arguments → Submit.

**Arguments (function inputs):**

Arguments define what inputs the UDF will accept from the Nimbus platform. Each argument has a name, type, value, and description.

Argument types available: Dataset (any dataset in the active project), Model (internal or external model objects), Console File (supports CSV, JSON, TXT, pickle, YAML, zip, and many other formats — for unsupported formats, convert to zip and unzip in code), Choice (user-defined dropdown options, e.g., "low risk / medium risk / high risk" — enter each option and press Enter to add).

Multiple arguments can be defined (no limit). Arguments are effectively function parameters — they determine what the UDF receives as input each time it runs.

**Q (team member):** Can we pass Python dictionaries or complex objects as arguments? **A:** Not directly as an argument type, but complex objects can be serialized to JSON or pickle and uploaded as console files. The UDF editor functions as a Python notebook, so any Python object created in code works normally. Vivek confirmed that extensions can be added if needed.

**UDF code editor:** Opens a notebook-like interface with multiple cells. Code can span multiple cells — outputs from all cells are collected. The `hardrive` package is used to fetch argument data into variables (e.g., `df = hardrive.fetch_argument("dataset_arg")`). Code in the main file executes as a standard Python notebook. Requirements.txt file specifies package dependencies.

**Running a UDF:** Right-click the UDF name → Run → input form appears with fields for each defined argument → select CPU allocation (high/medium/low — maps to Kubernetes cluster worker configuration) → select kernel (Python) → Submit. Job appears in the job queue. Results include tables, charts, data outputs, text, and downloadable console files.

**UDF visibility in modules:** If the "show in operation bar" checkbox is enabled and a module tag is selected, the UDF appears as a selectable operation within that module (e.g., appears under EDA → Preliminary Steps). This allows UDFs to be integrated into the no-code workflow and reused as pipeline nodes.

**UDF details page tabs:** Basic Details (name, tags, working directory), Version History (commit tracking, file-level change diffs), Jobs (execution history, job comparison), Arguments, Code (editor with main file, requirements.txt, etc.).

**Debug mode:** Exists in the UI but is not functional in the current US Bank deployment. The internal editor (Nimbus's built-in Jupyter) is not available because Jupyter Hub was not deployed for US Bank. The Core Editor (separate from Jupyter) is available and being enabled — Praveen confirmed it would be ready by the next session. Debug mode will work once Azure ML Studio is fully integrated.

**Q (Ali):** Why must we predefine argument types when Python is dynamically typed? **A:** Design choice to provide users a structured input form. For flexibility, the "Choice" argument type allows arbitrary user-defined options.

