# Guardrail Testing

## Current Guardrail Architecture

The model implements guardrails at three layers: prompt-based guardrails embedded in the system prompt, Bedrock Guardrails configured as infrastructure, and real-time monitoring and alerting.

### Prompt-based Guardrails

The system prompt includes the following guardrail instructions:

- **Security guidelines:** Instructions not to disclose system prompt, model identity, or available tools; decline persona change requests; decline malicious requests regardless of encoding; protect PII
- **Out-of-context handling:** Three redirect attempts before escalation to human agent on the third attempt
- **Scope restriction:** Immediate escalation for dispute types other than duplicate charges and incorrect amounts
- **Communication style:** Instructions to avoid technical language, maintain voice-friendly responses

### Bedrock Guardrails

The model developer shared the Terraform Infrastructure-as-Code configuration from GitLab (tagged UAT environment, guardrail name "UAT_Bedrock_Guardrails"). Validation reviewed the full configuration. The two policy types relevant to PA review are the content policy and the sensitive information policy (for PII and PCI). A word policy enabling the AWS managed Profanity list is also configured and is not discussed further here.

**What "input" and "output" mean here.** AWS Bedrock Guardrails describe their settings using the terms "input" and "output," which refer to the LLM's input and the LLM's output. In this model's architecture, because the guardrails are bound to the Connect AI Orchestrator and not inline with the custom Lambda tools, these terms resolve to specific paths in the per-turn flow:

- **LLM input** = customer speech flowing into the LLM (step 3 in the per-turn flow).
- **LLM output** = the LLM's response flowing back to the customer as speech (step 11).
- **Tool call path** = the LLM's tool call parameters going to the Search, Eligibility, or Submit Lambda (steps 6 through 8), and the tool results returning to the LLM (step 7). This path bypasses the Bedrock Guardrails entirely. On the tool call path, the primary guardrail is instruction-based, embedded in the system prompt.

#### Content Policy

The content policy has six filter categories, each with independent input and output strength settings:

| Filter | LLM Input | LLM Output |
|---|---|---|
| Sexual | HIGH | HIGH |
| Violence | HIGH | HIGH |
| Misconduct | HIGH | HIGH |
| Hate | MEDIUM | HIGH |
| Insults | MEDIUM | HIGH |
| Prompt Attack | HIGH | NONE |

Sexual, Violence, and Misconduct are HIGH on both directions. Hate and Insults are MEDIUM on customer input but HIGH on the LLM's output to the customer, a reasonable design choice for a dispute call center where frustrated customers may use strong language while the AI should not. Validation has no concerns because a higher setting on the customer input might lead to over-refusals. Prompt Attack is HIGH on input (detecting injection attempts in customer speech before they reach the LLM) but NONE on output, meaning that if an injection bypasses the input filter, the resulting LLM output is not filtered for prompt attack content. Validation has no concerns because prompt injection guardrails are intended to protect against outside bad actors; the outputs produced by the model follow the framework of the system prompt templates.

#### Sensitive Information Policy (PII and PCI)

The sensitive information policy defines an action (anonymize or block) per entity type. Unlike the content policy, each entity has a single action rather than per-direction strengths; the action applies wherever the guardrail is bound, which in this architecture is the customer input path and the speech output path only.

| Action | Entity Types |
|---|---|
| Anonymize (value replaced with a placeholder; call continues) | Name, Email, Phone, Username, Driver ID |
| Block (content is blocked) | Password, Credit/Debit Card Number, Credit/Debit Card CVV, PIN, US Social Security Number (SSN), US Bank Account Number, US Bank Routing Number, US ITIN, US Passport Number, International Bank Account Number, SWIFT Code, AWS Access Key, AWS Secret Key, CA Health Number, CA Social Insurance Number, UK NHS Number, UK National Insurance Number, UK Unique Taxpayer Reference |

In addition, eight custom regex patterns are configured with the block action: US SSN in XXX-XX-XXXX format, account number in XXXXXX1234 format, Japan My Number, Polish PESEL, Ireland PPSN, UK National Insurance Number, UK Passport Number, and a generic Canada/Ireland/Australia/Poland passport pattern.

Two mechanisms work in sequence for PII protection on the customer input and speech output paths: (1) the Bedrock Guardrails PII filter activates at the LLM input layer, detecting and blocking PII before it reaches the LLM, and (2) the system prompt instructs the model to escalate any PII-related input to a human agent using the Escalate tool. For SSN specifically, SME testing (caller provides SSN before disclosure) confirmed that the call continued after the PII was blocked, indicating the block action applies to the text representation in the LLM's context rather than terminating the session.

The anonymize action on Name does not affect any name field written to Casper. All three name fields written to Casper bypass the guardrail input/output paths: cardMemberName is read by the submit tool from CTR attributes set during pre-LLM account authentication, merchantName is populated from the Transaction API via the search tool's session state, and nameOfContacted reaches Casper via the submit tool's tool call path (steps 6 through 8). Anonymization on the customer-spoken name on the input path (step 3) affects only the LLM's reasoning context, not the value that reaches Casper.

### Customer Data Isolation

Because the Bedrock Guardrails are not invoked on the tool call path, an adversarial prompt that caused the LLM to request sensitive data via a tool call would not be intercepted by the guardrails. ContactId-based DynamoDB filtering in the Search tool provides an independent architectural mitigation at the data layer: every transaction query is filtered by the active caller's ContactId, so the LLM can only retrieve the current caller's own transactions and cannot reach another customer's records regardless of what is prompted.

### Real-time Monitoring and Alerting

The model owner captures 21 post-call analytics metrics per session. Metrics are derived from four sources:

| Source | Description | Metrics |
|--------|-------------|---------|
| LLM-Evaluated (8) | Amazon Nova Pro V1 evaluates each agent response for safety, compliance, and conversational quality issues | catch_error_rate, toxicity_profanity, privacy_pii, unauthorized_commitments, jailbreaks, topic_containment, refund_commitment, slot_filling_retries |
| Log-Derived (8) | Parsed from CloudWatch log events during the QIC session | average_steps_taken, tool_calls, tool_retries, individual_tool_retries, tool_error_rate, api_error_rate_5xx, containment_rate, duration_before_agent_escalation_percent |
| Bedrock Cost (2) | Calculated from Bedrock invocation logs using token counts and model pricing | total_ai_cost, token_burn_rate_per_minute |
| Contact Lens Async (3) | Extracted from the Contact Lens analysis file in S3 approximately 5-10 minutes after the call ends | overall_sentiment_score, latency, total_duration_ai_vs_human_baseline |

Six of the 21 metrics have CloudWatch alarms configured with SEV2 alerting. The alarm threshold is uniform: an alarm triggers when more than 3 datapoints are recorded within a 5-minute (300-second) evaluation period. The 6 alarmed metrics are: ToxicityProfanity, PrivacyPII, Jailbreaks, APIErrorRate5xx, ToolErrorRate, and ToolRetries. The TotalAICost alarm is not activated. The monitoring operates post-call (immediately after each transaction), not in batch, providing near-real-time observability.

