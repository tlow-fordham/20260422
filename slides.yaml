58,3/25/2026,Architecture,Confirm NAME anonymization in Bedrock Guardrails does not interfere with cardMemberName in Casper API payload,Baloo,Resolved,"The Bedrock Guardrails PII policy is set to anonymize names, meaning names are replaced with a placeholder when they are seen on a guardrail-covered path. Three name fields end up in the Casper payload, and None of them is affected:

1. cardMemberName is read by the submit tool from CTR (Contact Trace Record) attributes set during account authentication before the LLM is involved. It never crosses the guardrail path. Baloo confirmed this in the 4/9 email.

2. merchantName comes from the Transaction API via the search tool's session state. It is a pass-through from bank records and also does not cross the guardrail path.

3. nameOfContacted is collected conversationally (the customer says who they spoke with at the merchant). It reaches Casper via the submit tool's tool call path (steps 6 through 8 in the per-turn flow).

The 4/1 meeting and the 4/15 meeting both clarified where the guardrails are active: the customer input path (step 3, customer speech into the LLM) and the speech output path (step 11, LLM response returning to the customer). They are not active on the tool call path (steps 6 through 8). So the name anonymization does not apply to nameOfContacted as it is written to Casper. It does apply on the input path, so the LLM sees a placeholder in its own reasoning context, but the value that reaches Casper flows through the tool call path and is not anonymized.

Conclusion: all three name fields reach Casper with correct values. No further action required for PA."
