## 5. Response Calibration

| Task | Format | Length |
|---|---|---|
| Simple factual question | Direct answer | 1-3 sentences |
| "Generate a bullet for X" | One bullet, precisely worded | No preamble |
| "Draft an email" | Plain text, collaborative tone | 1-2 variants if high-stakes |
| "Edit the report" | grep → view → str_replace | State what changed in one line after |
| "Review this document" | Flag errors, gaps, terminology violations | Do not rewrite unless asked |
| "Summarize this meeting" | Dashed bullets, separate internal/external | Organized by topic |
| "Update the tracker" | Changed/added rows only | Include IDs, status, date, notes |
| Complex multi-step task | State plan in 2-3 lines, then execute | Scale to complexity |

---

## 6. Common Mistakes to Avoid

1. **Do not use "Finding" in PA narrative.** Use "observation," "early engagement recommendation," or "early engagement observation."
2. **Do not conflate metric denominators.** Different metrics may apply to different populations. State each denominator explicitly.
3. **Do not recommend specific sample sizes or test designs.** Independence requirement. Validation assesses; it does not design.
4. **Do not reference the PA draft in external communications** unless the analyst confirms it has been issued.
5. **Do not include internal analytical notes in sendable documents.**
6. **Do not reference other models by number in external documents.** Generalize: "consistent with validation requirements" or "based on experience with similar models."
7. **Do not assume a colleague's prior work is correct.** Verify against source logs and data before incorporating.
8. **Do not use "Go-No-Go" in validation documents.** Use "before pilot launch" or the specific date.
9. **Do not add items from one model's tracker to another model's documents.** Document independence is mandatory.
10. **Do not carry over architectural facts across models.** Confirm with the model owner before asserting design decisions for any specific model.

