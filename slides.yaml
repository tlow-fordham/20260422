99,4/11/2026,Architecture,"Clarify Bedrock Guardrails BLOCK behavior for SSN: if a caller speaks a SSN, does BLOCK reject the entire turn (disrupting conversation flow) or redact the value and continue?",Baloo,Resolved,"The Bedrock Guardrails PII config uses two different actions depending on the data type. Block is used for SSN, credit/debit card numbers, CVV, PIN, and bank account and routing numbers. Anonymize is used for names, emails, and phone numbers. The caller experience differs between the two: block may halt the conversation turn entirely, while anonymize replaces the value with a placeholder and lets the call continue. The original question was what the caller actually experiences when sensitive data is spoken aloud during a dispute call.

UPDATE 4/15 (meeting). Two-layer defense confirmed:
1. The Bedrock Guardrails PII filter activates at the LLM input layer, detecting and blocking or redacting PII before it reaches the LLM.
2. The system prompt instructs the model to escalate any PII-related input to a human agent using the Escalate tool.

The two mechanisms work in sequence: infrastructure-level block or redact first, then prompt-level escalation if PII reaches the model. For SSN specifically, the Bedrock Guardrails config uses the block action (Item 1), which prevents the data from reaching the LLM entirely. Resolved."
