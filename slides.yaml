## 2. DeepEval Evaluator Configuration (10 min) — Sudhakar / Varun

MRM reviewed the evaluation YAML from the GitLab main branch. The PII false positive fix, the removal of dispute-flow metrics from guardrail evaluations, and the disabling of Empathy for guardrail tests are all confirmed and appreciated. Three items from the 5/8 email appear unresolved, and they matter because of the guardrail architecture: since the model relies entirely on instruction-based guardrails in the system prompt as the sole runtime protection on the conversation path (no Bedrock Guardrails on the conversation path in any version), the DeepEval adversarial and guardrail tests are the primary automated evidence that the instruction-based approach is working. For that evidence to be meaningful, the evaluator needs to know what role the agent is playing and what the expected behavior is in each test scenario.

1. Context fields for the LLM judge. The YAML does not define a chatbot_role parameter for any of the enabled metrics, and the guardrails metrics pass only conversation content to the judge. When the judge evaluates Guardrail Role Adherence, how does it know the agent is supposed to be a dispute filing agent and not a generic customer service bot? Similarly, when the judge evaluates Decline Malicious Requests, does it receive the scenario and expected_outcome fields from the test case JSON so it knows the user is adversarial and the expected behavior is refusal? If these fields are not reaching the judge, the scores may not reflect whether the agent actually handled the adversarial scenario correctly.
2. Disabled safety metrics. Toxicity, bias, misuse, and role violation are all disabled in the current configuration. These are the categories where Bedrock Guardrails would normally provide automated coverage on the conversation path, and since those guardrails are not active, the system prompt is the only defense. Can you confirm whether disabling these metrics is a framework limitation (the metrics fail to run) or a deliberate scope decision? If it is a framework issue, what is the plan to get them running?
3. Agent persona references. The disabled role_adherence metric describes the agent as "a professional and empathetic agent helping to negotiate payments on overdue balances," and the disabled role_violation metric references "insurance claims." These are from a different use case. Can these be corrected to reference the FDI dispute filing agent so they are ready to enable when the framework issues are resolved?

