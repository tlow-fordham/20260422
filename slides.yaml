## Context Window Utilization

The model operates within the context window limits of the active LLMs. On each turn, the LLM receives the full accumulated context: the system prompt (loaded once, persists across all turns), tool schemas (loaded once), all prior conversation turns (growing with each exchange), and all prior tool call results (growing with each tool invocation). Thinking tokens are not retained across turns; the model uses short-term memory for turn-by-turn conversation processing but does not retain or expose internal reasoning tokens at the application level. Context growth is therefore driven by conversation history and tool results only, not by accumulated reasoning traces.

The model owner has not provided a token-level sizing analysis of the V10 prompt, tool definitions, or per-conversation context growth. Validation developed the following estimates independently by tokenizing representative samples of prose and JSON content using Claude Haiku's tokenizer. Unlike typical English text, where token counts are commonly approximated at 1.33 times word count, Validation observed that the V10 system prompt contains dense XML tag structure (`<message>`, `<toolConfiguration>`, nested `<example>` blocks) and the tool schemas contain JSON structural scaffolding (nested braces, quoted property keys, type declarations) that increase token density relative to plain prose. Based on these measurements, token counts were approximated as characters divided by 4.25 for prose and XML content, and characters divided by 3.7 for JSON schemas and JSON tool results.

**Static inputs (loaded on every turn):**

| Component | Chars | Tokens (est.) |
|---|---:|---:|
| V10 system prompt (excluding `Complete`/`Escalate` blocks; includes `<tool_instructions>` wrapper and name-only references to the 3 custom tools) | ~25,831 | ~6,060 |
| `Complete` inline block in system prompt | 282 | ~65 |
| `Escalate` inline block in system prompt | 857 | ~200 |
| `usb_fdi_eligibility_tool` JSON schema | 722 | ~195 |
| `usb_fdi_txn_search` JSON schema | 1,008 | ~270 |
| `usb_fdi_submit_case_tool` JSON schema | 2,355 | ~640 |
| **Static per-turn input** | **~31,055** | **~7,430** |

**Accumulated inputs (grow over the conversation):** Occurrences below are based on a typical conversation ending in a successful Casper submission.

| Component | Tokens per occurrence (est.) | Occurrences per conversation (est.) | Subtotal (est.) |
|---|---:|---:|---:|
| Customer utterance (single turn, voice-transcribed) | ~20 to 60 | 10 to 15 | ~200 to 900 |
| Agent response (single `<message>` block, bounded by max_tokens = 2,048) | ~40 to 120 | 10 to 15 | ~400 to 1,800 |
| `usb_fdi_txn_search` tool call + result | ~200 to 250 | 2 to 4 | ~400 to 1,000 |
| `usb_fdi_eligibility_tool` tool call + result | ~200 to 250 | 1 | ~200 to 250 |
| `usb_fdi_submit_case_tool` tool call + result | ~200 to 250 | 1 | ~200 to 250 |
| **Accumulated inputs per conversation** | | | **~1,400 to 4,200** |

Context utilization peaks on the final turn of the conversation, when the full accumulated context is re-sent alongside the static inputs. For a typical successful-submission conversation, peak context utilization is approximately 8,800 to 11,600 tokens, which represents approximately 4.4% to 5.8% of Claude Haiku 4.5's published 200,000-token context window.

**Validation Commentary:**

Several escalation triggers in the V10 system prompt bound the number of customer utterances before the session is handed to a human agent even in edge cases: the PII counter escalates at 2 attempts, the out-of-context counter at 3 attempts, and consecutive empty user input escalates after 2 occurrences. The Merchandise/Service clarification escalates after one unsuccessful retry. These caps mean that adversarial or off-topic loops cannot grow the conversation indefinitely. However, the model owner confirmed that there is no platform-enforced overall conversation turn limit. The QIC platform does not impose a maximum number of turns per session, and the system prompt does not contain an overall turn cap. The per-stage escalation triggers documented above bound specific interaction patterns but do not limit total conversation length.

Search tool result size varies with the number of transactions returned. The 2 to 4 occurrences assumed reflect the typical number of fuzzy-matched transactions returned when the customer provides an approximate merchant name or date. The model owner confirmed that there is no configured upper bound on the number of transactions returned by `usb_fdi_txn_search` per invocation. In practice, result sets have been small due to the composite key search (merchant name, date range, amount).

The eligibility and submit tool calls and results are structurally fixed in shape (single decision object and single case-reference object, respectively) and do not vary materially in token size across invocations.

When any escalation trigger fires, the agent invokes the `Escalate` tool and the conversation terminates before reaching the downstream stages. In those cases, the eligibility and submit tool calls and results are not incurred, and accumulated input totals are proportionally lower than the estimates above.

The production max_tokens is set to 2,048 per invocation, capping per-turn output length well within the model's 64,000-token maximum output capacity. With thinking tokens not retained, per-turn output capped at 2,048 tokens, and multiple in-prompt escalation caps bounding off-topic and retry loops, the context growth rate is bounded and predictable for typical dispute conversations. However, the absence of a platform-enforced conversation turn limit and a configured upper bound on search tool results are noted as model limitations: in theory, a conversation could continue indefinitely, and a search could return an unbounded number of transactions. Validation assessed minimal practical risk from these limitations for the pilot: search results are bounded by the number of transactions on an actual customer account (the search queries against the customer's own transaction history using a composite key), and these are live voice calls that are unlikely to sustain conversations long enough (hours) to materially stress the 200,000-token context window. Given peak utilization of approximately 4.4% to 5.8% of the context window for a typical successful-submission conversation, Validation has no concerns regarding context window utilization for the requested pilot use. Validation recommends that a configured turn limit and search result cap be implemented before full production, or that these be formally documented as accepted model limitations (see Conclusion).


