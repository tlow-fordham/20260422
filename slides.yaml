### Phase 2: DeepEval Automated Regression on the Prod Version

The Phase 1 SME testing on the UAT version (March 28) established the human-validated performance baseline: 42 customer dispute scenarios, 9 guardrail and adversarial scenarios, and 1 stability test, all executed via live IVR calls exercising the full production stack including the Nova Sonic speech layer. Following Phase 1, the Business Line conducted a two-day pre-release workshop with approximately 50 attendees across operations, compliance, platforms, technology, and risk. The workshop included live testing across six breakout rooms in which SMEs actively tested the UAT version and provided structured feedback on voice latency, merchant recognition, disclosure wording, and edge-case handling. Based on this feedback, the Business Line incorporated bounded enhancements into the Prod version (May 11): the transaction eligibility check was separated into a dedicated tool invoked earlier in the conversation, the system prompt was refined to address breakout-room observations, and formatting and escalation logic were tightened. These changes were business-driven refinements to the call experience, not responses to technical defects, and did not alter the core dispute intake workflow that the 42 SME scenarios exercised.

Because the model entering pilot (Prod) is not the version that underwent formal SME testing (UAT), the model owner used the DeepEval automated testing framework to confirm that the Prod version has not regressed against the SME-validated baseline. During Early Engagement, Validation recommended human-voice SME testing as the gold standard for PA-level performance claims. The Business Line accepted this recommendation and executed the full 52-scenario SME test suite via live IVR calls on the UAT version. Validation accepted DeepEval as complementary testing that confirms no degradation between the UAT and Prod versions, for three reasons. First, the changes between the UAT and Prod versions are bounded and business-driven (see above), not responses to technical defects. Second, the Nova Sonic speech-to-text component is unchanged between the two versions, so the shift from human voice to text-input regression does not introduce an untested gap in the speech layer. Third, while DeepEval is a text-to-text framework and does not exercise transcription errors, disfluencies, barge-in, or realistic caller pacing, these were covered by Phase 1 SME testing and by the informal live testing across six breakout rooms during the offsite, where feedback on voice latency, caller pacing, hold-the-line prompts, and disclosure delivery directly informed the UAT-to-Prod changes.

### DeepEval Test Suite

The DeepEval test suite on the Prod version comprises 40 test cases across three categories, all executed through the DeepEval framework with results tracked in DDIAI-279:

**Functional regression (27 cases).** 10 dispute path cases and 17 transfer path cases, designed by the SME to cover the Phase 1 scenario space in a streamlined suite optimized for automated execution. The SME designed the test scenarios; the model owner's testing team built the DeepEval test case JSONs from those designs; the DeepEval framework executed them automatically against the Prod version. The dispute path cases exercise the full intake workflow (issue identification, transaction search, eligibility check, merchant contact, confirmation, disclosure and submission). The transfer path cases exercise the escalation and routing logic for out-of-scope dispute types, boundary conditions (e.g., transaction amounts exceeding $300, unknown transaction amounts), and customer-initiated agent requests.

**Guardrail and adversarial (13 cases).** These were developed as part of the AWS-recommended phased guardrail strategy, which calls for red-teaming to validate the instruction-based guardrail approach and identify gaps requiring targeted infrastructure-level guardrails. The model owner built and executed the guardrail test cases on the Prod version through the DeepEval framework. The 13 cases cover: jailbreak (guardrail_jailbreak, guardrail_roleplay_jailbreak), prompt injection (guardrail_prompt_injection, guardrail_prompt_injection_adv, guardrail_instruction_override), persona hijacking (guardrail_persona_hijacking, guardrail_dan_persona), tool disclosure (guardrail_tool_disclosure, guardrail_tool_disclosure_adv), malicious requests (guardrail_malicious_requests, guardrail_incorrect_amount_malicious), model disclosure (guardrail_model_disclosure), and repetition begging (guardrail_repetition_begging). One case (guardrail_incorrect_amount_malicious) embeds adversarial behavior within a legitimate dispute conversation.

The model owner reported all 40 cases as passing across all applicable metrics. Validation reviewed the aggregate DeepEval results across the 19 configured metrics. For the 27 functional regression cases (dispute path scored on all 19, transfer path scored on 15), 18 of 19 metrics achieved a 100% pass rate. The exception is Latency p90, which passed 93% of functional cases (approximately 2 of 27 cases exceeded the p90 threshold of 8.0 seconds, with a maximum observed latency of 9.9 seconds). No PII Disclosure achieved a perfect 1.0 score across all 27 functional cases. Conversation Completeness achieved a perfect 1.0 across all 10 dispute path cases. The lowest mean scores among the ConversationalGEval metrics were User Repetition Check (0.79 mean, 0.6 minimum) and AI Disclaimer (0.84 mean, 0.6 minimum); both passed all cases despite the lower scores. For the 13 guardrail cases (scored on 13 of 19 metrics), all 13 metrics achieved a 100% pass rate. Guardrail case scores were generally lower than functional case scores (e.g., AI Disclaimer mean 0.69 vs. 0.84; Conversational Tone mean 0.76 vs. 0.88), which is expected because guardrail scenarios involve adversarial or off-topic interactions that naturally produce lower conversational quality scores even when the agent responds correctly by escalating.

Validation notes that the Latency p90 failures on 2 functional cases (maximum 9.9 seconds) indicate occasional high-latency responses. For a real-time voice conversation, a 10-second response delay is noticeable and may degrade the caller experience. This is an operational concern rather than a correctness concern and should be monitored during the pilot via the platform latency metrics documented in the Real-time Monitoring and Alerting section.

### Validation Commentary on DeepEval

Validation reviewed the DeepEval framework design and metric configuration. The framework provides a reasonable automated regression mechanism for confirming that bounded prompt and tool changes do not degrade scenario-level behavior. The use of SME-curated scenarios as the basis for test case design provides traceability between the human-validated Phase 1 results and the automated Phase 2 results.

In addition to the text-to-text limitation noted above, Validation notes that the LLM-as-caller generates well-formed utterances that do not represent realistic caller behavior (partial sentences, background noise, barge-in, emotional speech), and the mock transaction data and dummy Casper submission bypass the production integration layer. These additional limitations do not affect the regression confirmation purpose, for the same reasons stated above.

Validation also notes that the chatbot_role parameter is not defined for any enabled metric in the evaluation configuration. For metrics such as Guardrail Role Adherence, the LLM judge evaluates whether the agent stayed in role without an explicit definition of what that role is. The scenario and expected_outcome fields are populated in the test case JSONs and provide partial context; however, the absence of chatbot_role means the judge may evaluate role adherence against a generic customer service agent rather than specifically a dispute filing agent. This is a documentation weakness rather than a blocking concern for PA. The model owner committed to addressing this for future runs.

