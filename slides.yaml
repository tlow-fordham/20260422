## 2. GenAI Development Template - Section 6 Discussion (15 min)

To support the October 30 production timeline and the 12-week validation window, we would like to discuss Section 6 (Model Design and Construction) of the GenAI Development Template. The questions below follow the template structure. Where items are not applicable, a brief confirmation is sufficient.

**Model Framework (6.1.1)**

1. Can you confirm the component stack: Claude Haiku 4.5 for reasoning/generation, Nova Sonic for STT/TTS, QIC for orchestration and retrieval, Bedrock Guardrails for content filtering?
2. Were alternative LLMs or frameworks evaluated before selecting the current stack? If the selection followed a standard platform decision, a brief statement is sufficient for the template.

**Retrieval and Knowledge Base (6.2.1, 6.2.2, 6.2.4-5)**

3. Are the article tags from ServiceNow/Salesforce used as metadata filters in the retrieval pipeline, or is retrieval purely semantic?
4. What is the underlying retrieval index technology within QIC? Is it a managed vector store, and is the specific technology or version known?
5. What is the chunking strategy for ingested articles (e.g., fixed-size, recursive, semantic)? Are the chunk size and overlap configurable?
6. What embedding model does QIC use for this deployment? Are the model name, version, and embedding dimensions known?
7. What is the retrieval algorithm (sparse, dense, hybrid)? Are there relevance thresholds or reranking steps before the final context is passed to the LLM?
8. How many chunks are retrieved, and how many are used for response generation?
9. What are the procedures for updating the retrieval index when articles are added, modified, or retired in ServiceNow/Salesforce?

**LLM Configuration and System Prompt (6.2.2)**

10. What are the confirmed hyperparameter values (temperature, max input tokens, max output tokens)?
11. What is the prompt input limit and context window for the Claude Haiku 4.5 deployment?
12. Are there output constraints such as maximum response length or truncation handling?

**Guardrails (6.2.2)**

13. What content filters, PII detection rules, and off-topic handling are configured in Bedrock Guardrails for this model?
14. Are there guardrail instructions embedded in the system prompt in addition to the infrastructure-level Bedrock Guardrails?
15. Are there any post-processing steps applied to LLM output before it is spoken to the customer (e.g., confidence thresholds, fallback responses, blocked phrases)?

**Model Output and Delivery (6.2.3)**

16. What does the customer hear in a successful response? Is it a direct spoken answer, an answer with a source reference, or something else?
17. Are there response length limits or truncation logic for the spoken output?
18. Are any disclaimers or risk warnings read to the customer?
19. Can sample outputs (transcripts or recordings) be shared for Validation review?

**Other (6.3 - 6.5)**

20. Were any development adjustments applied during configuration (e.g., prompt iterations, output filters, confidence thresholds)?
21. Is there any custom Lambda code for this model, or is the deployment entirely AWS-managed through QIC?
22. What version control and change management procedures are in place for the QIC configuration and system prompt?

**N/A Confirmation**

23. Several Section 6 template requirements appear not applicable to this model. Can you confirm the following do not apply?
    - Fine-tuned, distilled, or custom-built LLM (Instruction 7)
    - Agentic AI framework (Instruction 6)
    - Graph database (Instruction 4, if QIC uses vector only)
    - Content-based feature engineering beyond existing article tags (Instruction 6.2.1, if no new features are generated)

