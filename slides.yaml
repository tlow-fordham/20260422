## Purpose

Weekly progress update following the Session 7 feedback roundtable. Casandra joined to provide executive context on the Nimbus POC, the broader automation strategy, and management's expectations.

---

## Casandra's Remarks

Casandra opened with context on the project's history and strategic framing. Key points:

**Budget and timeline pressure.** The CapEx funding for this project has been extended multiple times, and the extensions run out at the end of 2026. The project was originally supposed to kick off in 2024, but technology deprioritized it for almost a year. Infrastructure was not ready until January 2026, compressing the timeline significantly. Casandra may be able to get another extension by pointing to technology's delays, but the message is clear: a decision needs to be made.

**Build vs. buy was already evaluated.** The original plan was to build a custom platform. The cost was outside the bank's appetite. JP Morgan spent $12 million building theirs. U.S. Bank does not have that budget. The decision to evaluate vendor platforms followed directly from that.

**Nimbus has not been selected.** This is a POC. No contract has been signed. The team is testing whether this product can meet MRM's needs. If it cannot, the team needs to document that clearly. The final decision will be an up-or-down vote by Bob, Brian, Yanon, Vijay, and Becca, with Casandra providing input.

**The core problem is validation timelines.** Jodi Richard and Gunjan Kedia have communicated that validation timelines need to be shortened. This is not about a bottleneck or missed deadlines per se. It is about getting models to market faster, particularly with the pace of AI development creating new use cases that need rapid deployment. The total reduction target is 20%, but this will not be spread evenly. High-risk models that are revalidated frequently will be targeted first for the greatest efficiency gains.

**Not all models need to fit.** Casandra acknowledged that some models, particularly vendor models and highly customized internally developed models, may not make sense on the platform. Those decisions will be made between the relevant validation executive and Vijay on a case-by-case basis. However, Vijay has made it clear he wants to deploy automation across the entire model inventory to the extent feasible.

**Alternatives have been evaluated and are weaker.** Other platforms (including those sponsored by AICOE and other development groups) have significantly less functionality than Nimbus. Lumenova had 50% less functionality than Nimbus in initial testing. DataRobot and Azure ML Studio are still being evaluated. Nimbus is currently the best option within budget, even with its limitations.

**First-line adoption is desired but cannot be forced.** Casandra would like development groups to adopt the platform. Some are interested. Treasury has built their own AWS automation and wants to stick with it. AICOE has computing platforms suited for AI development but not validation. Most other model groups do not have a platform-level approach. MRM cannot mandate adoption.

**This is a multi-year effort.** Customization will not be complete in 2027. The process starts in 2027. The platform will not magically cut validation timelines in half. In the interim, it may create additional work. But the direction is to move from on-prem and SAS to cloud in a cohesive way, and the team needs to start.

**The root cause of long validation timelines is also being addressed separately.** Casandra noted this is not only about automation. A separate process mapping exercise has been completed covering model onboarding through retirement. Documentation acceptance on the front end is being targeted so that when a validation formally starts, the documentation is sufficient. This resets the measurement starting point and addresses the back-and-forth with model owners that validators identified as the primary driver of delays.

