# Tool Schema Field Mapping Reference

This section retains the complete field-level schema mapping for the three custom Lambda tools (Search, Eligibility, Submit). The PA report covers the schema descriptions, processing categories, and validation findings in summary form; the full per-field reference is preserved here for IV depth review and audit traceability.

**Search tool schema (search_transactions):** The schema describes a transaction search accepting five fields. All schema fields are typed as string. The LLM must populate merchant, date, and amount from natural language customer speech before invoking the tool. The following table maps each schema field through the tool code's processing logic to its downstream effect. All schema fields are collected during Stage 3 (Transaction Identification), except typeOfDispute which is classified during Stage 2 (Issue Identification).

The search tool queries DynamoDB using two scan patterns, both filtered by the caller's ContactId to ringfence results to the active session:

1. **Pattern 1 (date + amount):** Scans for transactions matching the customer-stated date (±3 calendar days) and amount (±10% of the stated value). This is the primary search path.
2. **Pattern 2 (merchant + date):** Scans for transactions matching the customer-stated date (±3 calendar days) and merchant name. This is the secondary search path.

Results from both patterns are combined and deduplicated by TransactionId. The tool then applies two matching methods to identify the best candidate:

- **Character similarity (SequenceMatcher):** Python's `difflib.SequenceMatcher` computes a character-level similarity ratio between two lowercased strings, returning a value between 0.0 (no match) and 1.0 (identical). The tool requires a ratio above 0.6 (60%) for merchant name matching. This is a lexical comparison — it measures how many characters two strings share in the same order, not whether they refer to the same entity. For example, "Chevron" vs. "Chevronn" would score high, but "gas station" vs. "Chevron" would score low.
- **Exact match / range comparison:** Used for date (calendar day difference ≤ 3), amount (absolute difference ≤ 10% of target), and all post-query guard checks (TransactionStatus, DisputeEligible, TransactionCode, $300 threshold).

| # | Schema Field | Required | DynamoDB Query Usage | Fuzzy Match / Processing | Returns to LLM? |
|---|-------------|----------|---------------------|--------------------------|-----------------|
| 1 | merchant | Yes | Pattern 2: scans by ContactId + date range, then filters by merchant name. Also applied post-query to Pattern 1 results. | Character similarity (SequenceMatcher) > 60% on lowercased strings. If empty, merchant match is bypassed (defaults True), falling back to date + amount matching only. | No (filtering only) |
| 2 | date | Yes | Both patterns: ±3 calendar day range filter (target_date ± 3 days via `timedelta`). DynamoDB `Attr('Date').between(start, end)`. | ±3 calendar day tolerance (not business days). Validated: must be 8 digits in YYYYMMDD format; rejected with ValueError otherwise. Parsed via `strptime` for range calculation. | No (filtering only) |
| 3 | amount | Yes | Pattern 1: scans where Amount BETWEEN amount×0.9 and amount×1.1. | ±10% tolerance relative to the customer-stated amount (not the bank-recorded amount). String in schema; converted to float then Decimal for DynamoDB filter. The threshold check (`>= 300`) is applied separately to the matched transaction's actual bank-recorded amount, so the tolerance cannot create a bypass of the $300 pilot limit. | No (filtering only) |
| 4 | typeOfDispute | **No (optional)** | Not used in DynamoDB query. Used post-query for PE#DC duplicate policy: counts transactions sharing same Amount+Date+MerchantName; escalates if >2. | Exact match against constant "Duplicate charge" to decide whether to run the check. | No (policy check only) |
| 5 | sessionId | Yes | Used to read QConnect session state → extract contactId → DynamoDB partition filter `Attr('ContactId').eq(contact_id)`. | N/A | No (routing only) |

The tool returns a filtered, deduplicated transaction list to the LLM. Each transaction record contains four fields: DisputedTransactionId (renamed from DynamoDB TransactionId), Amount (Decimal converted to float), Date (passthrough), and MerchantName (passthrough). A fifth field, TokenizedCardNumber, is stored in QConnect session state for the submit tool but is stripped from the response before it reaches the LLM (line 207), providing a code-level PII protection layer independent of Bedrock Guardrails. The tool also writes the transaction list, dispute_type, and tool execution status to session state.

Before returning results, the tool applies several guard checks that can short-circuit the flow with an escalation message: if the best-matching transaction has TransactionStatus of PENDING (wait 1-3 days), if its Amount is >= 300 ($300 pilot threshold), or for PE#DC disputes if >2 transactions share the same Amount/Date/MerchantName combination (duplicate transaction policy). Transactions are also filtered by DisputeEligible (must be True) and TransactionCode (must be in allowlist ['1238', '8373']).

Notably, typeOfDispute is not in the required array, meaning the LLM can invoke the search without specifying the dispute type. If omitted, the PE#DC duplicate transaction policy check may not fire correctly. The system prompt instructs the LLM to classify the dispute type before searching, providing a functional safeguard, but the schema does not enforce this dependency.

**Eligibility tool schema (eligible_transactions):** The schema describes an eligibility check accepting three fields, all typed as string and all required. The LLM invokes this tool in Stage 3 (Transaction Eligibility Check) after the customer confirms the matched transaction, before the merchant contact interview begins. The schema is shown below.

| # | Schema Field | Required | Source | Usage |
|---|--------------|----------|--------|-------|
| 1 | disputedTransactionId | Yes | Search tool → LLM → Eligibility tool (round-trip) | Primary key for locating the matched transaction in session state; passed to Casper as transactionDetails.refNumber. |
| 2 | sessionId | Yes | System (QIC platform) | Used to read/write QConnect session state and locate the matched transaction record. Not sent to Casper. |
| 3 | expectedAmount | Yes | LLM (PE#IA only) | Passed to Casper as interview.amountDisputed after computation: for PE#IA, amountDisputed = transaction Amount − expectedAmount; for PE#DC, expectedAmount is ignored and the full transaction Amount is used. |

The schema mirrors the three-field subset of the Submit tool schema needed to perform a standalone eligibility check. All three fields are required, so the LLM cannot invoke the tool with missing inputs. The downstream eligibility API returns one of four documented reason codes (IVR-415 recurring transaction, IC-2031 already disputed, IC-2034 needs further review, IC-3001 no matching transaction) mapped to specific customer-facing escalation messages; any other non-200 response or exception falls back to a generic technical-error escalation.

**Submit tool schema (submit_claim_interview):** The schema describes a claim submission accepting 11 fields. All schema fields are typed as string; the tool code handles all type conversions (string-to-float for amounts, string-to-enum for contact methods). The following table maps each schema field to its corresponding Casper API field, the conversation stage where the data is collected, and the data processing performed by the tool code. Fields are grouped by required/optional status in the schema.

**Required schema fields (7):**

| # | Submit Tool Schema Field | Conversation Stage | Casper API Field | Data Processing | Source |
|---|--------------------------|-------------------|------------------|-----------------|--------|
| 1 | typeOfDispute | Stage 2: Issue Identification | interview.natureOfDispute | Deterministic map: "Incorrect Amount" → "PE#IA", "Duplicate charge" → "PE#DC". Unrecognized values pass through with no validation. | LLM classifies from customer speech |
| 2 | expectedAmount | Stage 3: Transaction Identification (PE#IA: "how much did you expect to pay?") | interview.amountDisputed | PE#IA: tool code computes Amount − expectedAmount (line 237); string→float via map_amount. PE#DC: expectedAmount is **ignored**; amountDisputed = full transaction Amount (line 233). | LLM (expectedAmount); Transaction DB (Amount) |
| 3 | merchantContactStatus | Stage 4: Merchant Contact ("Did you contact the merchant? Y/N/U") | interview.hasAttemptedToResolve | map_bool_to_attempt: normalizes yes/y/true → Y, no/n/false → N, u/unable → U. Also accepts booleans. | LLM extracts from conversation |
| 4 | purchaseReason | Stage 3: Transaction Identification (PE#DC: "What was the reason for this purchase?") | interview.purchaseDescription (PE#DC only) | Passthrough via map_field. Only included in Casper payload for PE#DC. For PE#IA the schema still requires it but the tool ignores it. | LLM extracts from conversation |
| 5 | noShowOrPartialPrePayment | Stage 3: Transaction Identification (PE#IA: "Is this a no-show or pre-payment partial transaction?") | interview.noShowOrPartialPrepayment (PE#IA only) | map_bool_to_attempt: same Y/N normalization. Only included for non-PE#DC disputes. | LLM extracts from conversation |
| 6 | disputedTransactionId | Stage 3: Transaction Identification (round-trip: search tool returns it, LLM echoes it back) | transactionDetails.refNumber (always) + interview.origTxRefNumber (PE#DC only) | Passthrough via map_field. Also used by lambda_handler to look up the matched transaction from session state. | Search tool → LLM → Submit tool |
| 7 | sessionId | N/A (injected by QIC platform) | Not sent to Casper | Used to read/write QConnect session state. Never reaches Casper API. | System (QIC platform) |

**Optional schema fields (5):**

| # | Submit Tool Schema Field | Conversation Stage | Casper API Field | Data Processing | Source |
|---|--------------------------|-------------------|------------------|-----------------|--------|
| 8 | merchantContactName | Stage 4: Merchant Contact (Y path: "name of contact") | merchantContactDetails.nameOfContacted | Passthrough via map_field. Nested as contactPerson in tool code (line 220). | LLM extracts from conversation |
| 9 | merchantContactMethod | Stage 4: Merchant Contact (Y path: "channel — phone, postal, email, in-person, online, other") | merchantContactDetails.contactMethod (+ OtherContactMethod if "Other") | map_contact_method: postal → Mail, in-person → Face-to-Face, online → Web Support/App, phone → Phone, email → Email, other → Other. Unrecognized values pass through. If "Other", also populates OtherContactMethod from undocumented key "otherContactMethod". | LLM extracts from conversation |
| 10 | merchantContactDate | Stage 4: Merchant Contact (Y path: "date") | merchantContactDetails.contactDate | Passthrough via map_field. No date parsing or reformatting — LLM must provide yyyyMMdd. | LLM extracts from conversation |
| 11 | merchantResponse | Stage 4: Merchant Contact (Y path: "response") | merchantContactDetails.merchantResponse | Passthrough via map_field. Free-text LLM summary of what the merchant said. | LLM summarizes from conversation |
| 12 | noSuccessContactReason | Stage 4: Merchant Contact (N path: "Why didn't you try to contact the merchant?" / U path: "Why were you unable to reach them?") | **Overloaded — one-to-two fan-out:** interview.unableToContactReason (U path) OR interview.explainNoAttemptToResolve (N path) | Tool code reads the single LLM field and routes to two different Casper fields based on merchantContactStatus: if U → unableToContactReason (line 250); if N → explainNoAttemptToResolve (line 254). Passthrough via map_field after routing. The LLM does not know which Casper field it is populating. The system prompt names this field for both N and U paths. Neither path was tested by SME. | LLM extracts from conversation |


