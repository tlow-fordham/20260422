## Category 8: Robustness and Sensitivity (§7.4)

| # | Metric | Source | Definition | Goal Value | Coverage Level | IV Notes |
|---|---|---|---|---|---|---|
| 32 | Catch Error | Baloo (ops) | Number of times the AI agent says "I didn't catch that" or "Could you repeat?" | N/A (monitoring) | Indirect | Signals speech-recognition failures (upstream Nova Sonic) and conversational ambiguity but is not attributed by root cause. |
| 33 | Slot Filling Retries | Baloo (ops) | AI agent asking for the same required information more than once. | N/A (monitoring) | Indirect | Elevated retries could signal sensitivity to input phrasing. |
| 34 | Latency (round-trip) | Baloo (ops) | Round-trip response time. | N/A (monitoring) | Covered (operations) | Not a robustness metric per se, but extreme latency may correlate with complex/ambiguous inputs. |
| 35 | API Error (5xx) | Baloo (ops) | Failures while calling backend APIs. | N/A (monitoring) | Covered (operations) | Infrastructure reliability metric. |

**Pre-pilot sensitivity testing (PA-stage):** Fuzzy merchant name, fuzzy amount, and fuzzy date test variants included in the 56 SME test cases. Small-sample, scenario-based. Offsite Day 1 surfaced additional fuzzy-input failures (merchant name variants, future dates, approximate amounts) handled by escalation rather than resolution.

**Template gaps:**
- **Systematic semantic perturbation:** No regime with retrieval overlap or pair-wise LLM evaluation as referenced in the template. IV should include a structured perturbation study on production-like utterances.
- **Multi-turn and topic-change robustness:** One live UAT call (Call 2) demonstrated three escalation triggers on a single call; no quantitative long-context or topic-change metric. IV should include a multi-turn stress set.
- **Speech-input noise robustness:** No quantitative metric. Background-noise sensitivity flagged critical for go-live; AWS committed to receive recordings for root-cause analysis. No formal testing regime planned for pilot.
- **Component-level error attribution:** Catch Error and Slot Filling Retries do not distinguish between upstream speech recognition errors (Nova Sonic) and LLM reasoning errors (Claude Haiku 4.5). IV should include component-level error attribution.

