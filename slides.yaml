### Variable Reduction Module

Available methods: missing value analysis, PCA, high correlation, random forest, clustering, information value (IV), forward selection, backward selection, LASSO, Ridge, stepwise.

**Workflow:** Select method → select dataset → set target variable → set threshold (e.g., correlation > 0.13) → Submit. Review results showing selected/rejected variables with correlation values. Users can manually override selections (add/remove variables) before proceeding. Click "Proceed" to move selected variables to the Variable Finalization module.

**Variable Finalization module:** Aggregates results across all methods run. Displays a side-by-side comparison table showing which variables were selected by which method. Users can finalize their variable list and create a new dataset for model estimation. The finalized dataset must be marked "Ready to Use" before it can be used in subsequent modules.

**Dataset locking:** Only one operation can run on a dataset at a time. If a previous operation is running, new submissions will fail until the dataset is released.

**Q (team member):** Can I iterate variable reduction across all segments of a segmented dataset? **A:** Create a workflow using these methods, then change the dataset input for each segment. For large numbers of segments (e.g., 100), a UDF function can be added to the workflow to loop through segments. Detail deferred to the pipeline/workflow session.

**Error noted (Ali):** Random forest variable reduction threw a "string to float" conversion error — likely caused by passing uncoded string variables directly. Vivek confirmed string variables must be converted (encoded) before being passed to model-based methods.

---

### Model Estimation Module

**Modeling types:** Classification (logistic regression, decision tree, artificial neural network, random forest, XGBoost), Regression (OLS, XGBoost, random forest), Time Series (ARIMA and others).

**Workflow:** Select modeling type → select one or multiple techniques → select target variable → select/exclude variables → select metrics (AUC, KS, precision, recall, etc.) → set prediction threshold → select training dataset → optionally select test dataset (not mandatory) → set hyperparameters per technique → enable auto-save if desired → Submit.

**Key behaviors:**

- Multiple techniques within the same modeling type (e.g., all three classification methods) run as a single job and produce results in one job queue item.
- Cross-type comparison (regression vs. classification) is not natively supported — requires a UDF layer.
- Model comparison toggle generates side-by-side AUC, KS, and other metric charts and tables across all selected techniques.
- Coefficients, p-values, t-statistics, and feature importance tables are available for logistic regression, OLS, ARIMA, and other parametric methods.
- Test dataset is created via the Sampling module (train/test split with ratio) — the split should be done before model estimation.

**Saving models:** Enable the "Add to Save" option during model initiation, provide a name and description. Saved models appear in the Inventory Management module with pickle files, environment files, and version history. Models must be saved to appear in Model Testing. An auto-save option exists but requires submitting a separate operation to trigger if not enabled at initial run time.

**Q (Ali):** Only a subset of hyperparameters are exposed in the UI — can all parameters be made available? **A:** Additional parameters can be configured; current UI shows the most commonly used ones. Backend defaults are applied for unexposed parameters.

**Q (Ali):** Suggested adding train/test split directly within model estimation to improve traceability and prevent data leakage. **A:** Vivek acknowledged the suggestion but noted it might disrupt the modular workflow structure; will check with tech team.

**Q (team member):** Can UDF access model artifacts (coefficients, predictions, residuals) from saved models? **A:** Yes — pickle files and all associated artifacts are stored in Inventory Management and accessible from UDF.

**Q (Ali):** During model estimation, dataset should not be locked for read-only operations (fitting, predicting) — only for data manipulation. **A:** Vivek agreed and will check if model estimation can be configured to allow concurrent jobs on the same dataset.

