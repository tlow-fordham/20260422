# Escalation and Rollback Procedures — Working Notes

The PA does not include formal findings on escalation and rollback procedures because these are go-live operational readiness items rather than model risk validation items. This section records Validation's observations for IV reference.

## Offsite-Presented Deployment Approach (April 21, 2026)

The Business Line presented a phased rollout methodology in substance at the April 21 offsite. Key elements:

- **Phased activation.** Start with a time-boxed activation (e.g., a half-day in one region), then revert to legacy. Evaluate technology logs, operational feedback, and agent experience before expanding. Wait for the full downstream lifecycle to complete (Casper to Visa takes approximately 3 days for dispute confirmation; payment-related lifecycles can take up to 7 days) before increasing throttle. Increase throttle incrementally over multiple weeks. Time-based activation (turn on for specific windows) versus percentage throttle both remain on the table.
- **War room at go-live.** Cross-functional (Operations, Technology, Data and Analytics, and other partners) with designated forums for sharing technical metrics, CSAT data, banker feedback on the handoff, and defect triage.
- **AWS support specialist.** Dedicated support specialist model for US Bank (contextually aware, 24x7 for Nova Sonic issues related to disputes and collections); requested advance notice of rollout phases so support specialists can be on the call from start to finish.
- **UAT testing through code freeze.** Testing continues through code freeze (two weeks before go-live); defects found after code freeze would be treated as showstoppers, otherwise findings become fast-follow items.
- **Material change position.** If a material change is needed during the pilot, options are: end the pilot early, start a new pilot, or wait for the next production approval cycle.

## Residual Questions for IV

The offsite content covers deployment and rollout (how to turn the model on incrementally, how to watch it at go-live). It does not cover rollback and incident response (how to turn the model off if something goes wrong, and who decides). Specifically, the following were not addressed:

- Who has authority to take the model offline during the pilot.
- What events trigger an immediate rollback to human-only processing (threshold-based, event-based, or both).
- Notification process to MRM if the model is taken offline or if a material error is identified.
- Post-incident review process for model-related errors.

The war room forum is a triage and operational reaction mechanism, not a defined rollback procedure. IV should confirm whether the model owner has documented these items before full production approval.

