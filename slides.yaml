# AI COE MPP First-Line Intelligence Log

**Purpose:** Accumulated knowledge from AI COE Monthly Planning/Program (MPP) meetings, maintained for MRM second-line awareness. This document tracks first-line project status, pipeline signals, and development timelines as discussed in MPP sessions. Where a first-line project maps to a known MRM model ID, the ID is noted in parentheses for cross-reference only.

**Maintained by:** Jordan Low, MRM AI Validation
**Last updated:** May 9, 2026

---

## Active First-Line Project Tracker

### Smart SME Portfolio

**Smart Assistant / ChatUSB (Model-7009 / Model-6803)**
First-line owner: Tim Walker's team. ChatUSB is in production. The remaining work is integrating new solutions (Snowflake Cortex AI, CAS chatbot) into the ChatUSB platform. This team's board does not plan Smart Assistant work directly since a different delivery team owns it, but it remains part of the Smart SME portfolio.

- Status as of May 2026 MPP: In production (ChatUSB wrapper). Integration work ongoing.

**Artemis Query Agent (Model-7306)**
Pilot launched first week of May 2026. Monitoring runs through end of May (~4 weeks of data collection). EMA and MDD document submissions targeted for June 2026. On track. First-line owners: Sherin Mathews / Artemis team.

- Status as of May 2026 MPP: Pilot live, monitoring underway. EMA expected June.

**Artemis Summary Agent**
Kickoff completed. Requirements still evolving. A new requirement surfaced (summarizing paragraph-style notes/blogs with training-like work) that is unconfirmed. The EMQ has not been submitted, meaning the solution has not yet been formally deemed a model. Debbie Cermak set a deadline to press the business (Maria) for a decision by Monday May 12. The team discussed deferring the new requirement to a future release if it threatens the current timeline. A separate "reasoning agent" concept was raised as an internal research project, kept outside the Summary Agent scope. First-line owners: Jayalakshmi Mangalagiri / Satish Simhadri.

- Status as of May 2026 MPP: Pre-EMQ. Requirements unstable. Decision deadline set for May 12.

**MLO Product Selector**
PwC has fully exited. The first-line team now owns the MLO Product Selector entirely. Work includes pre-production, validation, and potential remediation. Tony pushed back on characterizing this as "consulting" since it will consume real capacity over multiple months. Debbie agreed to add a visible planning marker. No new enhancements are defined yet, but it is not trivial BAU.

- Status as of May 2026 MPP: Transitioning from PwC, pre-production work underway.

**Lenny AI / Lending AI**
Nearing production readiness. New knowledge bases being incorporated in May. Full production launch targeted for June 12, 2026. Dependency on Brian and Paul's AI Enablement deployment team. David indicated the project is on track.

- Status as of May 2026 MPP: Final knowledge base integration. June 12 production target.

**Leadership Insights**
Active development. Satish's team working daily with Jeff's team on a deterministic SQL path for integration into the existing legacy path. POC access for Jeff and Fatima estimated at roughly early July 2026 (~8 weeks from May MPP). On-prem deployment, low memory intensity, API-based (no local models, no GPU dependency expected). Satish to confirm resource needs with Paul and Chenglin.

- Status as of May 2026 MPP: Development phase. POC ~July 2026.

**GCT Onboarding Agent Assist**
POC reduced to one task (risk assessment) instead of three; Vidya's team not ready with data and guidelines for the other two tasks. New file upload capability needs to be built from scratch. FileNet access not expected until Q3 (~August 2026). Team discussed waiting for FileNet to minimize rework. This project competes for resources with First Line of Defense (shared developers: Lavanya and one other). Tentative decision to push GCT pilot from June to July 2026 (~4 week extension). Debbie plans to brief Vidya before the weekly GCT call.

- Status as of May 2026 MPP: Descoped, delayed. Pilot pushed to ~July 2026.

**First Line of Defense / 1LOD**
Highest-priority first-line project. Sprint 4 wrapping up, Sprint 5 begins soon with UAT for a couple of use cases, Sprint 6 starts around June 6-9 with remaining use cases. Tech team (Krishna, Ganesh) tested Use Case 1 APIs throughout the week. Paul focused on migrating Use Case 1 into UAT and prod, with Use Case 2 to follow. High visibility with Dominic watching. Firm June timeline, which is why it takes priority over GCT.

- Status as of May 2026 MPP: Sprint 4/5 transition. UAT in May/June. Production targeted June.

**Mid-Funnel Model (new)**
Flagged as an upcoming initiative. Has Prashant's approval, confirmed by Sammy and Gigi as needing to be on the board. Expected to start with EDA in May 2026. Sharon also had one or two additional new projects to surface.

- Status as of May 2026 MPP: EDA starting. Very early stage.

