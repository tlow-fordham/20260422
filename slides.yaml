# Tool Code Method Reference

This section documents the key Python methods in the Lambda tool implementations reviewed during PA. The Eligibility tool (new in V10) is not included here; its method inventory can be added during IV code review.

## fdi_submit_case_tool.py (Submit Tool)

The submit tool transforms LLM-collected dispute details into a structured Casper API payload and submits the claim.

| Method | Signature | Purpose | Key Logic |
|--------|-----------|---------|-----------|
| `lambda_handler` | `(event, context) -> Dict` | AWS Lambda entry point. Orchestrates the full submission flow. | Reads session state from QConnect via `extract_session_data`. Matches the disputed transaction by `disputedTransactionId` against the session's transaction list. Merges session data, LLM event data, and matched transaction into a single payload dict. Reads `is_deepeval` flag from session state. Calls `submit_dispute_claim` with the merged payload. Returns escalation message if no matching transaction found or session read fails. |
| `submit_dispute_claim` | `(event, assistant_id, session_id) -> Dict` | Submits the dispute to the Casper API and manages session state. | Calls `build_api_payload` to assemble the request. In DeepEval/skip mode (`is_deepeval=True` or `API_SUBMIT=false`), returns a hardcoded dummy case reference (`F-D-260219800147`) without calling the API. Otherwise, sends POST to `CASPER_API_URL` with mutual TLS (mTLS) authentication (cert/key/PEM from Secrets Manager). A UUID CorrelationId is added to the request headers for end-to-end traceability, and `TempClaimID` is included in the payload when present in session state. Handles: non-200 responses (generic escalation), missing `pyID` in response (ValueError). Updates session state with `tool_execution_status`, `agenticAIDisclosure`, `agenticAIConfirm`, and `case_reference` on success. |
| `build_api_payload` | `(details) -> Dict` | Assembles the top-level Casper API request structure. | Builds three sections: `accountInfo` (tokenAccountNumber, cardMemberName, cardholderID from session state), `transactionDetails` (refNumber, merchantName, transactionDate, tranAmount from matched transaction), and `interview` (from `build_interview_payload`). Sets `IVRCallReference` to `contactId` and `callWrapped` to `True`. |
| `build_interview_payload` | `(details) -> Dict` | Maps LLM-collected conversational fields to the Casper interview schema. | Maps `typeOfDispute` to `natureOfDispute` codes: Incorrect Amount to PE#IA, Duplicate charge to PE#DC. Calculates `amountDisputed`: for PE#DC, uses full transaction `Amount` (line 233); for PE#IA, computes `Amount - expectedAmount` (line 237). Conditionally populates: `unableToContactReason` only when `hasAttemptedToResolve=U`; `explainNoAttemptToResolve` only when `hasAttemptedToResolve=N`; `noShowOrPartialPrepayment` only for non-PE#DC disputes; `origTxRefNumber` and `origTxDate` only for PE#DC disputes. In V10, `purchaseDescription` is set unconditionally rather than PE#DC-only. |
| `map_contact_method` | `(value) -> str` | Deterministic mapping from prompt-defined contact method values to Casper API enum values. | Maps: postal to Mail, in-person to Face-to-Face, online to Web Support/App, phone to Phone, email to Email, other to Other. Normalizes input to lowercase before lookup. Returns original value if no match found. |
| `map_bool_to_attempt` | `(value) -> str` | Converts merchant contact status to Y/N/U for `hasAttemptedToResolve`. | Handles bool (True to Y, False to N), string (yes/y/true to Y, u/unable to U, else N). |
| `map_amount` | `(details, field_name) -> float` | Safely extracts and converts amount fields to float. | Returns `0.0` default on None or conversion failure. |
| `map_field` | `(details, field_name) -> str` | Safely extracts string fields with list handling. | If value is a list, extracts first element. Returns empty string default on None. |
| `extract_session_data` | `(session_response) -> Tuple[Dict, list]` | Parses QConnect session response into session data dict and transactions list. | Iterates `data` array, extracts `stringValue` for each key. Parses `transactions` key as JSON list. Returns tuple of (session_data, transactions_list). |

**Supporting modules included in the file:** `Token.py` (OAuth token retrieval via Secrets Manager and client credentials grant) and `SessionState.py` (QConnect session state read/write/update with transaction list append and deduplication).

## fdi_txn_search_tool.py (Search Tool)

The search tool queries the customer's recent transactions from DynamoDB and applies fuzzy matching to identify the disputed transaction.

| Method | Signature | Purpose | Key Logic |
|--------|-----------|---------|-----------|
| `lambda_handler` | `(event, context) -> Dict` | AWS Lambda entry point. Orchestrates the transaction search flow. | Extracts merchant, date, amount, and `typeOfDispute` from LLM event. Reads session state for `contactId`, `customerName`, `legalParticipantID`, and `deepeval` flag. Calls `query_transactions_table` for DynamoDB results. Applies three-dimensional fuzzy matching (date +/-3 days, amount +/-10%, merchant 60% similarity) to find the best match. Checks: if matching transaction is PENDING, returns "wait 1-3 days" message with transfer. If matching transaction `Amount >= 300`, returns $300 threshold message with transfer. For PE#DC disputes, checks if >2 transactions share the same amount/date/merchant combination and returns transfer message if so. Deduplicates results via `remove_duplicate_trans`. Strips `TokenizedCardNumber` from output before returning to LLM. Updates QConnect session with transaction list and tool execution status. |
| `query_transactions_table` | `(merchant, contact_id, date, amount) -> list` | Executes DynamoDB queries using two scan patterns and deduplicates results. | Pattern 1: `query_by_date_and_amount` (if date and amount provided). Pattern 2: `query_by_merchant_and_date` (if merchant and date provided). Results from both patterns are combined and deduplicated by `TransactionId`. |
| `query_by_date_and_amount` | `(table, contact_id, date, amount) -> Dict` | DynamoDB scan filtered by date range, amount range, and ContactId. | Computes +/-3 day date range and +/-10% amount tolerance. Uses `Attr` filter expressions: `Date.between(start, end)`, `Amount.between(low, high)`, `ContactId.eq(contact_id)`. |
| `query_by_merchant_and_date` | `(table, contact_id, merchant, date) -> Dict` | DynamoDB scan with fuzzy merchant name matching. | First pass: scans by `ContactId` and date range (+/-3 days). Second pass: applies `SequenceMatcher` on merchant name with 60% similarity threshold. Returns only fuzzy-matched items. |
| `remove_duplicate_trans` | `(transactions, key_subset) -> list` | Generic deduplication by specified key subset. | Creates hashable tuple from sorted key-value pairs for the specified subset. Preserves first occurrence. Used for both `TransactionId` dedup (after DynamoDB query) and `Amount/Date/MerchantName` dedup (before returning to LLM). |
| `remove_duplicate_amount_merchant` | `(transactions) -> list` | Deduplication by Amount + Date + MerchantName composite key. | Creates (Amount, Date, MerchantName) tuple as composite key. Preserves first occurrence. |

**Supporting modules included in the file:** `SessionState.py` (same QConnect session state management as submit tool, with verbose logging).

